// DASHBOARD TAB — Weekly / Monthly / Yearly visualisations
// ══════════════════════════════════════════════════════════════
function renderDashboard(){
  var el = document.getElementById('tab-dashboard');
  if (!STATE.logs.length){ el.innerHTML = empty('📈', LANG==='de'?'Noch keine Daten':'No data yet', LANG==='de'?'Erfasse zuerst Getränke!':'Log some drinks first!'); return; }
  var isDE = LANG === 'de';
  var html = '';

  // ── Period selector — includes Today ─────────────────────
  var period = STATE.dashPeriod || 'weekly';
  html += '<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">';
  var periods = ['today','weekly','monthly','yearly'];
  var periodLabels = isDE
    ? {today:'Heute',weekly:'Wöchentlich',monthly:'Monatlich',yearly:'Jährlich'}
    : {today:'Today',weekly:'Weekly',monthly:'Monthly',yearly:'Yearly'};
  periods.forEach(function(p){
    html += '<button onclick="STATE.dashPeriod=\''+p+'\';renderTab(\'dashboard\')" '+
      'style="flex:1;padding:8px 4px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;min-width:60px;'+
      'border:2px solid '+(period===p?'#b5481f':'#e8dccc')+';background:'+(period===p?'#fce4d0':'#fff')+';color:'+(period===p?'#7a2e10':'#5a3a28')+'">'+
      periodLabels[p]+'</button>';
  });
  html += '</div>';

  // ── Drink type filter ─────────────────────────────────────
  var drinkFilter = STATE.dashDrinkFilter || '🍺*';
  var filterOptions = [['🍺*', isDE?'Alle Biere 🍺':'All Beers 🍺']];
  // Add each active beer-type drink
  DRINK_TYPES.forEach(function(d){
    if (d.startsWith('🍺')) filterOptions.push([d, emoji(d)+' '+d.replace(/^.+? /,'')]);
  });
  // Add "All drinks" option
  filterOptions.push(['*', isDE?'Alle Getränke':'All Drinks']);

  html += '<div style="margin-bottom:14px">';
  html += '<div style="font-size:11px;font-weight:700;color:#7a5200;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px">'+
    (isDE?'Getränk-Filter:':'Drink filter:')+'</div>';
  html += '<div style="display:flex;gap:5px;flex-wrap:wrap">';
  filterOptions.forEach(function(opt){
    var isActive = drinkFilter === opt[0];
    html += '<button onclick="STATE.dashDrinkFilter=\''+esc(opt[0])+'\';renderTab(\'dashboard\')" '+
      'style="padding:5px 10px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;'+
      'border:1.5px solid '+(isActive?'#b5481f':'#e8dccc')+';background:'+(isActive?'#b5481f':'#fff')+';color:'+(isActive?'#fff':'#5a3a28')+'">'+
      opt[1]+'</button>';
  });
  html += '</div></div>';

  // ── Build session logs for the selected period ────────────
  var now = new Date();
  var sessionLogs;
  if (period === 'today'){
    // 36-hour window to capture overnight sessions (e.g. Fri 8pm → Sat 4am)
    var cutoff = new Date(now.getTime() - 36*60*60*1000).toISOString();
    sessionLogs = STATE.logs.filter(function(l){
      var ts = l.logged_at || (l.date+'T00:00:00Z');
      return ts >= cutoff;
    });
  } else {
    sessionLogs = STATE.logs; // all logs, bucketed by buildDashBuckets
  }

  // ── Filter by drink type ──────────────────────────────────
  function matchesDrinkFilter(drink){
    if (drinkFilter === '*') return true;
    if (drinkFilter === '🍺*') return drink && drink.startsWith('🍺');
    return drink === drinkFilter;
  }

  // ── Build per-person totals ───────────────────────────────
  var personTotals = {};
  sessionLogs.forEach(function(l){
    if (!matchesDrinkFilter(l.drink)) return;
    if (!personTotals[l.person]) personTotals[l.person] = 0;
    personTotals[l.person] += (l.quantity||0);
  });

  // If period != today, also aggregate from buckets for consistency
  if (period !== 'today'){
    personTotals = {};
    var buckets2 = buildDashBuckets(period);
    buckets2.forEach(function(b){
      // Use beerPersons for beer filter, or build custom
      if (drinkFilter === '🍺*'){
        Object.keys(b.beerPersons||{}).forEach(function(p){
          personTotals[p] = (personTotals[p]||0) + (b.beerPersons[p]||0);
        });
      } else {
        // Filter STATE.logs by period bucket and drink
        STATE.logs.forEach(function(l){
          if (!matchesDrinkFilter(l.drink)) return;
          var d = new Date(l.date+'T00:00:00');
          var key;
          if (period==='weekly'){
            var jan4=new Date(d.getFullYear(),0,4);
            var wk=Math.ceil((((d-jan4)/86400000)+jan4.getDay()+1)/7);
            key=d.getFullYear()+'-W'+String(wk).padStart(2,'0');
          } else if (period==='monthly'){
            key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
          } else {
            key=''+d.getFullYear();
          }
          if (key === b.key){
            personTotals[l.person] = (personTotals[l.person]||0)+(l.quantity||0);
          }
        });
      }
    });
  }

  // ── Sort direction ────────────────────────────────────────
  var sortDir = STATE.dashSortDir || 'desc';
  var rankedPeople = Object.entries(personTotals)
    .filter(function(e){ return e[1] > 0; })
    .sort(function(a,b){ return sortDir==='desc' ? b[1]-a[1] : a[1]-b[1]; });

  // ── Render leaderboard ────────────────────────────────────
  var drinkLabel = drinkFilter==='*' ? (isDE?'Getränke':'drinks') :
                   drinkFilter==='🍺*' ? (isDE?'Biere':'beers') :
                   drinkFilter.replace(/^.+? /,'').toLowerCase();
  var periodLabel = periodLabels[period] || period;

  var ranks = [];
  var cur = 1;
  rankedPeople.forEach(function(entry, i){
    if (i>0 && entry[1] !== rankedPeople[i-1][1]) cur = i+1;
    ranks.push({name:entry[0], count:entry[1], rank: sortDir==='desc'?cur:rankedPeople.length-i});
  });
  // Re-rank for asc: lowest gets #1
  if (sortDir==='asc'){
    cur=1;
    rankedPeople.forEach(function(entry,i){
      if(i>0&&entry[1]!==rankedPeople[i-1][1])cur=i+1;
      ranks[i].rank=cur;
    });
  }

  var medals = {1:'🥇',2:'🥈',3:'🥉'};
  var rankColors = {1:'#FFD700',2:'#C0C0C0',3:'#CD7F32'};

  var lbInner =
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'+
      '<div style="font-size:11px;color:#7a5200">'+
        (isDE?'Zeitraum: ':'Period: ')+'<strong>'+periodLabel+'</strong>'+
        ' · '+emoji(drinkFilter==='*'?'🍹':drinkFilter==='🍺*'?'🍺':drinkFilter)+' '+esc(drinkLabel)+
      '</div>'+
      '<button onclick="STATE.dashSortDir=STATE.dashSortDir===\'desc\'?\'asc\':\'desc\';renderTab(\'dashboard\')" '+
        'style="background:#f5ede4;border:1.5px solid #b5481f;border-radius:8px;color:#b5481f;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer">'+
        (sortDir==='desc'?'▼ '+(isDE?'Höchste':'Highest'):'▲ '+(isDE?'Niedrigste':'Lowest'))+
      '</button>'+
    '</div>';

  if (!ranks.length){
    lbInner += '<div style="color:#7a5200;font-size:13px;text-align:center;padding:20px 0">'+
      (isDE?'Keine Daten für diesen Zeitraum':'No data for this period')+'</div>';
  } else {
    lbInner += ranks.map(function(r){
      var medal = (sortDir==='desc'&&medals[r.rank]) ? medals[r.rank] : '';
      var rankColor = (sortDir==='desc'&&rankColors[r.rank]) ? rankColors[r.rank] : '#5a3a28';
      var bg = sortDir==='desc' && r.rank===1 ? 'linear-gradient(135deg,#fffbe6,#fff3b0)' :
               sortDir==='desc' && r.rank===2 ? 'linear-gradient(135deg,#f5f5f5,#e8e8e8)' :
               sortDir==='desc' && r.rank===3 ? 'linear-gradient(135deg,#fdf0e0,#f5e0c0)' : '#fff';
      var isMe = r.name === CURRENT_NAME;
      return '<div onclick="showLeaderboardPersonDetail(\''+esc(r.name)+'\',\''+esc(drinkFilter)+'\',\''+esc(period)+'\')" '+
        'style="display:flex;align-items:center;gap:10px;padding:9px 10px;margin-bottom:6px;'+
        'border-radius:10px;background:'+bg+';border:1.5px solid '+(r.rank<=3&&sortDir==='desc'?rankColor:'#e8dccc')+';cursor:pointer">'+
        '<div style="min-width:30px;text-align:center;font-size:'+(medal?'20':'13')+'px;font-weight:900;color:'+rankColor+'">'+
          (medal||('#'+r.rank))+
        '</div>'+
        '<div style="width:28px;height:28px;border-radius:50%;background:'+colorFor(r.name)+
          ';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0">'+
          r.name[0].toUpperCase()+
        '</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div style="font-size:13px;font-weight:'+(r.rank<=3?'800':'600')+';color:#1a0e08">'+
            esc(r.name)+(isMe?' <span style="font-size:10px;color:#b5481f;background:#fce4d0;border-radius:4px;padding:1px 5px">'+t('youSuffix')+'</span>':'')+
          '</div>'+
          '<div style="font-size:10px;color:#9a7060">👆 '+(isDE?'Details':'tap for details')+'</div>'+
        '</div>'+
        '<div style="text-align:right;flex-shrink:0">'+
          '<div style="font-size:18px;font-weight:900;color:'+rankColor+'">'+r.count+'</div>'+
          '<div style="font-size:10px;color:#7a5200">'+emoji(drinkFilter==='*'?'🍹':drinkFilter==='🍺*'?'🍺':drinkFilter)+' '+esc(drinkLabel)+'</div>'+
        '</div>'+
      '</div>';
    }).join('');
  }

  html += card(isDE?'🏆 Rangliste':'🏆 Leaderboard', lbInner);

  // ── Build buckets for charts (period != today) ────────────
  var buckets = period==='today' ? [] : buildDashBuckets(period);
  var labels  = buckets.map(function(b){ return b.label; });
  var drinks  = buckets.map(function(b){ return b.totalBeers||0; });
  var money   = buckets.map(function(b){ return b.totalMoney; });
  var bottles = buckets.map(function(b){ return b.totalBottles; });

  // Totals — for 'today' use sessionLogs directly
  var totalBeers = period==='today'
    ? sessionLogs.filter(function(l){return l.drink&&l.drink.startsWith('🍺');}).reduce(function(s,l){return s+(l.quantity||0);},0)
    : buckets.reduce(function(s,b){return s+(b.totalBeers||0);},0);
  var totalMoney = period==='today'
    ? sessionLogs.reduce(function(s,l){return s+(parseFloat(l.total_price)||0);},0)
    : money.reduce(function(s,v){return s+v;},0);
  var totalReplaced = STATE.replacements.reduce(function(s,r){ return s+(r.quantity||0); }, 0);
  var CRATE_SIZE_DB = 20;
  var freeFundTotal = (STATE.freeContributions||[]).reduce(function(s,c){ return s+(c.crates||0)*CRATE_SIZE_DB+(c.extra_bottles||0); },0);
  var freeFundUsed  = STATE.logs.reduce(function(s,l){ return (parseFloat(l.unit_price)||0)===0?s+(l.quantity||0):s; },0);
  var freeFundAvailDash = Math.max(0, freeFundTotal - freeFundUsed + totalReplaced);

  // ── Summary KPIs ──────────────────────────────────────────
  html += sg([
    {v:totalBeers,  l:isDE?'🍺 Biere gesamt':'🍺 Beers total'},
    {v:'€'+totalMoney.toFixed(2), l:isDE?'Ausgaben':'Spent', c:'g'},
    {v:totalReplaced, l:isDE?'🔄 Flaschen ersetzt':'🔄 Bottles replaced'},
    {v:freeFundAvailDash, l:isDE?'🍾 Freie Biere':'🍾 Free beers', c:freeFundAvailDash>0?'g':''}
  ]);

  // ── BAR CHART helper ─────────────────────────────────────
  function barChart(values, color, unit, title){
    if (!values.length) return '';
    var max = Math.max.apply(null, values) || 1;
    var W = 300, H = 120, pad = 30, barW = Math.max(4, Math.floor((W - pad) / values.length) - 3);
    var svg = '<svg viewBox="0 0 '+W+' '+(H+40)+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">';
    [0,0.25,0.5,0.75,1].forEach(function(t){
      var y = pad + (H - H*t);
      svg += '<line x1="'+pad+'" y1="'+y+'" x2="'+W+'" y2="'+y+'" stroke="#ece0d4" stroke-width="1"/>';
      if(t>0) svg += '<text x="'+(pad-4)+'" y="'+(y+4)+'" text-anchor="end" font-size="8" fill="#a8978a">'+(unit==='€'?'€':'')+(max*t).toFixed(unit==='€'?0:0)+(unit!=='€'?unit:'')+'</text>';
    });
    values.forEach(function(v,i){
      var bh = Math.max(2, (v/max)*H);
      var x = pad + i * ((W-pad)/values.length) + 2;
      var y = pad + H - bh;
      svg += '<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+bh+'" rx="3" fill="'+color+'" opacity="0.85"/>';
      if (v > 0) svg += '<text x="'+(x+barW/2)+'" y="'+(y-3)+'" text-anchor="middle" font-size="8" fill="'+color+'" font-weight="700">'+(unit==='€'?'€'+v.toFixed(0):v)+'</text>';
      var nth = values.length > 12 ? 3 : values.length > 6 ? 2 : 1;
      if (i % nth === 0) {
        svg += '<text x="'+(x+barW/2)+'" y="'+(pad+H+14)+'" text-anchor="middle" font-size="7.5" fill="#7a5200" transform="rotate(-35,'+(x+barW/2)+','+(pad+H+14)+')">'+(labels[i]||'')+'</text>';
      }
    });
    svg += '</svg>';
    return card(title, svg);
  }

  // ── THREE CHARTS (hidden for 'today') ─────────────────────
  if (period !== 'today'){
    html += barChart(drinks,  '#b5481f', '',  '🍺 '+(isDE?'Biere gesamt':'Total Beers'));
    html += barChart(money,   '#1f8a4f', '€', '💶 '+(isDE?'Ausgaben (€)':'Money Spent (€)'));
    html += barChart(bottles, '#0e6b8c', '',  '🍾 '+(isDE?'Freie Biere (geloggt)':'Free Beers Logged'));
  }

  // ── DRINK TYPE BREAKDOWN (all time) ─────────────────────
  var drinkTotals = {};
  STATE.logs.forEach(function(l){ drinkTotals[l.drink]=(drinkTotals[l.drink]||0)+(l.quantity||0); });
  var sortedDrinks = Object.entries(drinkTotals).sort(function(a,b){return b[1]-a[1];});
  var totalAll = sortedDrinks.reduce(function(s,e){return s+e[1];},0)||1;
  if (sortedDrinks.length) {
    html += card(isDE?'🥤 Getränke-Mix (gesamt)':'🥤 Drink Mix (all time)',
      sortedDrinks.map(function(e){
        var pct = Math.round(e[1]/totalAll*100);
        return '<div style="margin-bottom:9px">'+
          '<div style="display:flex;justify-content:space-between;margin-bottom:3px">'+
            '<span style="font-size:13px;font-weight:600;color:#1a0e08">'+emoji(e[0])+' '+esc(e[0].replace(/^.+? /,''))+'</span>'+
            '<span style="font-size:13px;font-weight:800;color:#b5481f">'+e[1]+' <span style="font-size:11px;color:#7a5200">('+pct+'%)</span></span>'+
          '</div>'+
          '<div style="height:8px;background:#f5ede4;border-radius:4px;overflow:hidden">'+
            '<div style="height:8px;background:linear-gradient(to right,#b5481f,#f8d878);border-radius:4px;width:'+pct+'%;transition:width .4s ease"></div>'+
          '</div>'+
        '</div>';
      }).join('')
    );
  }

  el.innerHTML = html;
}

function showLeaderboardPersonDetail(person, drinkFilter, period){
  var isDE = LANG==='de';

  // Determine session logs same way as leaderboard
  var logsToUse;
  if (period === 'today'){
    var cutoff = new Date(Date.now() - 36*60*60*1000).toISOString();
    logsToUse = STATE.logs.filter(function(l){
      var ts = l.logged_at || (l.date+'T00:00:00Z');
      return l.person===person && ts>=cutoff;
    });
  } else {
    logsToUse = STATE.logs.filter(function(l){ return l.person===person; });
  }

  // Filter by drink type
  logsToUse = logsToUse.filter(function(l){
    if (drinkFilter==='*') return true;
    if (drinkFilter==='🍺*') return l.drink&&l.drink.startsWith('🍺');
    return l.drink===drinkFilter;
  });

  // Group by date
  var byDate = {};
  logsToUse.forEach(function(l){
    if (!byDate[l.date]) byDate[l.date]={qty:0,drinks:{}};
    byDate[l.date].qty += (l.quantity||0);
    byDate[l.date].drinks[l.drink] = (byDate[l.date].drinks[l.drink]||0)+(l.quantity||0);
  });

  var sortState = {dir:'desc'};

  function renderRows(){
    var dates = Object.keys(byDate).sort(function(a,b){
      return sortState.dir==='desc' ? (byDate[b].qty-byDate[a].qty) : (byDate[a].qty-byDate[b].qty);
    });
    if (!dates.length) return '<div style="color:#7a5200;text-align:center;padding:20px">'+(isDE?'Keine Daten':'No data')+'</div>';
    return dates.map(function(d){
      var row = byDate[d];
      var drinkTags = Object.entries(row.drinks).map(function(e){
        return '<span style="background:#fce4d0;border-radius:6px;padding:2px 7px;font-size:12px;font-weight:700;color:#b5481f">'+emoji(e[0])+'×'+e[1]+'</span>';
      }).join(' ');
      return '<div onclick="closeModal();showPersonDayDetail(\''+esc(person)+'\',\''+esc(d)+'\')" '+
        'style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;margin-bottom:6px;background:#f5ede4;cursor:pointer">'+
        '<div style="min-width:72px;font-size:12px;font-weight:700;color:#5a3a28">'+fmtDate(d)+'</div>'+
        '<div style="flex:1;display:flex;flex-wrap:wrap;gap:4px">'+drinkTags+'</div>'+
        '<div style="font-size:18px;font-weight:900;color:#b5481f;min-width:28px;text-align:right">'+row.qty+'</div>'+
      '</div>';
    }).join('');
  }

  var total = logsToUse.reduce(function(s,l){return s+(l.quantity||0);},0);
  var drinkLabel = drinkFilter==='*'?(isDE?'Getränke':'drinks'):drinkFilter==='🍺*'?(isDE?'Biere':'beers'):drinkFilter.replace(/^.+? /,'').toLowerCase();

  var modalId = 'lb-detail-rows';

  showModal(
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'+
      '<div style="width:36px;height:36px;border-radius:50%;background:'+colorFor(person)+
        ';display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff">'+
        person[0].toUpperCase()+'</div>'+
      '<div>'+
        '<div style="font-size:16px;font-weight:800;color:#1a0e08">'+esc(person)+'</div>'+
        '<div style="font-size:11px;color:#7a5200">'+total+' '+esc(drinkLabel)+' · '+esc(periodLabels&&periodLabels[period]||period)+'</div>'+
      '</div>'+
    '</div>'+
    // Sort controls
    '<div style="display:flex;gap:8px;margin-bottom:10px">'+
      '<button id="lb-sort-desc" onclick="(function(){document.getElementById(\'lb-sort-desc\').style.background=\'#b5481f\';document.getElementById(\'lb-sort-desc\').style.color=\'#fff\';document.getElementById(\'lb-sort-asc\').style.background=\'#fff\';document.getElementById(\'lb-sort-asc\').style.color=\'#b5481f\';'+
        'var rows=document.getElementById(\'lb-detail-rows\');rows.innerHTML=\'\';'+
        // inline sort desc
        'var dates=Object.keys('+JSON.stringify(byDate)+').sort(function(a,b){return '+JSON.stringify(byDate)+'[b].qty-'+JSON.stringify(byDate)+'[a].qty;});'+
        'rows.innerHTML=dates.map(function(d){var r='+JSON.stringify(byDate)+'[d];return \'<div style="padding:8px 0;border-bottom:1px solid #e8dccc;display:flex;gap:10px"><span style=\\"min-width:80px;font-size:12px\\">\'+(d)+\'</span><span style=\\"font-weight:800;color:#b5481f\\">\'+(r.qty)+\'</span></div>\';}).join(\'\');})()" '+
        'style="flex:1;background:#b5481f;border:1.5px solid #b5481f;border-radius:8px;color:#fff;font-size:12px;font-weight:700;padding:7px;cursor:pointer">▼ '+(isDE?'Höchste zuerst':'Highest first')+'</button>'+
      '<button id="lb-sort-asc" onclick="(function(){document.getElementById(\'lb-sort-asc\').style.background=\'#b5481f\';document.getElementById(\'lb-sort-asc\').style.color=\'#fff\';document.getElementById(\'lb-sort-desc\').style.background=\'#fff\';document.getElementById(\'lb-sort-desc\').style.color=\'#b5481f\';})()" '+
        'style="flex:1;background:#fff;border:1.5px solid #b5481f;border-radius:8px;color:#b5481f;font-size:12px;font-weight:700;padding:7px;cursor:pointer">▲ '+(isDE?'Niedrigste zuerst':'Lowest first')+'</button>'+
    '</div>'+
    '<div id="'+modalId+'" style="max-height:350px;overflow-y:auto;margin-bottom:10px">'+renderRows()+'</div>'+
    '<div style="font-size:11px;color:#7a5200;text-align:center;margin-bottom:8px">'+
      (isDE?'Auf Datum tippen für Details':'Tap a date for full detail')+'</div>'+
    '<button class="modal-close" onclick="closeModal()" style="width:100%">'+esc(t('close'))+'</button>'
  );

  // Wire sort buttons properly after modal renders
  setTimeout(function(){
    var descBtn = document.getElementById('lb-sort-desc');
    var ascBtn  = document.getElementById('lb-sort-asc');
    var rowsEl  = document.getElementById(modalId);
    if (!descBtn||!ascBtn||!rowsEl) return;

    function rebuildRows(dir){
      sortState.dir = dir;
      rowsEl.innerHTML = renderRows();
    }
    descBtn.onclick = function(){ descBtn.style.background='#b5481f';descBtn.style.color='#fff'; ascBtn.style.background='#fff';ascBtn.style.color='#b5481f'; rebuildRows('desc'); };
    ascBtn.onclick  = function(){ ascBtn.style.background='#b5481f'; ascBtn.style.color='#fff'; descBtn.style.background='#fff';descBtn.style.color='#b5481f'; rebuildRows('asc'); };
  }, 80);
}

// Period labels helper for modal
var periodLabels = {today:'Today',weekly:'Weekly',monthly:'Monthly',yearly:'Yearly'};

function buildDashBuckets(period){
  // Group logs by week/month/year bucket
  var map = {};
  STATE.logs.forEach(function(l){
    var d = new Date(l.date+'T00:00:00');
    var key, label;
    if (period === 'weekly'){
      var jan4 = new Date(d.getFullYear(), 0, 4);
      var wk = Math.ceil((((d - jan4) / 86400000) + jan4.getDay() + 1) / 7);
      key = d.getFullYear()+'-W'+String(wk).padStart(2,'0');
      label = 'W'+wk;
    } else if (period === 'monthly'){
      key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
      var months = LANG==='de'
        ? ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez']
        : ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      label = months[d.getMonth()]+' '+d.getFullYear().toString().slice(2);
    } else {
      key = ''+d.getFullYear();
      label = ''+d.getFullYear();
    }
    if (!map[key]) map[key] = {label:label,key:key,totalDrinks:0,totalBeers:0,totalMoney:0,totalBottles:0,persons:{},beerPersons:{}};
    var qty = l.quantity||0;
    var isBeer = l.drink && l.drink.startsWith('🍺');
    map[key].totalDrinks += qty;
    map[key].totalMoney  += parseFloat(l.total_price)||0;
    if ((parseFloat(l.unit_price)||0)===0) map[key].totalBottles += qty;
    if (isBeer) map[key].totalBeers += qty;
    // Leaderboard counts beers only
    map[key].persons[l.person] = (map[key].persons[l.person]||0) + qty;
    if (isBeer) map[key].beerPersons[l.person] = (map[key].beerPersons[l.person]||0) + qty;
  });

  return Object.values(map).sort(function(a,b){ return a.key.localeCompare(b.key); }).map(function(b){
    // Leaderboard: top beer drinker only
    var topBeer = Object.entries(b.beerPersons).sort(function(a,c){return c[1]-a[1];})[0];
    b.topDrinker = topBeer ? topBeer[0] : null;
    b.topDrinkerCount = topBeer ? topBeer[1] : 0;
    return b;
  });
}

function renderFreeDrinks(){
  var el = document.getElementById('tab-freedrinks');
  var isDE = LANG==='de';
  var contribs = STATE.freeContributions || [];

  // ── Preserve form values across re-renders (realtime / loadAll wipes the DOM) ──
  var saved = {
    name:   (document.getElementById('fc-name')   || {}).value,
    drink:  (document.getElementById('fc-drink')  || {}).value,
    crates: (document.getElementById('fc-crates') || {}).value,
    extra:  (document.getElementById('fc-extra')  || {}).value,
    paidto: (document.getElementById('fc-paidto') || {}).value,
    amount: (document.getElementById('fc-amount') || {}).value,
    date:   (document.getElementById('fc-date')   || {}).value,
    note:   (document.getElementById('fc-note')   || {}).value,
  };

  // ── Compute total contributed bottles per drink type ──
  // A crate of beer = 20 bottles (standard German crate)
  var CRATE_SIZE = 20;
  var contributed = {}; // drink → total bottles contributed
  contribs.forEach(function(c){
    var key = c.drink;
    if (!key) return; // skip if drink type was not set
    contributed[key] = (contributed[key]||0) + (c.crates||0)*CRATE_SIZE + (c.extra_bottles||0);
  });

  // ── Compute consumed free drinks (unit_price=0) from logs ──
  var consumed = {};
  STATE.logs.forEach(function(l){
    if ((parseFloat(l.unit_price)||0) === 0){
      consumed[l.drink] = (consumed[l.drink]||0) + (l.quantity||0);
    }
  });

  // ── Subtract replacements — replaced bottles go back into the fund ──
  // A replacement means those bottles were physically returned, so they
  // should not count as "consumed" against the free drink balance.
  STATE.replacements.forEach(function(r){
    if (r.drink && consumed[r.drink]){
      consumed[r.drink] = Math.max(0, consumed[r.drink] - (r.quantity||0));
    }
  });

  // ── Available balance per drink type ──
  var allDrinks = Array.from(new Set(Object.keys(contributed).concat(Object.keys(consumed))));
  var available = {};
  allDrinks.forEach(function(d){ available[d] = Math.max(0,(contributed[d]||0)-(consumed[d]||0)); });

  var html = '';

async function addFreeContrib(){
  var isDE = LANG==='de';
  var name   = (document.getElementById('fc-name').value||'').trim();
  var drinkEl = document.getElementById('fc-drink');
  var drink  = drinkEl ? drinkEl.value.trim() : '';
  var crates = parseInt(document.getElementById('fc-crates').value)||0;
  var extra  = parseInt(document.getElementById('fc-extra').value)||0;
  var paidTo = (document.getElementById('fc-paidto').value||'').trim();
  var amount = parseFloat(document.getElementById('fc-amount').value)||0;
  var date   = document.getElementById('fc-date').value || td();
  var note   = (document.getElementById('fc-note').value||'').trim();

  if (!name){ notify(isDE?'Bitte Namen eingeben':'Please enter your name',true); return; }
  if (!drink){ notify(isDE?'Bitte Getränkeart wählen':'Please select a drink type',true); return; }
  if (crates===0 && extra===0){ notify(isDE?'Bitte Kisten oder Flaschen eingeben':'Please enter crates or bottles',true); return; }

  var obj = {
    person: name, drink: drink,
    crates: crates, extra_bottles: extra,
    paid_to: paidTo||null, amount: amount||0,
    date: date, note: note||null,
    added_by: CURRENT_NAME
  };
  if (IS_ADMIN && CURRENT_USER) obj.user_id = CURRENT_USER.id;
  if (IS_GUEST) obj.guest_token = GUEST_TOKEN;

  var {data: fcData, error} = await SB.from('free_contributions').insert(obj).select().single();
  if (error){
    var msg = error.message || error.details || error.hint || JSON.stringify(error);
    notify('Save error: '+msg, true);
    console.error('free_contributions insert error:', error, 'obj:', obj);
    return;
  }

  notify('🍾 '+(isDE?'Beitrag gespeichert':'Contribution saved')+' · '+(crates*20+extra)+' '+(isDE?'Fl.':'btl'));
  // Offer undo for 6 seconds after saving
  var savedId = fcData && fcData.id;
  if (savedId) {
    notifyWithUndo('🍾 '+(crates*20+extra)+' '+(isDE?'Fl. gespeichert':'btl saved'),
      async function(){ await SB.from('free_contributions').delete().eq('id',savedId); await loadAll(); }
    );
  }

  // Clear quantity/money fields but keep name and drink for next quick entry
  ['fc-crates','fc-extra','fc-paidto','fc-amount','fc-note'].forEach(function(id){
    var el2 = document.getElementById(id);
    if (el2) el2.value = id==='fc-crates'||id==='fc-extra' ? '0' : '';
  });

  await loadAll();
}

async function deleteFreeContrib(id){
  var isDE = LANG==='de';
  if (!await appConfirm(isDE?'Beitrag löschen?':'Delete this contribution?')) return;

  // Read before delete (for undo)
  var {data: snapshot, error: fetchErr} = await SB.from('free_contributions').select('*').eq('id',id).single();
  if (fetchErr){ notify('Error reading entry: '+fetchErr.message, true); return; }

  var {error} = await SB.from('free_contributions').delete().eq('id', id);
  if (error){
    notify('Delete error: '+error.message, true);
    console.error('deleteFreeContrib error:', error);
    return;
  }

  // Verify it was actually deleted (RLS may silently block)
  var {data: check} = await SB.from('free_contributions').select('id').eq('id',id).maybeSingle();
  if (check){
    notify(isDE
      ? 'Löschen fehlgeschlagen — bitte SQL-Fix ausführen (supabase_free_contrib_fix.sql)'
      : 'Delete failed — please run supabase_free_contrib_fix.sql in Supabase', true);
    return;
  }

  await loadAll();
  if (snapshot){
    var restoreObj = Object.assign({}, snapshot);
    delete restoreObj.id; delete restoreObj.created_at;
    notifyWithUndo(isDE?'Beitrag gelöscht':'Contribution deleted',
      async function(){ await SB.from('free_contributions').insert(restoreObj); await loadAll(); }
    );
  } else {
    notify(isDE?'Beitrag gelöscht':'Contribution deleted');
  }
}

function showPersonPayModal(person){
  var isDE = LANG==='de';

  // ── Compute this person's balance ──
  var spent = STATE.logs.reduce(function(s,l){
    return l.person===person&&(parseFloat(l.unit_price)||0)>0 ? s+(parseFloat(l.total_price)||0) : s;
  },0);
  var paid = STATE.payments.reduce(function(s,p){
    var pp=(p.payers||'').split(',').map(function(x){return x.trim();});
    return pp.indexOf(person)!==-1 ? s+(parseFloat(p.amount)||0) : s;
  },0);
  var owes = Math.max(0, spent-paid);

  // ── Team bill ──
  var totalBill = STATE.logs.reduce(function(s,l){ return s+(parseFloat(l.total_price)||0); },0);
  var totalPaidSoFar = STATE.payments.reduce(function(s,p){ return s+(parseFloat(p.amount)||0); },0);

    .filter(function(l){ return (parseFloat(l.unit_price)||0)>0; })
    .map(function(l){ return l.person; })

  var guestDrinkers = activeDrinkers.filter(function(n){ return knownNames.indexOf(n)===-1; });
  var hasGuests = guestDrinkers.length > 0;

function ppmSetMode(mode){
  window._ppmMode = mode;

  var eqInfo = document.getElementById('ppm-equal-info');

  } else {

function ppmToggleGuest(name, teamOutstanding, splitCount){
  if (!window._ppmGuestsIncluded) window._ppmGuestsIncluded = {};
  window._ppmGuestsIncluded[name] = !window._ppmGuestsIncluded[name];
  var btn = document.getElementById('ppm-guest-'+name.replace(/\W/g,'_'));
  if (btn){
    var on = window._ppmGuestsIncluded[name];
    btn.textContent = (on?'✓ ':'✗ ')+'👤 '+name;
    btn.style.background = on?'#e8d070':'#f0f0f0';
    btn.style.borderColor = on?'#c8a030':'#ccc';
    btn.style.color = on?'#5a3a00':'#888';
  }
  // Recompute equal split with updated guest inclusion
  var excluded = Object.keys(window._ppmGuestsIncluded).filter(function(g){ return !window._ppmGuestsIncluded[g]; }).length;
  var newCount = Math.max(1, splitCount - excluded);
  var eqInfo = document.getElementById('ppm-equal-info');
  if (eqInfo){
    eqInfo.innerHTML = (LANG==='de'?'Gleichmäßige Aufteilung':'Equal split')+': <strong>€'+(teamOutstanding/newCount).toFixed(2)+'</strong> × '+newCount+' '+(LANG==='de'?'Personen':'people');
  }
  window._ppmAdjustedCount = newCount;
}

function ppmUpdateRemaining(teamOutstanding, splitCount){
  var inp = document.getElementById('ppm-contrib-amt');
  var rem = document.getElementById('ppm-remaining');
  if (!inp || !rem) return;
  var val = parseFloat(inp.value)||0;
  var left = teamOutstanding - val;
  rem.textContent = left > 0.005
    ? '€'+left.toFixed(2)+' '+(LANG==='de'?'verbleibend für das Team':'remaining for the team')
    : left < -0.005
    ? '⚠️ '+(LANG==='de'?'Überbezahlt um':'Overpaying by')+' €'+Math.abs(left).toFixed(2)
    : '✅ '+(LANG==='de'?'Rechnung vollständig beglichen!':'Full bill covered!');
  rem.style.color = left > 0.005 ? '#7a5200' : left < -0.005 ? '#c4392b' : '#1f8a4f';
}

async function recordPersonPayment(person, mode, teamOutstanding, splitCount){
  var isDE = LANG==='de';
  var amount = 0;
  var note = '';

  if (mode === 'own'){
    var inp = document.getElementById('ppm-own-amt');
    amount = parseFloat(inp ? inp.value : 0)||0;
    note = isDE?'Eigene Rechnung':'Own tab';

  } else if (mode === 'contrib'){
    var ppmMode = window._ppmMode || 'equal';
    if (ppmMode === 'equal'){
      var adjCount = window._ppmAdjustedCount || splitCount;
      amount = teamOutstanding / Math.max(1, adjCount);
      var excluded = window._ppmGuestsIncluded
        ? Object.keys(window._ppmGuestsIncluded).filter(function(g){ return !window._ppmGuestsIncluded[g]; })
        : [];
      note = (isDE?'Gleichmäßige Aufteilung':'Equal split')+
        (excluded.length?' ('+(isDE?'ohne':'excl.')+' '+excluded.join(', ')+')':'');
    } else {
      var custInp = document.getElementById('ppm-contrib-amt');
      amount = parseFloat(custInp ? custInp.value : 0)||0;
      note = isDE?'Eigener Beitrag zur Team-Rechnung':'Custom contribution to team bill';
    }
  }

  if (amount <= 0){ notify(isDE?'Bitte Betrag eingeben':'Please enter an amount', true); return; }

  var obj = {
    date: td(), payers: person, non_drinkers: '',
    amount: amount, note: note,
    added_by: CURRENT_NAME, logged_by: CURRENT_NAME
  };
  if (IS_ADMIN && CURRENT_USER) obj.user_id = CURRENT_USER.id;
  if (IS_GUEST) obj.guest_token = GUEST_TOKEN;

  var {error} = await SB.from('payments').insert(obj);
  if (error){ notify('Error: '+error.message, true); return; }
  await audit('ADD_PAYMENT','payments',null,{person:person,amount:amount,mode:mode,note:note});
  closeModal();

  // Check if person's tab is now settled
  var newPaid = STATE.payments.reduce(function(s,p){
    var pp=(p.payers||'').split(',').map(function(x){return x.trim();});
    return pp.indexOf(person)!==-1?s+(parseFloat(p.amount)||0):s;
  },0) + amount;
  var spent = STATE.logs.reduce(function(s,l){
    return l.person===person&&(parseFloat(l.unit_price)||0)>0 ? s+(parseFloat(l.total_price)||0) : s;
  },0);

  if (newPaid >= spent - 0.005){
    notify('✅ '+(isDE?esc(person)+' Tab beglichen!':esc(person)+'\'s tab is settled!'));
  } else {
    notify('💳 €'+amount.toFixed(2)+' '+(isDE?'erfasst':'recorded')+' · '+(isDE?'noch offen':'still owed')+': €'+(spent-newPaid).toFixed(2));
  }
  await loadAll();
  renderTab('payments');
}

async function fetchSettleMessage(rows, totalOwed, allSettled){
  var today = new Date().toISOString().split('T')[0];
  var cacheKey = 'settle_msg_'+today+'_'+LANG;
  try {
    var cached = JSON.parse(localStorage.getItem(cacheKey)||'null');
    if (cached && cached.msg) return cached.msg;
  } catch(e){}

  // Build context
  var biggest = rows.filter(function(r){return r.owes>0.005;}).sort(function(a,b){return b.owes-a.owes;})[0];
  var topDebtor = biggest ? biggest.name : null;
  var topAmount = biggest ? biggest.owes.toFixed(2) : null;

  var isDE = LANG === 'de';
  var context = allSettled
    ? (isDE ? 'Alle haben bezahlt, nichts mehr offen.' : 'Everyone has paid, nothing is outstanding.')
    : topDebtor
    ? (isDE
        ? topDebtor+' schuldet am meisten: €'+topAmount+'. Insgesamt ausstehend: €'+totalOwed.toFixed(2)+'.'
        : topDebtor+' owes the most: €'+topAmount+'. Total outstanding: €'+totalOwed.toFixed(2)+'.')
    : '';

  var prompt = (isDE ? 'Antworte NUR auf Deutsch. ' : 'Respond ONLY in English. ')+
    'You are the hilarious mascot of an amateur tennis club. '+
    'Generate ONE very short (max 25 words), genuinely funny message about friends paying the bar bill after tennis. '+
    (allSettled
      ? 'Everyone has paid up — celebrate that surprisingly! Be sarcastic/shocked/amazed that everyone actually paid.'
      : 'Some people still owe money. Be dramatically outraged, or like a disappointed parent, or use tennis metaphors to guilt-trip the debtors. Context: '+context)+
    ' Use 1 emoji. Pure punchline only — no label, no preamble.';

  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:80,
        messages:[{role:'user', content: prompt}]
      })
    });
    if(!res.ok) throw new Error('API '+res.status);
    var data = await res.json();
    var msg = (data.content&&data.content[0]&&data.content[0].text||'').trim();
    if(msg){
      try{ localStorage.setItem(cacheKey, JSON.stringify({msg:msg})); }catch(e){}
      return '<em>'+esc(msg)+'</em>';
    }
  } catch(e){ console.warn('Settle message API failed:', e.message); }

  // Fallback static funny lines
  var fallbacks_en = [
    "💸 Venmo, cash, kidney — we accept all forms of payment.",
    "🎾 Double fault on your bank account. Pay up, champ.",
    "😤 Your tab is longer than the longest match in Wimbledon history.",
    "🧾 The bill doesn't do tiebreaks. You either pay or you don't.",
    "🍺 The bar remembers everything. Even if you don't.",
  ];
  var fallbacks_de = [
    "💸 Überweisung, Bargeld, Niere — wir akzeptieren alles.",
    "🎾 Doppelfehler auf deinem Konto. Zahl, Champ.",
    "😤 Dein Tab ist länger als das längste Match in Wimbledon.",
    "🧾 Die Rechnung macht kein Tiebreak. Zahlen oder nicht zahlen.",
    "🍺 Die Bar erinnert sich an alles. Auch wenn du es nicht tust.",
  ];
  var list = isDE ? fallbacks_de : fallbacks_en;
  return '<em>'+esc(list[Math.floor(Math.random()*list.length)])+'</em>';
}

// "Replace" path: zero out the priced drinks for the selected payers/date
// so they stop counting as money owed and instead show up as bottles owed.
async function convertToReplace(){
  var date = STATE.payDate;
  var payers = STATE.payPayers;
  if (!payers.length) { notify('Select who this is for', true); return; }

  // Find this date's priced (unpaid) drink entries for these people
  var targets = STATE.logs.filter(function(l){
    return l.date === date
      && payers.indexOf(l.person) !== -1
      && (parseFloat(l.unit_price)||0) > 0;
  });

  if (!targets.length) {
    notify('No priced drinks found for '+payers.join(', ')+' on '+fmtDate(date)+' to convert', true);
    return;
  }

  var movedCount = 0;
  for (var i=0; i<targets.length; i++) {
    var l = targets[i];
    var {error} = await SB.from('drink_logs').update({ unit_price: 0, total_price: 0 }).eq('id', l.id);
    if (!error) movedCount += (l.quantity||0);
  }

  await audit('CONVERT_TO_REPLACE','drink_logs',null,{date:date,payers:payers.join(', '),drinks_moved:movedCount});
  STATE.payPayers=[];STATE.payNonDrinkers=[];STATE.payAmount='';STATE.payNote='';
  notify(movedCount+' drink'+(movedCount!==1?'s':'')+' moved to Replace tab 🤐');
  await loadAll();
  switchTabByName('replace');
}

function switchTabByName(tab){
  var btn = [...document.querySelectorAll('nav button')].find(function(b){
    return b.getAttribute('onclick') && b.getAttribute('onclick').indexOf("'"+tab+"'") !== -1;
  });
  if (btn) switchTab(tab, btn);
}

          '<div class="es">'+esc(l.drink.replace(/^.+? /,''))+(l.total_price>0?' · €'+parseFloat(l.unit_price).toFixed(2)+' ea · €'+parseFloat(l.total_price).toFixed(2):'')+(l.note?' · '+esc(l.note):'')+'</div>'+
          '<div class="es" style="color:#6a3020">'+loggedByLine+'</div>'+
          '</div></div>'+delControls+'</div>';
      }).join('')+'</div></div>';
  }).join('');
}

// Returns true if this drink type counts as a "beer/radler" for crate calculation
function isBeerDrink(drink){
  var d = (drink||'').toLowerCase();
  return d.indexOf('beer') !== -1 || d.indexOf('radler') !== -1 || d.indexOf('bier') !== -1;
}

function isWaterDrink(drink){
  var d = (drink||'').toLowerCase();
  return d.indexOf('water') !== -1 || d.indexOf('wasser') !== -1;
}

var CRATE_SIZE_BEER  = 20;
var CRATE_SIZE_WATER = 6;
var CRATE_SIZE = 20; // kept for backward compat
var CRATE_PRICE_BEER  = parseFloat(localStorage.getItem('crate_price_beer'))||12;  // €12 per crate default
var CRATE_PRICE_WATER = parseFloat(localStorage.getItem('crate_price_water'))||5;  // €5 per crate default

function setCratePrice(type, val){
  if (type==='beer')  { CRATE_PRICE_BEER  = parseFloat(val)||12; localStorage.setItem('crate_price_beer',  CRATE_PRICE_BEER); }
  if (type==='water') { CRATE_PRICE_WATER = parseFloat(val)||5;  localStorage.setItem('crate_price_water', CRATE_PRICE_WATER); }
}

function getCratePrice(drink){
  if (isBeerDrink(drink))  return CRATE_PRICE_BEER;
  if (isWaterDrink(drink)) return CRATE_PRICE_WATER;
  return 0;
}

// Calculate the value (in €) of a given number of bottles of a drink
function calcDrinkValue(drink, count){
  var cs = crateSize(drink);
  var cp = getCratePrice(drink);
  if (!cs || !cp) return 0;
  return (count / cs) * cp;
}

function crateSize(drink){
  if (isWaterDrink(drink)) return CRATE_SIZE_WATER;
  if (isBeerDrink(drink))  return CRATE_SIZE_BEER;
  return 0; // 0 = no crate grouping
}

function hasCrates(drink){ return crateSize(drink) > 0; }

// Format a count as "X crate(s) + Y btl" for any crate-eligible drink
function fmtCrates(drink, count, isDE){
  var cs = crateSize(drink);
  if (!cs || count < cs) return count + ' ' + (isDE ? 'Fl.' : 'btl');
  var crates = Math.floor(count / cs);
  var rem = count % cs;
  var cl = isDE ? ('Kiste'+(crates>1?'n':'')) : ('crate'+(crates>1?'s':''));
  if (rem === 0) return crates + ' ' + cl;
  return crates + ' ' + cl + ' + ' + rem;
}

function fmtDrinkCount(drink, count, isDE){
  var cs = crateSize(drink);
  if (cs && count >= cs) return fmtCrates(drink, count, isDE);
  return count + (isDE ? ' Fl.' : ' btl');
}

function renderReplace(){
  var el=document.getElementById('tab-replace');

  // ── Save note input values before re-render (realtime wipes DOM) ──
  var savedNotes = {};
  document.querySelectorAll('[id^="repl-note-"]').forEach(function(inp){
    if (inp.value) savedNotes[inp.id] = inp.value;
  });
  var cbd={},pbd={};
  STATE.logs.forEach(function(l){cbd[l.date]=(cbd[l.date]||0)+(parseFloat(l.total_price)||0);});
  STATE.payments.forEach(function(p){pbd[p.date]=(pbd[p.date]||0)+(parseFloat(p.amount)||0);});
  var cdd={},rdd={};

  // ── Session cutoff: only show logs AFTER the last closed session ──
  var closedSessions = JSON.parse(localStorage.getItem('boc_closed_replace_sessions')||'[]');
  var lastSession = closedSessions.length ? closedSessions[closedSessions.length-1] : null;

  // Cutoff timestamp: if we have a precise close timestamp, use it.
  // If only a date (old sessions), use end of the PREVIOUS day — meaning
  // all logs on the close date itself are always visible in the new session.
  var sessionCutoffTs = null;
  if (lastSession) {
    if (lastSession.closedTimestamp) {
      sessionCutoffTs = lastSession.closedTimestamp;
    } else {
      // Old session stored only a date — treat cutoff as midnight before that date
      // so everything on closedAt date is visible (conservative, user-friendly)
      var d = new Date(lastSession.closedAt + 'T00:00:00.000Z');
      d.setDate(d.getDate() - 1);
      sessionCutoffTs = d.toISOString().replace('T00:00:00.000Z','T23:59:59.999Z');
    }
  }

  STATE.logs.forEach(function(l){
    var unitPrice = parseFloat(l.unit_price)||0;
    if (unitPrice > 0) return;
    // Compare using logged_at timestamp if available, otherwise date only
    if (sessionCutoffTs){
      var logTs = l.logged_at || (l.date + 'T00:00:00.000Z');
      if (logTs <= sessionCutoffTs) return;
    }
    if(!cdd[l.date])cdd[l.date]={};
    cdd[l.date][l.drink]=(cdd[l.date][l.drink]||0)+(l.quantity||0);
  });
  STATE.replacements.forEach(function(r){
    if(!r.quantity || r.drink === '_SESSION_CLOSED_') return;
    if (sessionCutoffTs){
      var repTs = r.logged_at || (r.for_date + 'T00:00:00.000Z');
      if (repTs <= sessionCutoffTs) return;
    }
    if(!rdd[r.for_date])rdd[r.for_date]={};
    rdd[r.for_date][r.drink]=(rdd[r.for_date][r.drink]||0)+(r.quantity||0);
  });

  // Build ALL-TIME per-drink totals (not day-scoped)
  // Free drink fund balance also offsets the replacement owed count:
  // if someone bought crates for the fund, those cover the replacement debt first.
  var CRATE_SIZE_FREE = 20;
  var freeFundContrib = {}; // drink → total bottles in free fund
  (STATE.freeContributions||[]).forEach(function(c){
    if (!c.drink) return;
    freeFundContrib[c.drink] = (freeFundContrib[c.drink]||0) + (c.crates||0)*CRATE_SIZE_FREE + (c.extra_bottles||0);
  });
  // Free fund consumed = zero-price logs already covered by the fund
  // (all zero-price logs, minus replacements already logged)
  var freeFundConsumed = {};
  STATE.logs.forEach(function(l){
    if ((parseFloat(l.unit_price)||0) === 0)
      freeFundConsumed[l.drink] = (freeFundConsumed[l.drink]||0) + (l.quantity||0);
  });
  STATE.replacements.forEach(function(r){
    if (r.drink && (r.quantity||0) > 0 && freeFundConsumed[r.drink])
      freeFundConsumed[r.drink] = Math.max(0, freeFundConsumed[r.drink] - (r.quantity||0));
  });
  // Available free fund per drink (unused bottles in fund)
  var freeFundAvail = {};
  Object.keys(freeFundContrib).forEach(function(d){
    freeFundAvail[d] = Math.max(0, (freeFundContrib[d]||0) - (freeFundConsumed[d]||0));
  });

  var ob={};
  Object.keys(cdd).forEach(function(d){
    Object.keys(cdd[d]).forEach(function(drink){
      if(!ob[drink])ob[drink]={owed:0,replaced:0,remaining:0,byDate:{}};
      var owed = cdd[d][drink]||0;
      var repd = Math.min((rdd[d]&&rdd[d][drink])||0, owed);
      ob[drink].owed += owed;
      ob[drink].replaced += repd;
      ob[drink].remaining += Math.max(0, owed - repd);
      ob[drink].byDate[d] = {owed:owed, replaced:repd, remaining:Math.max(0,owed-repd)};
    });
  });

  // Apply free fund: fund contributions directly cover free drinks (fund = pre-paid stock)
  // Use total contributed, not net available — the fund was paid to cover these drinks
  Object.keys(ob).forEach(function(drink){
    var fundContrib = freeFundContrib[drink]||0;
    var fundCovers = Math.min(ob[drink].remaining, fundContrib);
    if (fundCovers > 0){
      ob[drink].replaced += fundCovers;
      ob[drink].remaining = Math.max(0, ob[drink].remaining - fundCovers);
      ob[drink].fundCovers = fundCovers;
    }
  });

  // Filter to drinks that still need replacing (remaining > 0 after fund covers them)
  // Drinks fully covered by the free fund should NOT appear in the replace tab at all
  var allDrinks = Object.keys(ob).filter(function(d){ return ob[d].remaining > 0; });

  var tot_o = allDrinks.reduce(function(s,d){return s+ob[d].owed;},0);
  var tot_r = allDrinks.reduce(function(s,d){return s+ob[d].replaced;},0);
  var tot_rem = allDrinks.reduce(function(s,d){return s+ob[d].remaining;},0);

  if(!allDrinks.length){
    var emptyHtml = '<div style="text-align:center;padding:24px 16px">';
    emptyHtml += '<div style="font-size:48px;margin-bottom:12px">✅</div>';
    emptyHtml += '<div style="font-size:16px;font-weight:800;color:#1f8a4f;margin-bottom:6px">'+esc(t('allSettledUp'))+'</div>';
    emptyHtml += '<div style="font-size:13px;color:#5a3a28;margin-bottom:16px">'+esc(t('noUnsettledDays'))+'</div>';
    if (lastSession){
      emptyHtml += '<div style="font-size:12px;background:#d4f5e2;border-radius:8px;padding:8px 14px;color:#1a4a2a;margin-bottom:14px">'+
        '🗄 '+(LANG==='de'?'Letzte Sitzung abgeschlossen am':'Last session closed on')+' <strong>'+fmtDate(lastSession.closedAt)+'</strong>'+
        (lastSession.note?' · '+esc(lastSession.note):'')+
      '</div>';
    }
    emptyHtml += '</div>';
    // Still show closed sessions and replacement log even when running total is empty
    if (closedSessions.length){
      emptyHtml += '<div class="card"><div style="font-size:13px;font-weight:800;color:#5a3a28;margin-bottom:10px">🗄 '+(LANG==='de'?'Abgeschlossene Sitzungen':'Closed Sessions')+'</div>';
      closedSessions.slice().reverse().forEach(function(sess,i){
        emptyHtml += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0e8dc">'+
          '<span style="font-size:11px;color:#7a5200;flex:1">'+fmtDate(sess.closedAt)+(sess.note?' · '+esc(sess.note):'')+(sess.closedBy?' · by '+esc(sess.closedBy):'')+'</span>'+
          '<span style="font-size:11px;background:#d4f5e2;color:#1f8a4f;border-radius:6px;padding:1px 7px;font-weight:700">✅</span>'+
          '<button onclick="reopenReplaceSession('+i+')" style="background:none;border:none;color:#b5481f;cursor:pointer;font-size:12px;font-weight:700">↩</button>'+
        '</div>';
      });
      emptyHtml += '</div>';
    }
    if(STATE.replacements.length){
      var visReps = STATE.replacements.filter(function(r){ return r.drink !== '_SESSION_CLOSED_' && (r.quantity||0) > 0; });
      if(visReps.length){
        emptyHtml += card(t('replacementLog'), visReps.map(function(r){
          var canDel=isMine(r);
          return '<div class="entry"><div class="entry-l"><span class="ej">'+emoji(r.drink)+'</span><div>'+
            '<div class="en">'+r.quantity+'× '+esc(r.drink.replace(/^.+? /,''))+'</div>'+
            '<div class="es">'+esc(t('forDate'))+' '+fmtDate(r.for_date)+(r.replaced_by?' · by '+esc(r.replaced_by):'')+(r.note?' · '+esc(r.note):'')+'</div>'+
            '</div></div>'+delEditBtns('replacements',r.id,'Replacement for '+fmtDate(r.for_date),canDel,r)+'</div>';
        }).join(''));
      }
    }
    el.innerHTML = emptyHtml;
    return;
  }

  var isDE = LANG === 'de';

  // ── UNDO + SUMMARY STATS ──────────────────────────────────
  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
    '<span style="font-size:13px;font-weight:600;color:#1a0e08">'+(STATE.undoStack.length?STATE.undoStack.length+' '+t('actionsInHistory'):t('noActions'))+'</span>'+
    '<button onclick="undoReplace()" '+(STATE.undoStack.length?'':'disabled')+
    ' style="background:'+(STATE.undoStack.length?'#3a261c':'#f5ede4')+';border:1px solid '+(STATE.undoStack.length?'#c75a2a':'#e8dccc')+
    ';border-radius:8px;padding:6px 13px;cursor:pointer;color:'+(STATE.undoStack.length?'#e8c9a0':'#8a7568')+';font-size:12px;font-weight:600">'+
    esc(t('undoBtn'))+(STATE.undoStack.length?' ('+STATE.undoStack.length+')':'')+'</button></div>';

  // Crate price settings (editable inline)
  html += '<div style="display:flex;gap:10px;margin-bottom:12px;align-items:center;flex-wrap:wrap">'+
    '<span style="font-size:13px;font-weight:800;color:#1a0e08;white-space:nowrap">📦 '+(isDE?'Kisten-Preis:':'Crate prices:')+'</span>'+
    '<div style="display:flex;align-items:center;gap:5px;background:#fff;border:1.5px solid #e8dccc;border-radius:8px;padding:5px 10px">'+
      '<span style="font-size:12px;color:#7a2e10">🍺 €</span>'+
      '<input type="number" min="0" step="0.5" value="'+CRATE_PRICE_BEER+'" style="width:50px;border:none;outline:none;font-size:14px;font-weight:700;color:#b5481f;text-align:center" '+
        'onchange="setCratePrice(\'beer\',this.value)" title="'+(isDE?'Preis pro Kiste Bier':'Price per crate of beer')+'"/>'+
      '<span style="font-size:11px;color:#a8978a">/'+CRATE_SIZE_BEER+'</span>'+
    '</div>'+
    '<div style="display:flex;align-items:center;gap:5px;background:#fff;border:1.5px solid #e8dccc;border-radius:8px;padding:5px 10px">'+
      '<span style="font-size:12px;color:#0e6b8c">💧 €</span>'+
      '<input type="number" min="0" step="0.5" value="'+CRATE_PRICE_WATER+'" style="width:50px;border:none;outline:none;font-size:14px;font-weight:700;color:#0e6b8c;text-align:center" '+
        'onchange="setCratePrice(\'water\',this.value)" title="'+(isDE?'Preis pro Kiste Wasser':'Price per crate of water')+'"/>'+
      '<span style="font-size:11px;color:#a8978a">/'+CRATE_SIZE_WATER+'</span>'+
    '</div>'+
  '</div>';

  html+=sg([{v:tot_o,l:t('bottlesOwed')},{v:tot_r,l:t('replaced'),c:'g'},{v:tot_rem,l:t('stillOwed'),c:tot_rem>0?'r':'g'}]);

  // ── CRATE SUMMARY BANNER (beer + water) ──────────────────
  var crateEligible = allDrinks.filter(function(d){ return hasCrates(d) && ob[d].owed >= crateSize(d); });
  if (crateEligible.length) {
    html += '<div style="background:linear-gradient(135deg,#f5e8da,#fce4d0);border:2px solid #b5481f;border-radius:13px;padding:14px 16px;margin-bottom:12px">'+
      '<div style="font-size:12px;font-weight:800;color:#7a2e10;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px">📦 '+(isDE?'Kisten-Übersicht':'Crate Summary')+'</div>'+
      crateEligible.map(function(d){
        var v = ob[d], cs = crateSize(d);
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(181,72,31,.12)">'+
          '<div>'+
            '<div style="font-size:14px;font-weight:700;color:#3a1a0a">'+emoji(d)+' '+esc(d.replace(/^.+? /,''))+'</div>'+
            '<div style="font-size:12px;color:#7a2e10">'+fmtCrates(d,v.owed,isDE)+' '+(isDE?'gesamt':'total')+'</div>'+
          '</div>'+
          '<div style="text-align:right">'+
            (v.remaining>0
              ? '<div style="font-size:15px;font-weight:800;color:#c4392b">'+fmtCrates(d,v.remaining,isDE)+' '+esc(isDE?'fehlt':'left')+'</div>'
              : '<div style="font-size:14px;font-weight:800;color:#1f8a4f">✓ '+(isDE?'Erledigt':'Done')+'</div>')+
          '</div>'+
        '</div>';
      }).join('')+
    '</div>';
  }

  // ── PER-DRINK ALL-TIME CARDS (not date-scoped) ──────────
  // Closed sessions: store cutoff dates in localStorage
  var closedSessions = JSON.parse(localStorage.getItem('boc_closed_replace_sessions')||'[]');
  // Active: only drinks with activity AFTER the last closed date
  var lastClosed = closedSessions.length ? closedSessions[closedSessions.length-1].closedAt : null;

  // Filter allDrinks to only those with remaining owed (already done above)
  // but also allow showing "Done" ones if not yet closed
  var activeDrinks = Object.keys(ob).filter(function(d){ return ob[d].owed > 0; });

  // All-done check for the whole section
  var allDone = activeDrinks.length > 0 && activeDrinks.every(function(d){ return ob[d].remaining === 0; });

  // Auto-close: if all done and no existing closed session with today's timestamp, close automatically
  if (allDone) {
    var alreadyClosedToday = closedSessions.some(function(s){
      return s.closedAt === td() && s.autoClose;
    });
    if (!alreadyClosedToday) {
      // Schedule auto-close after a short delay so the user sees the green state first
      setTimeout(function(){
        var now = new Date().toISOString();
        var sessions2 = JSON.parse(localStorage.getItem('boc_closed_replace_sessions')||'[]');
        // Only auto-close if still all done (user may have added more)
        var stillDone = activeDrinks.every(function(d){ return ob[d].remaining === 0; });
        if (stillDone && !sessions2.some(function(s){ return s.closedTimestamp && s.closedTimestamp >= now.slice(0,10); })){
          sessions2.push({ closedAt: td(), closedTimestamp: now, note: '', closedBy: 'auto', autoClose: true });
          localStorage.setItem('boc_closed_replace_sessions', JSON.stringify(sessions2));
          notify('✅ '+(LANG==='de'?'Alle ersetzt — Sitzung automatisch abgeschlossen!':'All replaced — session auto-closed! 🎉'));
          renderReplace();
        }
      }, 2200);
    }
  }

  html += '<div class="card">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">';
  html += '<div style="font-size:13px;font-weight:800;color:#5a3a28">'+(isDE?'Alle Getränke — Gesamt':'All Drinks — Running Total')+'</div>';

    html += '<span style="background:#d4f5e2;color:#1f8a4f;border-radius:8px;padding:4px 12px;font-size:12px;font-weight:800">✅ '+(isDE?'Alle ersetzt!':'All replaced!')+'</span>';
  } else {
    html += '<button onclick="closeReplaceSession()" '+
      'style="background:#f5ede4;border:1.5px solid #b5481f;border-radius:10px;color:#b5481f;'+
      'font-size:12px;font-weight:700;padding:6px 12px;cursor:pointer;min-height:34px">'+
      '🗄 '+(isDE?'Sitzung schließen':'Close Session')+'</button>';

  html += activeDrinks.map(function(drink){
      var v = ob[drink];

      var remLabel   = showCrate ? fmtCrates(drink,v.remaining,isDE) : v.remaining;
      var pct = v.owed>0?Math.round(v.replaced/v.owed*100):100;
      var noteId = 'repl-note-'+drink.replace(/\W/g,'_');

      // Build bottle icons
      var bottles = '';
      if (showCrate) {
        var cratesOwed     = Math.floor(v.owed/cs), remOwed = v.owed%cs;
        var cratesReplaced = Math.floor(v.replaced/cs);
        for (var c2=0;c2<cratesOwed;c2++) bottles+='<div class="bottle '+(c2<cratesReplaced?'done':'empty')+'" style="width:34px;height:34px;font-size:19px;border-radius:8px" title="1 crate ('+cs+')">📦</div>';
        for (var i2=0;i2<remOwed;i2++) {
          var idx2 = cratesOwed*cs+i2;
          bottles+='<div class="bottle '+(idx2<v.replaced?'done':'empty')+'">'+emoji(drink)+'</div>';
        }
      } else {
        var cap = Math.min(v.owed, 30);
        for (var i3=0;i3<cap;i3++) bottles+='<div class="bottle '+(i3<v.replaced?'done':'empty')+'">'+emoji(drink)+'</div>';
        if (v.owed>30) bottles+='<span style="font-size:11px;color:#7a5200;align-self:center"> +'+(v.owed-30)+' more</span>';
      }

      var datesCount = Object.keys(v.byDate).length;
      var isDone = v.remaining === 0;

      return '<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #ece0d4">'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">'+
          '<div>'+
            '<div style="font-size:15px;font-weight:800;color:#2e1c14">'+emoji(drink)+' '+esc(drink.replace(/^.+? /,''))+'</div>'+
            '<div style="font-size:12px;color:#7a5200;margin-top:1px;cursor:pointer;text-decoration:underline" onclick="showReplaceByDate(\''+esc(drink)+'\')">'+

        // Note field — always visible
        '<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">'+

            'style="flex:1;border:1.5px solid #e8dccc;border-radius:8px;padding:7px 10px;font-size:13px;color:#1a0e08;background:#fff"/>'+
          '<button onclick="saveReplaceNote(\''+esc(drink)+'\',\''+noteId+'\')" '+

            (isDE?'+ Notiz':'+ Note')+'</button>'+

        // Controls / status
        (isDone
          ? '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+
              '<span style="font-size:13px;color:#1f8a4f;font-weight:800">✅ '+(isDE?'Alle ersetzt':'All replaced')+'</span>'+
              '<button onclick="replBottleAllTime(\''+esc(drink)+'\',-1)" '+
                'style="background:#f5ede4;border:1.5px solid #b5481f;border-radius:7px;color:#b5481f;font-size:12px;font-weight:700;padding:5px 10px;cursor:pointer">'+
                '↩ '+(isDE?'Rückgängig':'Undo')+'</button>'+
            '</div>'
          : '<div class="repl-ctrl">'+
              '<button class="btn-icon" onclick="replBottleAllTime(\''+esc(drink)+'\',-1)" '+(v.replaced<=0?'disabled':'')+'>−</button>'+
              '<span>'+(showCrate?remLabel:v.remaining)+' '+esc(t('toReplace'))+'</span>'+
              '<button class="btn-icon" style="border-color:#c75a2a;background:#f3e4d3;color:#b5481f" onclick="replBottleAllTime(\''+esc(drink)+'\',1)">+</button>'+
              '<span style="color:#b5481f;font-size:12px;font-weight:700">'+esc(t('markReplaced'))+'</span>'+
            '</div>')+
      '</div>';
    }).join('');

  // If all done — show subtle done note (auto-close already scheduled)
  if (allDone){
    html += '<div style="background:#d4f5e2;border-radius:10px;padding:10px 14px;text-align:center;margin-top:4px">'+
      '<div style="font-size:14px;font-weight:800;color:#1f8a4f">🎉 '+(isDE?'Alle Flaschen ersetzt!':'All bottles replaced!')+'</div>'+
      '<div style="font-size:11px;color:#1a4a2a;margin-top:3px">'+(isDE?'Sitzung wird automatisch abgeschlossen…':'Session will auto-close shortly…')+'</div>'+
    '</div>';
  }
  html += '</div>';

  // ── REPLACEMENT LOG ──────────────────────────────────────
  if(STATE.replacements.length){
    var visibleReps = STATE.replacements.filter(function(r){ return r.drink !== '_SESSION_CLOSED_' && (r.quantity||0) > 0; });
    if (visibleReps.length) html+=card(t('replacementLog'), visibleReps.map(function(r){
      var canDel=isMine(r);
      return '<div class="entry"><div class="entry-l"><span class="ej">'+emoji(r.drink)+'</span><div>'+
        '<div class="en">'+r.quantity+'× '+esc(r.drink.replace(/^.+? /,''))+'</div>'+
        '<div class="es">'+esc(t('forDate'))+' '+fmtDate(r.for_date)+(r.replaced_by?' · by '+esc(r.replaced_by):'')+(r.note?' · '+esc(r.note):'')+'</div>'+
        '<div class="es" style="color:#6a3020">'+t('loggedBy')+' '+esc(r.added_by||'unknown')+'</div>'+
        '</div></div>'+delEditBtns('replacements',r.id,'Replacement for '+fmtDate(r.for_date),canDel,r)+'</div>';
    }).join(''));
  }

  // ── CLOSED SESSIONS archive ──────────────────────────────
  if (closedSessions.length){
    html += '<div class="card" style="margin-top:14px">';
    html += '<div style="font-size:13px;font-weight:800;color:#5a3a28;margin-bottom:10px">🗄 '+(isDE?'Abgeschlossene Sitzungen':'Closed Sessions')+'</div>';
    closedSessions.slice().reverse().forEach(function(sess, i){
      html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0e8dc">'+
        '<span style="font-size:11px;color:#7a5200;flex:1">'+fmtDate(sess.closedAt)+(sess.note?' · '+esc(sess.note):'')+'</span>'+
        '<span style="font-size:11px;background:#d4f5e2;color:#1f8a4f;border-radius:6px;padding:1px 7px;font-weight:700">✅ '+(isDE?'Abgeschlossen':'Closed')+'</span>'+
        (IS_ADMIN?'<button onclick="reopenReplaceSession('+i+')" style="background:none;border:none;color:#b5481f;cursor:pointer;font-size:12px;font-weight:700">↩ '+(isDE?'Wieder öffnen':'Reopen')+'</button>':'')+
      '</div>';
    });
    html += '</div>';
  }

  el.innerHTML=html;

  // Restore any note inputs being typed when re-render fired
  Object.keys(savedNotes).forEach(function(id){
    var inp = document.getElementById(id);
    if (inp) inp.value = savedNotes[id];
  });
}

async function reopenReplaceSession(idx){
  var isDE = LANG==='de';
  if (!await appConfirm(isDE?'Sitzung wieder öffnen? Die Sitzung wird aus der abgeschlossenen Liste entfernt.':'Reopen this session? It will be removed from the closed list.')) return;
  var sessions = JSON.parse(localStorage.getItem('boc_closed_replace_sessions')||'[]');
  // Also reverse-sorted display, so idx 0 = last item
  var realIdx = sessions.length - 1 - idx;
  sessions.splice(realIdx, 1);
  localStorage.setItem('boc_closed_replace_sessions', JSON.stringify(sessions));
  notify(isDE?'Sitzung wieder geöffnet':'Session reopened');

async function saveReplaceNote(drink, noteInputId){
  var isDE = LANG==='de';
  var inp = document.getElementById(noteInputId);
  var note = inp ? inp.value.trim() : '';
  if (!note){ notify(isDE?'Bitte Notiz eingeben':'Please enter a note', true); return; }

  // Find the most recent replacement for this drink to attach note to,
  // or insert a note-only row
  var existing = STATE.replacements
    .filter(function(r){ return r.drink===drink && (r.quantity||0) > 0 && isMine(r); })
    .sort(function(a,b){ return (b.for_date > a.for_date ? 1 : -1); })[0];

  var err;
  if (existing && !existing.note){
    // Attach note to the most recent replacement
    var res = await SB.from('replacements').update({note: note}).eq('id', existing.id);
    err = res.error;
  } else {
    // Insert a standalone note row (quantity=1 to avoid DB constraints)
    var today = td();
    var res = await SB.from('replacements').insert({
      for_date: today, drink: drink, quantity: 0,
      replaced_by: CURRENT_NAME, note: note, added_by: CURRENT_NAME
    });
    err = res.error;
    // If quantity=0 fails due to constraint, try with quantity=0 omitted or use a note field workaround
    if (err){
      // Fallback: store note in audit log only
      await audit('REPLACE_NOTE','replacements',null,{drink:drink,note:note});
      notify('📝 '+(isDE?'Notiz im Audit gespeichert':'Note saved to audit')+': '+note);
      if (inp) inp.value = '';
      return;
    }
  }
  if (err){ notify('Error: '+err.message, true); return; }

  // Clear input BEFORE loadAll to avoid flicker
  if (inp) inp.value = '';
  notify('📝 '+(isDE?'Notiz gespeichert':'Note saved')+': '+note);

  // loadAll re-renders — note input is already cleared so nothing to preserve
  await loadAll();
}

// Shows the "who is replacing?" popup when + is tapped
function replBottleAllTime(drink, delta){
  if (delta < 0) {
    // Undo silently — find most recent replacement for this drink
    var rdd = {};
    STATE.replacements.forEach(function(r){
      if (r.drink !== drink) return;
      rdd[r.for_date] = (rdd[r.for_date]||0) + (r.quantity||0);
    });
    var dates = Object.keys(rdd).sort().reverse();
    for (var i=0; i<dates.length; i++) {
      if ((rdd[dates[i]]||0) > 0) { replBottle(dates[i], drink, -1); return; }
    }
    notify(LANG==='de'?'Nichts zum Rückgängig machen':'Nothing to undo', true);
    return;
  }

  // Find target date (oldest with remaining bottles)
  var cdd = {}, rdd = {};
  STATE.logs.forEach(function(l){
    if ((parseFloat(l.unit_price)||0) > 0) return;
    if (l.drink !== drink) return;
    cdd[l.date] = (cdd[l.date]||0) + (l.quantity||0);
  });
  STATE.replacements.forEach(function(r){
    if (r.drink !== drink) return;
    rdd[r.for_date] = (rdd[r.for_date]||0) + (r.quantity||0);
  });
  var dates = Object.keys(cdd).sort();
  var targetDate = null;
  var totalRem = 0;
  dates.forEach(function(d){ totalRem += Math.max(0,(cdd[d]||0)-(rdd[d]||0)); });
  for (var i=0; i<dates.length; i++) {
    if ((cdd[dates[i]]||0) - (rdd[dates[i]]||0) > 0) { targetDate = dates[i]; break; }
  }
  if (!targetDate) { notify(LANG==='de'?'Alles ersetzt!':'All replaced! 🎉'); return; }

  showReplaceWhoPopup(drink, targetDate, totalRem);
}

function replUpdateCost(){
  var qty = parseInt(document.getElementById('repl-qty')&&document.getElementById('repl-qty').value)||1;
  var byEl = document.getElementById('repl-by');
  var forEl = document.getElementById('repl-for');
  var by = byEl ? byEl.value : '';
  var forPerson = forEl ? forEl.value : '';
  var costBox = document.getElementById('repl-cost-box');
  var costLabel = document.getElementById('repl-cost-label');
  // Find drink from whichever replace popup is open — store in hidden element
  var drinkEl = document.getElementById('repl-drink-hidden');
  var drink = drinkEl ? drinkEl.value : '';
  if (!drink) {
    // fallback: try to find from context
    return;
  }
  var val = calcDrinkValue(drink, qty);
  if (costLabel) costLabel.textContent = '€'+val.toFixed(2);
  if (costBox && val > 0) {
    costBox.style.display = 'block';
    var isDE = LANG === 'de';
    if (by && forPerson && by !== forPerson) {
      costLabel.textContent = '€'+val.toFixed(2)+' — '+esc(by)+' '+(isDE?'sollte von':'should get from')+' '+esc(forPerson)+' erhalten';
    } else {
      costLabel.textContent = '€'+val.toFixed(2);
    }
  }
}

async function confirmReplaceWho(drink, targetDate){
  var qtyEl = document.getElementById('repl-qty');
  var byEl  = document.getElementById('repl-by');
  var forEl = document.getElementById('repl-for');
  var qty      = Math.max(1, parseInt(qtyEl&&qtyEl.value)||1);
  var replacedBy = byEl  ? byEl.value  : CURRENT_NAME;
  var forPerson  = forEl ? forEl.value : '';
  var val = calcDrinkValue(drink, qty);

  closeModal();

  // Save the replacement
  STATE.undoStack.push(JSON.parse(JSON.stringify(STATE.replacements)));
  if (STATE.undoStack.length > 20) STATE.undoStack.shift();

  var existing = STATE.replacements.find(function(r){ return r.for_date===targetDate && r.drink===drink; });
  var note = forPerson ? (LANG==='de'?'für ':' for ')+forPerson : '';
  if (val > 0) note += (note?' · ':'')+'€'+val.toFixed(2);

  if (existing) {
    await SB.from('replacements').update({
      quantity: existing.quantity + qty,
      replaced_by: replacedBy,
      note: note
    }).eq('id', existing.id);
  } else {
    var insertObj = {
      for_date: targetDate, drink: drink, quantity: qty,
      replaced_by: replacedBy, note: note, added_by: CURRENT_NAME
    };
    if (IS_ADMIN && CURRENT_USER) insertObj.user_id = CURRENT_USER.id;
    if (IS_GUEST) insertObj.guest_token = GUEST_TOKEN;
    var {data} = await SB.from('replacements').insert(insertObj).select().single();
    await audit('MARK_REPLACEMENT','replacements',data&&data.id,{date:targetDate,drink:drink,qty:qty,replaced_by:replacedBy,for:forPerson,value:val});
  }

  // Show confirmation toast with payment detail
  var isDE = LANG === 'de';
  var msg = qty+'× '+drink+' '+(isDE?'ersetzt von':'replaced by')+' '+replacedBy;
  if (forPerson && forPerson !== replacedBy) msg += (isDE?' für ':' for ')+forPerson;
  if (val > 0) msg += ' · €'+val.toFixed(2);
  notify(msg+' ✓');
  showCrateAnimation(drink, function(){ loadAll(); });
}

// Show day-wise breakdown for a specific drink in a modal
function showReplaceByDate(drink){
  var isDE = LANG === 'de';
  var cdd = {}, rdd = {};
  STATE.logs.forEach(function(l){
    if ((parseFloat(l.unit_price)||0) > 0) return;
    if (l.drink !== drink) return;
    cdd[l.date] = (cdd[l.date]||0) + (l.quantity||0);
  });
  STATE.replacements.forEach(function(r){
    if (r.drink !== drink) return;
    rdd[r.for_date] = (rdd[r.for_date]||0) + (r.quantity||0);
  });

  var dates = Object.keys(cdd).sort().reverse();
  var cs = crateSize(drink);
  var totalOwed = 0, totalReplaced = 0;

  var rows = dates.map(function(d){
    var owed = cdd[d]||0;
    var replaced = Math.min(rdd[d]||0, owed);
    var rem = Math.max(0, owed-replaced);
    totalOwed += owed; totalReplaced += replaced;
    var owedLabel  = (cs && owed >= cs)     ? fmtCrates(drink,owed,isDE)     : owed+(isDE?' Fl.':' btl');
    var replLabel  = (cs && replaced >= cs)  ? fmtCrates(drink,replaced,isDE) : replaced+(isDE?' Fl.':' btl');
    var remLabel   = (cs && rem >= cs)       ? fmtCrates(drink,rem,isDE)      : rem;
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #ece0d4">'+
      '<div>'+
        '<div style="font-size:14px;font-weight:700;color:#2e1c14">'+fmtDate(d)+'</div>'+
        '<div style="font-size:12px;color:#7a5200">'+replLabel+' / '+owedLabel+'</div>'+
      '</div>'+
      (rem>0
        ? '<span style="font-size:13px;font-weight:800;color:#c4392b">'+remLabel+' '+(isDE?'offen':'left')+'</span>'
        : '<span style="font-size:13px;font-weight:800;color:#1f8a4f">✓</span>')+
    '</div>';
  }).join('');

  var totalRem = totalOwed - totalReplaced;
  var cs2 = crateSize(drink);
  showModal(
    '<h3>'+emoji(drink)+' '+esc(drink.replace(/^.+? /,''))+'</h3>'+
    '<div style="text-align:center;margin-bottom:14px;font-size:13px;color:#7a5200">'+
      (cs2 && totalOwed>=cs2 ? fmtCrates(drink,totalReplaced,isDE)+' / '+fmtCrates(drink,totalOwed,isDE) : totalReplaced+'/'+totalOwed)+
      (totalRem>0?' — '+(cs2 && totalRem>=cs2?fmtCrates(drink,totalRem,isDE):totalRem)+' '+(isDE?'fehlt':'left'):'')+'</div>'+
    '<div style="max-height:360px;overflow-y:auto;margin-bottom:12px">'+rows+'</div>'+
    '<button class="modal-close" onclick="closeModal()">'+esc(t('close'))+'</button>'
  );
}

async function replBottle(date,drink,delta){
  var existing=STATE.replacements.find(function(r){return r.for_date===date&&r.drink===drink;});
  STATE.undoStack.push(JSON.parse(JSON.stringify(STATE.replacements)));
  if(STATE.undoStack.length>20)STATE.undoStack.shift();
  if(delta>0){
    if(existing){
      await SB.from('replacements').update({quantity:existing.quantity+1}).eq('id',existing.id);
    } else {
      var insertObj = {for_date:date,drink:drink,quantity:1,replaced_by:CURRENT_NAME,note:'',added_by:CURRENT_NAME};
      if (IS_ADMIN) insertObj.user_id = CURRENT_USER.id;
      if (IS_GUEST) insertObj.guest_token = GUEST_TOKEN;
      var {data}=await SB.from('replacements').insert(insertObj).select().single();
      await audit('MARK_REPLACEMENT','replacements',data&&data.id,{date:date,drink:drink,qty:1});
    }
    notify('1× '+drink+' marked replaced ✓');
  } else {
    if(!existing||existing.quantity<=0)return;
    if(existing.quantity===1){await SB.from('replacements').delete().eq('id',existing.id);}
    else{await SB.from('replacements').update({quantity:existing.quantity-1}).eq('id',existing.id);}
    notify('Replacement removed');
  }
  await loadAll();
}

async function undoReplace(){
  if(!STATE.undoStack.length)return;
  var prev=STATE.undoStack.pop();
  await SB.from('replacements').delete().neq('id','00000000-0000-0000-0000-000000000000');
  if(prev.length){
    var ins=prev.map(function(r){return {for_date:r.for_date,drink:r.drink,quantity:r.quantity,replaced_by:r.replaced_by||'',note:r.note||'',added_by:r.added_by||'',user_id:r.user_id||null,guest_token:r.guest_token||''};});
    await SB.from('replacements').insert(ins);
  }
  await audit('UNDO_REPLACE','replacements',null,{restored:prev.length+' entries'});
  notify('Undo successful ✓');
  await loadAll();
}

async function sendBackupNow(){
  if (!IS_ADMIN) return;
  var btn = document.getElementById('backup-btn');
  if (btn) { btn.disabled=true; btn.textContent='⏳ Sending...'; }
  try {
    var fnUrl = SUPA_URL.replace('.supabase.co','') + '.supabase.co/functions/v1/send-daily-backup';
    // Ensure correct format
    if (!SUPA_URL.includes('supabase.co')) { notify('Invalid Supabase URL', true); return; }
    fnUrl = SUPA_URL.endsWith('/') ? SUPA_URL : SUPA_URL + '/';
    fnUrl += 'functions/v1/send-daily-backup';

    var res = await fetch(fnUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + (localStorage.getItem('sb_key')||'')
      },
      body: '{}'
    });
    var data = await res.json();
    if (data.success) {
      var s = data.stats||{};
      notify('📧 Backup sent! '+(s.totalToday||0)+' drinks today, €'+(s.moneyToday||0).toFixed(2)+' · check your email ✓');
      await audit('SEND_BACKUP','audit_log',null,{sent_to:'admin email',drinks_today:s.totalToday,money_today:s.moneyToday});
    } else {
      notify('Backup error: '+(data.error||'unknown'), true);
    }
  } catch(e) {
    notify('Backup failed: '+e.message, true);
  } finally {
    if (btn) { btn.disabled=false; btn.innerHTML='📧 '+(LANG==='de'?'Backup jetzt senden':'Send Backup Now'); }
  }
}

async function clearAllAuditLogs(){
  if (!IS_ADMIN) return;
  if (!await appConfirm('Delete ALL audit logs? This cannot be undone.')) return;
  var {error} = await SB.from('audit_log').delete().neq('id','00000000-0000-0000-0000-000000000000');
  if (error) { notify('Error: '+error.message, true); return; }
  notify('All audit logs cleared ✓');
  await loadAll();
}

  });

async function saveDrinkType(id){
  var isDE = LANG==='de';
  var emoji2 = (document.getElementById('dtedit-emoji-'+id).value||'').trim();
  var name2  = (document.getElementById('dtedit-name-'+id).value||'').trim();
  var price2 = parseFloat(document.getElementById('dtedit-price-'+id).value)||0;
  var order2 = parseInt(document.getElementById('dtedit-order-'+id).value)||0;
  if (!name2){ notify(isDE?'Name darf nicht leer sein':'Name cannot be empty',true); return; }

  // Save this drink first
  var {error} = await SB.from('drink_types').update({
    emoji:emoji2, name:name2, default_price:price2, sort_order:order2
  }).eq('id',id);
  if (error){ notify('Error: '+error.message,true); return; }

  // Auto-adjust all other drink types with sort_order >= new order (shift them down by 1)
  // so orders stay unique and sequential without manual editing
  var others = DRINK_TYPE_ROWS
    .filter(function(r){ return r.id !== id && r.active !== false && (r.sort_order||0) >= order2; })
    .sort(function(a,b){ return (a.sort_order||0)-(b.sort_order||0); });

  var nextOrder = order2 + 1;
  for (var i = 0; i < others.length; i++){
    var r = others[i];
    if ((r.sort_order||0) !== nextOrder){
      // Only update if the gap isn't already natural
      await SB.from('drink_types').update({sort_order: nextOrder}).eq('id', r.id);
    }
    nextOrder++;
  }

  notify('💾 '+(isDE?'Gespeichert':'Saved')+': '+emoji2+' '+name2+(others.length?' · '+(isDE?'Reihenfolge angepasst':'order adjusted'):''));
  await loadAll();
  renderDrinkTypes();
}

  var {error} = await SB.from('drink_types').update({active:false}).eq('id',id);
  if (error){ notify('Error: '+error.message,true); return; }

}

async function deletePerson(name){
  var isDE = LANG==='de';
  // Check for unsettled bills or unreplaced bottles
  var personLogs = STATE.logs.filter(function(l){return l.person===name;});
  var spent = personLogs.reduce(function(s,l){return s+(parseFloat(l.total_price)||0);},0);
  var paid  = STATE.payments.reduce(function(s,p){
    var pp=(p.payers||'').split(',').map(function(x){return x.trim();});
    return pp.indexOf(name)!==-1?s+(parseFloat(p.amount)||0):s;
  },0);
  var owes = Math.max(0, spent-paid);
  var freeCount = personLogs.filter(function(l){return (parseFloat(l.unit_price)||0)===0;}).length;

  var warnings = [];
  if (owes > 0.01) warnings.push((isDE?'Offene Rechnung':'Unsettled bill')+': €'+owes.toFixed(2));
  if (freeCount > 0) warnings.push(freeCount+' '+(isDE?'kostenlose Drinks noch nicht ersetzt':'free drinks not yet replaced'));

  var msg = (isDE?'"'+name+'" aus der Gruppe entfernen?':'Remove "'+name+'" from the group?')+'\n\n';
  if (warnings.length){
    msg += '⚠️ '+(isDE?'Achtung:':'Warning:')+'\n'+warnings.join('\n')+'\n\n';
    msg += isDE
      ? 'Die Person wird als inaktiv markiert. Alle Getränke-Logs, Zahlungen und Schulden bleiben erhalten, bis alles beglichen ist.'
      : 'The person will be marked inactive. All drink logs, payments and debts are preserved until fully settled.';
  } else {
    msg += isDE?'Alle Rechnungen sind beglichen. Die Person wird aus der Gruppe entfernt.':'All bills are settled. Person will be removed from the group.';
  }
  if (!await appConfirm(msg)) return;

  // Soft-delete: set active=false (preserves all log data)
  var {data: row, error} = await SB.from('people').select('id').eq('name', name).maybeSingle();
  if (error){ notify('Error: '+error.message, true); return; }
  if (!row){ notify(isDE?'Person nicht gefunden':'Person not found in database', true); return; }
  var {error: updErr} = await SB.from('people').update({active: false}).eq('id', row.id);
  if (updErr){ notify('Error: '+updErr.message, true); return; }
  await audit('DEACTIVATE_PERSON','people',row.id,{name:name,owes:owes,freeCount:freeCount});
  notify('🗑 '+(isDE?'Person inaktiv gesetzt (Logs erhalten)':'Person deactivated — logs preserved')+': '+name);
  await loadAll();
}
