<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>🍺 Beer'O'Clock</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23d4f521'/%3E%3Cpath d='M50 2 C30 20 30 80 50 98' stroke='white' stroke-width='5' fill='none'/%3E%3Cpath d='M50 2 C70 20 70 80 50 98' stroke='white' stroke-width='5' fill='none'/%3E%3C/svg%3E"/>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(160deg,#7a2e1a 0%,#8f3a20 35%,#6e2814 100%);background-attachment:fixed;color:#fdf3ea;min-height:100vh;position:relative}
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.05;
      background-image:
        linear-gradient(rgba(255,255,255,.6) 2px, transparent 2px),
        linear-gradient(90deg, rgba(255,255,255,.6) 2px, transparent 2px);
      background-size:120px 120px;
    }
    #auth-screen,#app{position:relative;z-index:1}
    button{transition:transform .12s ease, box-shadow .12s ease, background .15s ease, color .15s ease, border-color .15s ease}
    button:active{transform:scale(.97)}
    .btn-primary:hover,.btn-green:hover,.btn-auth:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.25)}
    .card{transition:box-shadow .2s ease}
    .chip:hover{transform:translateY(-1px)}
    #auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .auth-card{background:rgba(255,255,255,0.97);border:1px solid rgba(255,255,255,0.4);border-radius:20px;padding:34px 28px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,20,10,.45),0 2px 8px rgba(0,0,0,.15);backdrop-filter:blur(10px)}
    .auth-card h1{font-size:24px;color:#7a2e1a;margin-bottom:4px;font-weight:800;letter-spacing:-.3px}
    .auth-card p{font-size:13px;color:#6b5a4d;margin-bottom:22px;line-height:1.6}
    .auth-tabs{display:flex;gap:0;border-bottom:2px solid #e8ede8;margin-bottom:20px}
    .auth-tab{flex:1;padding:10px;background:none;border:none;cursor:pointer;font-size:13px;font-weight:700;color:#9a8a7c;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s}
    .auth-tab.active{color:#7a2e1a;border-bottom-color:#c5e000}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:11px;font-weight:700;color:#7a6759;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
    .field input{width:100%;background:#f4f7f4;border:1.5px solid #e8dccc;border-radius:10px;padding:11px 14px;color:#2e1c14;font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s}
    .field input:focus{border-color:#d4a017;box-shadow:0 0 0 3px rgba(143,201,58,.15)}
    .btn-auth{width:100%;background:linear-gradient(135deg,#7a2e1a,#a8431d);border:none;border-radius:12px;padding:13px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;box-shadow:0 4px 14px rgba(11,61,36,.35);transition:transform .12s,box-shadow .12s}
    .auth-error{color:#d64545;font-size:12px;margin-top:8px;min-height:16px;line-height:1.5}
    .auth-note{font-size:11px;color:#9a8a7c;margin-top:12px;text-align:center;line-height:1.5}
    #app{display:none}
    .header{border-bottom:1px solid rgba(255,255,255,.08);padding:14px 16px 0;background:linear-gradient(180deg,#6e2814,#7a2e1a);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.25)}
    .header-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .header-row h1{font-size:19px;font-weight:800;color:#fff;letter-spacing:-.3px}
    .user-badge{margin-left:auto;display:flex;align-items:center;gap:8px}
    .user-name{font-size:12px;color:#d4f521;font-weight:700}
    .admin-badge{display:inline-block;background:linear-gradient(135deg,#d4a017,#f0c63a);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:800;color:#3d2e00;margin-left:4px;letter-spacing:.5px}
    .btn-logout{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:7px;padding:5px 11px;color:#e0c4a8;font-size:11px;cursor:pointer;transition:all .15s}
    .btn-logout:hover{color:#ff8a8a;border-color:#ff8a8a;background:rgba(255,100,100,.1)}
    nav{display:flex;overflow-x:auto;scrollbar-width:none}
    nav::-webkit-scrollbar{display:none}
    nav button{background:none;border:none;cursor:pointer;padding:9px 13px;font-size:11px;font-weight:700;white-space:nowrap;color:#7da888;border-bottom:3px solid transparent;flex-shrink:0;transition:color .15s,border-color .15s}
    nav button.active{color:#d4f521;border-bottom-color:#d4f521}
    .content{max-width:680px;margin:0 auto;padding:14px}
    .card{background:rgba(255,255,255,.97);border:1px solid rgba(255,255,255,.5);border-radius:16px;padding:18px;margin-bottom:13px;box-shadow:0 4px 18px rgba(0,20,10,.18),0 1px 3px rgba(0,0,0,.08);color:#2e1c14}
    .card-title{font-size:11px;font-weight:800;color:#9c4a22;text-transform:uppercase;letter-spacing:1px;margin-bottom:13px}
    .form-label{display:block;font-size:11px;font-weight:700;color:#7a6759;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
    input[type=text],input[type=number],input[type=date],input[type=email],input[type=password],select{width:100%;background:#f4f7f4;border:1.5px solid #e8dccc;border-radius:9px;padding:9px 12px;color:#2e1c14;font-size:14px;outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s}
    input:focus,select:focus{border-color:#d4a017;box-shadow:0 0 0 3px rgba(143,201,58,.15)}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .fld{margin-bottom:10px}
    .btn-primary{width:100%;background:linear-gradient(135deg,#7a2e1a,#b5481f);border:none;border-radius:11px;padding:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 3px 12px rgba(11,61,36,.3);transition:transform .12s,box-shadow .12s}
    .btn-green{width:100%;background:linear-gradient(135deg,#c5e000,#d4f521);border:none;border-radius:11px;padding:12px;color:#1f3a0a;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 3px 12px rgba(197,224,0,.35);transition:transform .12s,box-shadow .12s}
    .btn-sm{background:none;border:none;cursor:pointer;font-size:15px;color:#a8978a;padding:2px;transition:color .15s}
    .btn-icon{width:33px;height:33px;border-radius:9px;border:1.5px solid #e8dccc;background:#f4f7f4;color:#b5481f;font-size:17px;font-weight:700;cursor:pointer;transition:all .15s}
    .btn-edit{background:#f5ede4;border:1px solid #e8dccc;border-radius:7px;padding:3px 9px;color:#a85428;font-size:11px;cursor:pointer;margin-right:4px;font-weight:600;transition:all .15s}
    .btn-edit:hover{border-color:#d4a017;color:#b5481f;background:#faf2e8}
    .chips{display:flex;flex-wrap:wrap;gap:6px}
    .chip{padding:6px 13px;border:1.5px solid #e8dccc;border-radius:20px;cursor:pointer;font-size:12px;background:#f4f7f4;color:#7a6759;user-select:none;transition:all .15s;font-weight:500}
    .chip.cp{background:linear-gradient(135deg,#7a2e1a,#b5481f);border-color:#b5481f;color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(11,61,36,.3)}
    .chip.cg{background:linear-gradient(135deg,#c5e000,#d4f521);border-color:#c5e000;color:#1f3a0a;font-weight:800;box-shadow:0 2px 8px rgba(197,224,0,.3)}
    .chip.cy{background:linear-gradient(135deg,#f0c63a,#f8d878);border-color:#e8b820;color:#4a3500;font-weight:800;box-shadow:0 2px 8px rgba(240,198,58,.3)}
    .sg{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
    .sb{background:rgba(255,255,255,.97);border:1px solid rgba(255,255,255,.5);border-radius:13px;padding:14px 8px;text-align:center;box-shadow:0 3px 12px rgba(0,20,10,.15)}
    .sv{font-size:21px;font-weight:800;color:#b5481f;letter-spacing:-1px}
    .sv.g{color:#c78a2e}.sv.r{color:#d6483a}
    .sl{font-size:10px;font-weight:700;color:#9a8a7c;text-transform:uppercase;letter-spacing:.7px;margin-top:2px}
    .entry{display:flex;align-items:center;justify-content:space-between;background:#faf5f0;border:1px solid #ece0d4;border-radius:10px;padding:9px 12px;margin-bottom:7px;transition:background .15s}
    .entry-l{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
    .ej{font-size:18px;flex-shrink:0}
    .en{font-size:13px;font-weight:700;color:#b5481f}
    .es{font-size:11px;color:#8a7568;margin-top:1px}
    .badge{display:inline-block;background:#f3e4d3;border-radius:20px;padding:2px 9px;font-size:11px;color:#a85428;font-weight:700}
    .badge.g{background:#f5e8da;color:#b5481f}
    .badge.r{background:#fce8e6;color:#c4392b}
    .avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
    .total-row{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#faf2e8,#f3e4d3);border:1px solid #e8c9a0;border-radius:10px;padding:10px 14px;margin-bottom:11px}
    .total-row span:first-child{font-size:11px;color:#a85428;font-weight:700;text-transform:uppercase;letter-spacing:.7px}
    .total-row span:last-child{font-size:16px;font-weight:800;color:#b5481f}
    .stepper{display:flex;align-items:center;gap:8px}
    .stepper input{width:58px;text-align:center;font-weight:700;font-size:15px}
    .brow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0e6d8}
    .brow:last-child{border-bottom:none}
    .prog{height:6px;background:#f0e6d8;border-radius:4px;overflow:hidden;margin-top:4px}
    .prog-fill{height:6px;border-radius:4px;background:linear-gradient(to right,#7a2e1a,#b5481f);transition:width .4s ease}
    .prog-fill.done{background:linear-gradient(to right,#c5e000,#d4f521)}
    .bottles{display:flex;flex-wrap:wrap;gap:5px;margin:5px 0 7px}
    .bottle{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px}
    .bottle.done{background:#f3e4d3;border:1.5px solid #d4a017}
    .bottle.empty{background:#f4f7f4;border:1.5px solid #e8dccc;opacity:.5}
    .repl-ctrl{display:flex;align-items:center;gap:7px;margin-top:5px}
    .repl-ctrl span{font-size:11px;color:#8a7568;min-width:100px;text-align:center}
    .dh{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:linear-gradient(135deg,#7a2e1a,#8f3a20);border-bottom:1px solid rgba(255,255,255,.08)}
    .dh h4{font-size:14px;font-weight:800;color:#d4f521}
    .dh p{font-size:11px;color:#e0c4a8;margin-top:1px}
    .audit-entry{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f0e6d8}
    .audit-entry:last-child{border-bottom:none}
    .audit-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
    .audit-body{flex:1}
    .audit-who{font-size:13px;font-weight:700;color:#b5481f}
    .audit-what{font-size:12px;color:#6b5a4d;margin-top:1px}
    .audit-when{font-size:10px;color:#a8978a;margin-top:2px}
    #notif{position:fixed;top:14px;right:14px;z-index:9999;pointer-events:none}
    .np{background:linear-gradient(135deg,#7a2e1a,#b5481f);border:1px solid #c75a2a;color:#d4f521;padding:9px 16px;border-radius:11px;font-size:12px;font-weight:700;margin-bottom:6px;box-shadow:0 6px 24px rgba(0,0,0,.3);animation:si .25s cubic-bezier(.34,1.56,.64,1)}
    .np.err{background:linear-gradient(135deg,#5c1818,#7a2424);border-color:#c44;color:#ffb0b0}
    @keyframes si{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .empty{text-align:center;padding:40px 16px;color:#e0c4a8;font-size:13px}
    .empty .big{font-size:32px;margin-bottom:7px}
    .mine-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#d4f521;margin-right:3px;vertical-align:middle}
    /* CONSOLIDATED DAY SUMMARY (Log tab) */
    .day-summary{background:#faf5f0;border:1px solid #ece0d4;border-radius:11px;padding:11px 13px;margin-bottom:9px}
    .day-summary-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .day-summary-head h5{font-size:12px;font-weight:800;color:#9c4a22;text-transform:uppercase;letter-spacing:.6px}
    .person-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0}
    .person-row-l{display:flex;align-items:center;gap:8px}
    .drink-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
    .drink-tag{font-size:10px;background:#f5ede4;border-radius:10px;padding:2px 8px;color:#a85428;font-weight:600}
    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(6,30,18,.7);z-index:9998;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);animation:fadeIn .2s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal-box{background:#fff;border:1px solid rgba(255,255,255,.5);border-radius:20px;padding:26px 24px;width:100%;max-width:380px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 70px rgba(0,20,10,.5);color:#2e1c14}
    .modal-box h3{font-size:19px;color:#7a2e1a;margin-bottom:14px;text-align:center;font-weight:800}
    .modal-stat{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #f0e6d8}
    .modal-stat:last-child{border-bottom:none}
    .modal-stat-label{font-size:13px;color:#6b5a4d}
    .modal-stat-val{font-size:17px;font-weight:800}
    .modal-close{width:100%;margin-top:16px;background:#f4f7f4;border:1px solid #e8dccc;border-radius:11px;padding:11px;color:#6b5a4d;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s}
    .modal-question{font-size:16px;color:#7a2e1a;text-align:center;margin-bottom:18px;line-height:1.5;font-weight:600}
    .modal-btn-row{display:flex;gap:10px}
    .modal-btn{flex:1;border:none;border-radius:10px;padding:13px 8px;font-size:14px;font-weight:700;cursor:pointer}
    .modal-btn-pay{background:linear-gradient(135deg,#c5e000,#d4f521);color:#1f3a0a;box-shadow:0 4px 14px rgba(197,224,0,.4)}
    .modal-btn-replace{background:linear-gradient(135deg,#7a2e1a,#b5481f);color:#fff;box-shadow:0 4px 14px rgba(11,61,36,.4)}
    @media(max-width:480px){.grid2{grid-template-columns:1fr}.sg{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <h1>🍺 Beer'O'Clock</h1>
    <p>Enter your name to join, or sign in if you're the admin.</p>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="authTab('guest',this)">I'm a Guest</button>
      <button class="auth-tab" onclick="authTab('admin',this)">Admin Sign In</button>
    </div>
    <div id="auth-form-guest">
      <div class="field"><label>Your Name</label><input id="guest-name" type="text" placeholder="e.g. John" onkeydown="if(event.key==='Enter')guestEnter()"/></div>
      <button class="btn-auth" onclick="guestEnter()">Enter App</button>
      <p class="auth-note">No password needed — just enter your name to start logging drinks.</p>
    </div>
    <div id="auth-form-admin" style="display:none">
      <div class="field"><label>Admin Email</label><input id="li-email" type="email" placeholder="you@email.com"/></div>
      <div class="field"><label>Password</label><input id="li-pass" type="password" placeholder="••••••••"/></div>
      <button class="btn-auth" onclick="signIn()">Sign In</button>
    </div>
    <div id="auth-error" class="auth-error"></div>
  </div>
</div>

<div id="app">
  <div id="notif"></div>
  <div id="modal-root"></div>
  <div class="header">
    <div class="header-row">
      <span style="font-size:22px">🎾🍺</span>
      <h1 id="app-h1">Beer'O'Clock</h1>
      <div class="user-badge">
        <button onclick="setLang(LANG==='en'?'de':'en')" class="btn-logout" id="lang-toggle-btn" title="Switch language" style="margin-right:2px">🌐 EN</button>
        <span class="user-name" id="user-label"></span>
        <button class="btn-logout" id="signout-btn" onclick="signOut()">Exit</button>
      </div>
    </div>
    <nav id="main-nav">
      <button class="active" onclick="switchTab('log',this)"><span id="nav-log-label">📋 Log</span></button>
      <button onclick="switchTab('stats',this)"><span id="nav-stats-label">📊 Stats</span></button>
      <button onclick="switchTab('payments',this)"><span id="nav-payments-label">💶 Payments</span></button>
      <button onclick="switchTab('history',this)" id="nav-history-btn" style="display:none"><span id="nav-history-label">📅 History</span></button>
      <button onclick="switchTab('replace',this)"><span id="nav-replace-label">🔄 Replace</span></button>
      <button onclick="switchTab('audit',this)" id="nav-audit-btn" style="display:none"><span id="nav-audit-label">📜 Audit</span></button>
      <button onclick="switchTab('people',this)"><span id="nav-people-label">👥 People</span></button>
    </nav>
  </div>
  <div class="content">
    <div id="tab-log"></div>
    <div id="tab-stats"    style="display:none"></div>
    <div id="tab-payments" style="display:none"></div>
    <div id="tab-history"  style="display:none"></div>
    <div id="tab-replace"  style="display:none"></div>
    <div id="tab-audit"    style="display:none"></div>
    <div id="tab-people"   style="display:none"></div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
var SUPA_URL = localStorage.getItem('sb_url') || '';
var SUPA_KEY = localStorage.getItem('sb_key') || '';
var SB;

// ── IDENTITY ────────────────────────────────────────────────
// ADMIN: real Supabase Auth login (email+password)
// GUEST: just a name + a random token stored in this browser's localStorage
var IS_ADMIN = false;
var IS_GUEST = false;
var CURRENT_USER = null;     // Supabase auth user object (admin only)
var CURRENT_NAME = '';       // display name for everyone
var GUEST_TOKEN = localStorage.getItem('guest_token') || '';

var DRINK_TYPES = ["🍺 Beer","🍷 Wine","🥃 Spirits","🍹 Cocktail","🧃 Juice","💧 Water","☕ Coffee","🧋 Other"];
var AVATAR_COLORS = ["#b5481f","#c5a000","#0e6b8c","#b4502a","#9c4a22","#8c3a1f","#1f5a7a","#7a8c1f"];
var STATE = {
  tab:'log', people:[], logs:[], payments:[], replacements:[], auditLog:[],
  logPerson:'', logDrink:'🍺 Beer', logQty:1, logPrice:'', logDate:td(), logNote:'',
  payPayers:[], payNonDrinkers:[], payAmount:'', payDate:td(), payNote:'',
  undoStack:[]
};

// ── LANGUAGE / TRANSLATIONS ──────────────────────────────────
var LANG = localStorage.getItem('app_lang') || 'en';

var I18N = {
  en: {
    appTitle: "Beer'O'Clock",
    tagline: "Enter your name to join, or sign in if you're the admin.",
    guestTab: "I'm a Guest", adminTab: "Admin Sign In",
    yourName: "Your Name", namePlaceholder: "e.g. John",
    enterApp: "Enter App", guestNote: "No password needed — just enter your name to start logging drinks.",
    adminEmail: "Admin Email", password: "Password", signIn: "Sign In",
    pleaseEnterName: "Please enter your name.",
    navLog: "Log", navStats: "Stats", navPayments: "Payments", navHistory: "History",
    navReplace: "Replace", navAudit: "Audit", navPeople: "People",
    signOut: "Exit",
    myBalanceBtn: "💰 My Balance — what do I owe?",
    whosDrinking: "Who's Drinking",
    addNewNamePlaceholder: "Or type a new name…",
    logADrink: "Log a Drink",
    date: "Date", person: "Person", drinkType: "Drink Type", drinks: "Drinks",
    pricePerDrink: "Price per Drink (€)", totalPrice: "Total Price",
    note: "Note", noteOptional: "optional note…",
    logDrinkBtn: "+ Log Drink",
    runningTabsTitle: "🧾 Running Tabs — Not Yet Settled",
    settledUpTitle: "✅ Settled Up",
    details: "👁 details",
    owed: "owed", toReplace: "to replace", settled: "settled",
    sinceLastSettlement: "since last settlement",
    close: "Close",
    drink: "drink", drinksPlural: "drinks",
    free: "free", loggedBy: "logged by",
    totalDrinks: "Total Drinks", totalSpend: "Total Spend", peopleLbl: "People", daysLogged: "Days Logged",
    favourite: "Fav", daily: "Daily",
    totalCost: "Total Cost", totalPaid: "Total Paid", pending: "Pending",
    recordPayment: "Record Payment", amount: "Amount (€)", paidBy: "Paid By",
    didntDrink: "Didn't Drink", recordPaymentBtn: "+ Record Payment",

function t(key){
  return (I18N[LANG] && I18N[LANG][key]) || I18N.en[key] || key;
}

function setLang(lang){
  LANG = lang;
  localStorage.setItem('app_lang', lang);
  // Re-render whatever is currently visible
  if (document.getElementById('app') && document.getElementById('app').style.display !== 'none') {
    renderTab(STATE.tab);
    updateHeaderLabels();
  }
  if (document.getElementById('auth-screen') && document.getElementById('auth-screen').style.display !== 'none') {
    restoreAuthScreenHtml();
  }
}

function updateHeaderLabels(){
  var setText = function(id, txt){ var el = document.getElementById(id); if (el) el.textContent = txt; };
  setText('app-h1', t('appTitle'));
  setText('nav-log-label', '📋 '+t('navLog'));
  setText('nav-stats-label', '📊 '+t('navStats'));
  setText('nav-payments-label', '💶 '+t('navPayments'));
  setText('nav-history-label', '📅 '+t('navHistory'));
  setText('nav-replace-label', '🔄 '+t('navReplace'));
  setText('nav-audit-label', '📜 '+t('navAudit'));
  setText('nav-people-label', '👥 '+t('navPeople'));
  setText('signout-btn', t('signOut'));
  var langBtn = document.getElementById('lang-toggle-btn');
  if (langBtn) langBtn.textContent = LANG==='en' ? '🌐 EN' : '🌐 DE';
}

// ── INIT ────────────────────────────────────────────────────
window.addEventListener('load', function(){
  if (typeof supabase === 'undefined') {
    showConfigError('Failed to load Supabase library. Check your internet connection and reload.');
    return;
  }
  if (!SUPA_URL || !SUPA_KEY) { showConfigScreen(); return; }
  initSupabase(SUPA_URL, SUPA_KEY);
});

function showConfigScreen(){
  document.getElementById('auth-screen').innerHTML =
    '<div class="auth-card"><h1>🍺 Beer\'O\'Clock</h1>' +
    '<p>First time setup — enter the shared Supabase connection details.</p>' +
    '<div class="field"><label>Supabase URL</label><input id="cfg-url" type="text" placeholder="https://xxxx.supabase.co"/></div>' +
    '<div class="field"><label>Supabase Anon Key</label><input id="cfg-key" type="text" placeholder="eyJhbGci..."/></div>' +
    '<div id="cfg-error" class="auth-error"></div>' +
    '<button class="btn-auth" onclick="submitConfig()">Connect</button></div>';
  document.getElementById('auth-screen').style.display = 'flex';
}

function showConfigError(msg){
  document.getElementById('auth-screen').innerHTML =
    '<div class="auth-card"><h1>🍺 Beer\'O\'Clock</h1><div class="auth-error" style="margin-top:10px">' + msg + '</div>' +
    '<button class="btn-auth" onclick="location.reload()">Reload Page</button></div>';
  document.getElementById('auth-screen').style.display = 'flex';
}

function submitConfig(){
  var url = document.getElementById('cfg-url').value.trim();
  var key = document.getElementById('cfg-key').value.trim();
  var errEl = document.getElementById('cfg-error');
  if (!url || !key) { errEl.textContent = 'Both fields are required.'; return; }
  if (!url.startsWith('http')) { errEl.textContent = 'URL should start with https://'; return; }
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  SUPA_URL = url; SUPA_KEY = key;
  initSupabase(url, key);
}

function initSupabase(url, key){
  try { SB = supabase.createClient(url, key); }
  catch(e) { showConfigError('Could not connect: ' + e.message + resetBtn()); return; }
  if (!SB || !SB.auth) { showConfigError('Client failed to initialize. Credentials may be invalid.' + resetBtn()); return; }

  restoreAuthScreenHtml();

  // Check if a guest session is already active
  if (GUEST_TOKEN && localStorage.getItem('guest_name')) {
    IS_GUEST = true;
    CURRENT_NAME = localStorage.getItem('guest_name');
    enterApp();
    return;
  }

  // Otherwise watch for admin auth state
  SB.auth.onAuthStateChange(function(event, session){
    if (session && session.user) {
      CURRENT_USER = session.user;
      IS_ADMIN = true;
      IS_GUEST = false;
      onAdminLoggedIn();
    } else if (!IS_GUEST) {
      CURRENT_USER = null;
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }
  });
}

function resetBtn(){
  return '<br/><br/><button class="btn-auth" onclick="localStorage.removeItem(\'sb_url\');localStorage.removeItem(\'sb_key\');location.reload()">Reset Credentials</button>';
}

function restoreAuthScreenHtml(){

    '</div>' +

function authTab(tab, btn){
  document.querySelectorAll('.auth-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('auth-form-guest').style.display = tab==='guest' ? '' : 'none';
  document.getElementById('auth-form-admin').style.display = tab==='admin' ? '' : 'none';
  document.getElementById('auth-error').textContent = '';
}

// ── GUEST ENTRY ─────────────────────────────────────────────
function guestEnter(){
  var name = document.getElementById('guest-name').value.trim();
  var errEl = document.getElementById('auth-error');
  if (!name) { errEl.style.color='#c4392b'; errEl.textContent = 'Please enter your name.'; return; }

  if (!GUEST_TOKEN) {
    GUEST_TOKEN = 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2,10);
    localStorage.setItem('guest_token', GUEST_TOKEN);
  }
  localStorage.setItem('guest_name', name);
  CURRENT_NAME = name;
  IS_GUEST = true;
  IS_ADMIN = false;
  enterApp();
}

// ── ADMIN SIGN IN ───────────────────────────────────────────
async function signIn(){
  if (!SB || !SB.auth) { document.getElementById('auth-error').textContent = 'Not connected — reload the page.'; return; }
  var email = document.getElementById('li-email').value.trim();
  var pass  = document.getElementById('li-pass').value;
  var errEl = document.getElementById('auth-error');
  errEl.style.color = '#c4392b'; errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Enter both email and password.'; return; }
  try {
    var {error} = await SB.auth.signInWithPassword({email:email, password:pass});
    if (error) {
      var msg = error.message || error.error_description || error.msg || 'Sign in failed (status: '+(error.status||'?')+')';
      errEl.textContent = msg;
    }
  } catch(e) { errEl.textContent = 'Unexpected error: ' + (e.message || e.toString()); }
}

async function onAdminLoggedIn(){
  // Try to read display_name from a profiles table if it exists; fallback to email prefix
  var name = CURRENT_USER.email.split('@')[0];
  try {
    var {data:prof} = await SB.from('profiles').select('*').eq('id', CURRENT_USER.id).single();
    if (prof && prof.display_name) name = prof.display_name;
  } catch(e) {}
  CURRENT_NAME = name;
  enterApp();
}

function enterApp(){
  var label = document.getElementById('user-label');
  label.innerHTML = '👤 ' + esc(CURRENT_NAME) + (IS_ADMIN ? ' <span class="admin-badge">👑 ADMIN</span>' : '');
  var auditBtn = document.getElementById('nav-audit-btn');
  if (auditBtn) auditBtn.style.display = IS_ADMIN ? '' : 'none';
  var historyBtn = document.getElementById('nav-history-btn');
  if (historyBtn) historyBtn.style.display = IS_ADMIN ? '' : 'none';
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  updateHeaderLabels();
  registerSelfAsPerson();
  loadAll().then(function(){
    console.log('[BeerOClock] loadAll complete, showing login joke popup');
    showLoginJokePopup();
  }).catch(function(e){
    console.error('[BeerOClock] loadAll rejected unexpectedly:', e);
    // Still show the joke even if data loading had issues
    showLoginJokePopup();
  });
}

// ── LOAD DATA ───────────────────────────────────────────────
async function loadAll(){
  try {
    var [ppl, l, pay, rep, aud] = await Promise.all([
      SB.from('people').select('*').order('name'),
      SB.from('drink_logs').select('*').order('date',{ascending:false}).order('logged_at',{ascending:false}),
      SB.from('payments').select('*').order('date',{ascending:false}),
      SB.from('replacements').select('*').order('for_date',{ascending:false}),
      SB.from('audit_log').select('*').order('performed_at',{ascending:false}).limit(100)
    ]);
    if(ppl.error) notify('People error: '+ppl.error.message, true);
    if(l.error)   notify('Logs error: '+l.error.message, true);
    if(pay.error) notify('Payments error: '+pay.error.message, true);
    if(rep.error) notify('Replace error: '+rep.error.message, true);

    STATE.logs         = l.data   || [];
    STATE.payments     = pay.data || [];
    STATE.replacements = rep.data || [];
    STATE.auditLog      = aud.data || [];

    // People come from the real people table now
    var peopleRows = ppl.data || [];
    var names = new Set(peopleRows.map(function(p){ return p.name; }));

    // Safety net: also include anyone found in logs/payments that
    // somehow isn't in the people table yet (e.g. before backfill ran)
    STATE.logs.forEach(function(l){ if(l.person) names.add(l.person); });
    STATE.payments.forEach(function(p){
      (p.payers||'').split(',').forEach(function(n){ if(n.trim()) names.add(n.trim()); });
      (p.non_drinkers||'').split(',').forEach(function(n){ if(n.trim()) names.add(n.trim()); });
    });
    if (CURRENT_NAME) names.add(CURRENT_NAME);

    STATE.people = [...names].sort().map(function(n){
      var match = peopleRows.find(function(p){ return p.name === n; });
      return { display_name: n, created_by: match ? match.created_by : '' };
    });

    renderTab(STATE.tab);
  } catch(e){ notify('Load error: '+e.message, true); }
}

// Consolidate all of today's (and recent days') drinks per person
function renderConsolidatedToday(){
  if (!STATE.logs.length) return '';

  // Build per-person running tab: every drink they've ever logged stays
  // consolidated together until their balance is fully settled —
  // both money (priced drinks vs payments) AND bottles (free drinks vs replacements).
  var personNames = [...new Set(STATE.logs.map(function(l){ return l.person; }))].sort();

  var blocks = personNames.map(function(person){
    var pLogs = STATE.logs.filter(function(l){ return l.person === person; });

    // Money owed: priced drinks minus payments where this person is listed as a payer
    var moneyOwed = pLogs.reduce(function(s,l){
      var unitPrice = parseFloat(l.unit_price)||0;
      return unitPrice > 0 ? s + (parseFloat(l.total_price)||0) : s;
    }, 0);
    var moneyPaid = STATE.payments.reduce(function(s,p){
      var payers = (p.payers||'').split(',').map(function(x){return x.trim();});
      return payers.indexOf(person) !== -1 ? s + (parseFloat(p.amount)||0) : s;
    }, 0);
    var moneyPending = moneyOwed - moneyPaid;
    var moneySettled = moneyPending <= 0.005;

    // Bottles owed: free (€0) drinks minus replacements credited to this person
    var bottlesOwedByDrink = {};
    pLogs.forEach(function(l){
      var unitPrice = parseFloat(l.unit_price)||0;
      if (unitPrice > 0) return;
      bottlesOwedByDrink[l.drink] = (bottlesOwedByDrink[l.drink]||0) + (l.quantity||0);
    });
    var bottlesReplacedByDrink = {};
    STATE.replacements.forEach(function(r){
      if (r.replaced_by === person || r.logged_by === person) {
        bottlesReplacedByDrink[r.drink] = (bottlesReplacedByDrink[r.drink]||0) + (r.quantity||0);
      }
    });
    var totalBottlesOwed = Object.values(bottlesOwedByDrink).reduce(function(s,v){return s+v;},0);
    var totalBottlesReplaced = Object.keys(bottlesOwedByDrink).reduce(function(s,drink){
      return s + Math.min(bottlesReplacedByDrink[drink]||0, bottlesOwedByDrink[drink]);
    }, 0);
    var bottlesRemaining = totalBottlesOwed - totalBottlesReplaced;
    var bottlesSettled = bottlesRemaining === 0;

    var isSettled = moneySettled && bottlesSettled;

    var totalQty = pLogs.reduce(function(s,l){ return s+(l.quantity||0); }, 0);
    var totalSpend = pLogs.reduce(function(s,l){ return s+(parseFloat(l.total_price)||0); }, 0);

    // Consolidate ALL drink types this person has ever logged (still unsettled or not)
    var drinkCounts = {};
    pLogs.forEach(function(l){ drinkCounts[l.drink] = (drinkCounts[l.drink]||0) + (l.quantity||0); });
    var tags = Object.entries(drinkCounts).map(function(e){
      return '<span class="drink-tag">'+emoji(e[0])+' ×'+e[1]+'</span>';
    }).join('');

    var earliestDate = pLogs.reduce(function(min,l){ return l.date < min ? l.date : min; }, pLogs[0].date);
    var latestDate = pLogs.reduce(function(max,l){ return l.date > max ? l.date : max; }, pLogs[0].date);

    return {
      person: person, isSettled: isSettled, moneyPending: moneyPending, moneySettled: moneySettled,
      bottlesRemaining: bottlesRemaining, bottlesSettled: bottlesSettled,
      totalQty: totalQty, totalSpend: totalSpend, tags: tags,
      earliestDate: earliestDate, latestDate: latestDate
    };
  });

  // Sort: unsettled people first (most owed first), then settled people
  blocks.sort(function(a,b){
    if (a.isSettled !== b.isSettled) return a.isSettled ? 1 : -1;
    return (b.moneyPending + b.bottlesRemaining) - (a.moneyPending + a.bottlesRemaining);
  });

  var unsettled = blocks.filter(function(b){ return !b.isSettled; });
  var settled = blocks.filter(function(b){ return b.isSettled; });

  var rowHtml = function(b){
    var statusBits = [];
    if (!b.moneySettled) statusBits.push('<span style="font-size:10px;color:#c4392b;font-weight:700">€'+b.moneyPending.toFixed(2)+' '+t('owed')+'</span>');
    if (!b.bottlesSettled) statusBits.push('<span style="font-size:10px;color:#d4a017;font-weight:700">'+b.bottlesRemaining+' '+t('toReplace')+'</span>');
    if (b.isSettled) statusBits.push('<span style="font-size:10px;color:#1f8a4f;font-weight:700">✓ '+t('settled')+'</span>');
    var dateRange = b.earliestDate === b.latestDate ? fmtDate(b.earliestDate) : fmtDate(b.earliestDate)+' → '+fmtDate(b.latestDate);

    return '<div class="person-row" style="cursor:pointer" onclick="showPersonRunningTab(\''+esc(b.person)+'\')">'+
      '<div class="person-row-l">'+
        '<div class="avatar" style="background:'+colorFor(b.person)+';width:22px;height:22px;font-size:10px">'+(b.person[0]||'?').toUpperCase()+'</div>'+
        '<div><div style="font-size:12px;font-weight:600;color:#b5481f">'+esc(b.person)+
          ' <span class="badge">'+b.totalQty+' '+(b.totalQty!==1?t('drinksPlural'):t('drink'))+'</span>'+
          (b.totalSpend>0?' <span style="font-size:11px;color:#b5481f;font-weight:600">€'+b.totalSpend.toFixed(2)+'</span>':'')+
          '</div>'+
          '<div style="font-size:10px;color:#a8978a;margin-top:1px">'+dateRange+'</div>'+
          '<div class="drink-tags">'+b.tags+'</div>'+
          '<div style="display:flex;gap:6px;margin-top:3px">'+statusBits.join('')+'</div>'+
        '</div>'+
      '</div>'+
      '<span style="font-size:11px;color:#a8978a">'+esc(t('details'))+'</span>'+
    '</div>';
  };

  var html = '';

  if (unsettled.length) {
    html += card(t('runningTabsTitle'), unsettled.map(rowHtml).join(''));
  }
  if (settled.length) {
    html += card(t('settledUpTitle'), settled.map(rowHtml).join(''));
  }

  return html;
}

async function addPersonToTable(name){
  name = (name||'').trim();
  if (!name) return false;
  try {
    var {data:existing} = await SB.from('people').select('id').ilike('name', name).maybeSingle();
    if (existing) return true; // already in the real table, nothing to do
  } catch(e) { /* fall through and try insert anyway */ }

  var {error} = await SB.from('people').insert({ name: name, created_by: CURRENT_NAME });
  if (error) {
    // Unique constraint violation just means it already exists — not a real error
    if (!String(error.message||'').includes('duplicate')) {
      notify('Could not add person: '+error.message, true);
      return false;
    }
  } else {
    await audit('ADD_PERSON','people',null,{name:name});
  }
  return true;
}

async function addNewPersonFromInput(inputEl){
  var name = inputEl.value.trim();
  if (!name) return;
  inputEl.value = '';
  var ok = await addPersonToTable(name);
  if (ok) {
    STATE.logPerson = name;
    notify(esc(name)+' '+t('personAdded'));
    await loadAll();
  }
}

async function saveLog(){
  if(!STATE.logPerson){notify(t('selectPersonFirst'),true);return;}
  await addPersonToTable(STATE.logPerson); // ensure they're in the people table

  var unit=parseFloat(STATE.logPrice)||0, total=unit*STATE.logQty;
  var loggedPerson = STATE.logPerson;
  var loggedDrink = STATE.logDrink;
  var insertObj = {
    date:STATE.logDate, person:loggedPerson, drink:loggedDrink,
    quantity:STATE.logQty, unit_price:unit, total_price:total,
    note:STATE.logNote, added_by:CURRENT_NAME, logged_by:CURRENT_NAME
  };
  if (IS_ADMIN) insertObj.user_id = CURRENT_USER.id;
  if (IS_GUEST) insertObj.guest_token = GUEST_TOKEN;

  var {data, error} = await SB.from('drink_logs').insert(insertObj).select().single();
  if(error){notify('Error: '+error.message,true);return;}
  await audit('LOG_DRINK','drink_logs',data.id,{person:loggedPerson,drink:loggedDrink,qty:STATE.logQty,total:total});
  STATE.logQty=1;STATE.logPrice='';STATE.logNote='';
  notify(t('drinkLogged')+' '+loggedPerson+' ✓');
  await loadAll();
  showDrinkCountPopup(loggedPerson, loggedDrink);
}

// ── PERSON + DAY DETAILED LOG (timestamped) ─────────────────
// ── PERSON'S RUNNING TAB (all entries since last settlement, grouped by day) ──
function showPersonRunningTab(person){
  var entries = STATE.logs
    .filter(function(l){ return l.person===person; })
    .slice()
    .sort(function(a,b){
      var ta = a.logged_at ? new Date(a.logged_at).getTime() : 0;
      var tb = b.logged_at ? new Date(b.logged_at).getTime() : 0;
      return tb - ta;
    });

  var totalQty = entries.reduce(function(s,l){ return s+(l.quantity||0); }, 0);
  var totalCost = entries.reduce(function(s,l){ return s+(parseFloat(l.total_price)||0); }, 0);

  // Group by date for readability
  var byDate = {};
  entries.forEach(function(l){ (byDate[l.date] = byDate[l.date]||[]).push(l); });
  var dates = Object.keys(byDate).sort().reverse();

  var sections = dates.map(function(d){
    var dayEntries = byDate[d];
    var rows = dayEntries.map(function(l){
      var timeStr = l.logged_at
        ? new Date(l.logged_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})
        : '—';
      var loggedBy = l.logged_by || l.added_by || '?';
      var byLine = (loggedBy && loggedBy !== person) ? ' · '+t('loggedBy')+' '+esc(loggedBy) : '';
      var canEdit = isMine(l);
      var qtyControl = canEdit
        ? '<div class="stepper" style="margin-top:4px">'+
            '<button class="btn-icon" style="width:26px;height:26px;font-size:14px" onclick="editDrinkQty(\''+l.id+'\',-1,\''+esc(person)+'\',\'\')">−</button>'+
            '<span style="font-size:13px;font-weight:700;min-width:22px;text-align:center">'+l.quantity+'</span>'+
            '<button class="btn-icon" style="width:26px;height:26px;font-size:14px" onclick="editDrinkQty(\''+l.id+'\',1,\''+esc(person)+'\',\'\')">+</button>'+
          '</div>'
        : '';
      return '<div class="entry">'+
        '<div class="entry-l">'+
          '<span class="ej">'+emoji(l.drink)+'</span>'+
          '<div>'+
            '<div class="en">'+esc(l.drink.replace(/^.+? /,''))+(!canEdit&&l.quantity>1?' ×'+l.quantity:'')+'</div>'+
            '<div class="es">🕐 '+timeStr+(l.total_price>0?' · €'+parseFloat(l.total_price).toFixed(2):' · '+t('free'))+byLine+'</div>'+
            (l.note?'<div class="es" style="font-style:italic">"'+esc(l.note)+'"</div>':'')+
            qtyControl+
          '</div>'+
        '</div>'+
      '</div>';
    }).join('');
    return '<div style="margin-bottom:14px">'+
      '<div style="font-size:11px;font-weight:700;color:#9c4a22;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">'+fmtDate(d)+'</div>'+
      rows+
    '</div>';
  }).join('');

  showModal(
    '<h3>🧾 '+esc(person)+esc(t('runningTabTitle'))+'</h3>'+
    '<div style="text-align:center;margin-bottom:14px">'+
      '<span style="font-size:12px;color:#8a7568">'+totalQty+' '+(totalQty!==1?t('drinksPlural'):t('drink'))+(totalCost>0?' · €'+totalCost.toFixed(2):'')+' '+t('sinceLastSettlement')+'</span>'+
    '</div>'+
    '<div style="max-height:380px;overflow-y:auto;margin-bottom:10px">'+(sections||'<div class="empty">No entries found.</div>')+'</div>'+
    '<button class="modal-close" onclick="closeModal()">'+esc(t('close'))+'</button>'
  );
}

function showPersonDayDetail(person, date){
  var entries = STATE.logs
    .filter(function(l){ return l.person===person && l.date===date; })
    .slice()
    .sort(function(a,b){
      // Sort by logged_at time if available, otherwise by time string, newest first
      var ta = a.logged_at ? new Date(a.logged_at).getTime() : 0;
      var tb = b.logged_at ? new Date(b.logged_at).getTime() : 0;
      return tb - ta;
    });

// ── EDIT DRINK QUANTITY (inline, from the person/day detail popup) ──
async function editDrinkQty(logId, delta, person, date){
  var entry = STATE.logs.find(function(l){ return l.id === logId; });
  if (!entry) return;
  if (!isMine(entry)) { notify(t('onlyOwnQty'), true); return; }

  var newQty = (entry.quantity||1) + delta;
  if (newQty <= 0) {
    if (!confirm('This will remove the entry entirely. Continue?')) return;
    var {error} = await SB.from('drink_logs').delete().eq('id', logId);
    if (error) { notify('Error: '+error.message, true); return; }
    await audit('DELETE_DRINK_LOGS','drink_logs',logId,{person:person,drink:entry.drink,reason:'qty reduced to 0'});
    notify('Entry removed');
  } else {
    var unitPrice = parseFloat(entry.unit_price)||0;
    var newTotal = unitPrice * newQty;
    var {error} = await SB.from('drink_logs').update({ quantity: newQty, total_price: newTotal }).eq('id', logId);
    if (error) { notify('Error: '+error.message, true); return; }
    await audit('EDIT_DRINK_QTY','drink_logs',logId,{person:person,drink:entry.drink,old_qty:entry.quantity,new_qty:newQty});
    notify('Updated to ×'+newQty+' ✓');
  }

  await loadAll();
  // Re-open the appropriate popup so the user sees the change immediately
  if (date) {
    showPersonDayDetail(person, date);
  } else {
    showPersonRunningTab(person);
  }
}

async function savePayment(){

// "Replace" path: zero out the priced drinks for the selected payers/date
// so they stop counting as money owed and instead show up as bottles owed.
async function convertToReplace(){
  var date = STATE.payDate;
  var payers = STATE.payPayers;
  if (!payers.length) { notify('Select who this is for', true); return; }

  // Find this date's priced (unpaid) drink entries for these people
  var targets = STATE.logs.filter(function(l){
    return l.date === date
      && payers.indexOf(l.person) !== -1
      && (parseFloat(l.unit_price)||0) > 0;
  });

  if (!targets.length) {
    notify('No priced drinks found for '+payers.join(', ')+' on '+fmtDate(date)+' to convert', true);
    return;
  }

  var movedCount = 0;
  for (var i=0; i<targets.length; i++) {
    var l = targets[i];
    var {error} = await SB.from('drink_logs').update({ unit_price: 0, total_price: 0 }).eq('id', l.id);
    if (!error) movedCount += (l.quantity||0);
  }

  await audit('CONVERT_TO_REPLACE','drink_logs',null,{date:date,payers:payers.join(', '),drinks_moved:movedCount});
  STATE.payPayers=[];STATE.payNonDrinkers=[];STATE.payAmount='';STATE.payNote='';
  notify(movedCount+' drink'+(movedCount!==1?'s':'')+' moved to Replace tab 🤐');
  await loadAll();
  switchTabByName('replace');
}

function switchTabByName(tab){
  var btn = [...document.querySelectorAll('nav button')].find(function(b){
    return b.getAttribute('onclick') && b.getAttribute('onclick').indexOf("'"+tab+"'") !== -1;
  });
  if (btn) switchTab(tab, btn);
}

// ══════════════════════════════════════════════════════════════
// REPLACE TAB
// ══════════════════════════════════════════════════════════════
function renderReplace(){
  var el=document.getElementById('tab-replace');
  var cbd={},pbd={};
  STATE.logs.forEach(function(l){cbd[l.date]=(cbd[l.date]||0)+(parseFloat(l.total_price)||0);});
  STATE.payments.forEach(function(p){pbd[p.date]=(pbd[p.date]||0)+(parseFloat(p.amount)||0);});
  var cdd={},rdd={};
  // Only drinks logged at €0 unit price count toward bottle replacement.
  // Priced drinks are settled via the Payments tab instead.
  STATE.logs.forEach(function(l){
    var unitPrice = parseFloat(l.unit_price)||0;
    if (unitPrice > 0) return; // skip — this is a paid drink, not a replace-owed one
    if(!cdd[l.date])cdd[l.date]={};
    cdd[l.date][l.drink]=(cdd[l.date][l.drink]||0)+(l.quantity||0);
  });
  STATE.replacements.forEach(function(r){
    if(!rdd[r.for_date])rdd[r.for_date]={};
    rdd[r.for_date][r.drink]=(rdd[r.for_date][r.drink]||0)+(r.quantity||0);
  });
  var days=Object.keys(cdd).sort().reverse().map(function(d){
    var consumed=cdd[d]||{},replaced=rdd[d]||{};
    var breakdown=Object.keys(consumed).map(function(drink){
      var owed=consumed[drink]||0,done=Math.min(replaced[drink]||0,owed);
      return {drink:drink,owed:owed,replaced:done,remaining:Math.max(0,owed-done)};
    });
    var to=breakdown.reduce(function(s,b){return s+b.owed;},0);
    var tr=breakdown.reduce(function(s,b){return s+b.replaced;},0);
    var trem=breakdown.reduce(function(s,b){return s+b.remaining;},0);
    var pm=(cbd[d]||0)-(pbd[d]||0);
    return {date:d,breakdown:breakdown,to:to,tr:tr,trem:trem,pm:pm,ms:pm<=0.005,bs:trem===0};
  }).filter(function(d){return d.to>0;}); // only show days that actually have zero-price (replace-owed) drinks

  var ob={};
  days.forEach(function(d){d.breakdown.forEach(function(b){
    if(!ob[b.drink])ob[b.drink]={owed:0,replaced:0,remaining:0};
    ob[b.drink].owed+=b.owed;ob[b.drink].replaced+=b.replaced;ob[b.drink].remaining+=b.remaining;
  });});
  var tot_o=Object.values(ob).reduce(function(s,v){return s+v.owed;},0);
  var tot_r=Object.values(ob).reduce(function(s,v){return s+v.replaced;},0);
  var tot_rem=Object.values(ob).reduce(function(s,v){return s+v.remaining;},0);

  if(!days.length){el.innerHTML=empty('✅',t('allSettledUp'),t('noUnsettledDays'));return;}

  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
    '<span style="font-size:12px;color:#8a7568">'+(STATE.undoStack.length?STATE.undoStack.length+' '+t('actionsInHistory'):t('noActions'))+'</span>'+
    '<button onclick="undoReplace()" '+(STATE.undoStack.length?'':'disabled')+' style="background:'+(STATE.undoStack.length?'#3a261c':'#f5ede4')+';border:1px solid '+(STATE.undoStack.length?'#c75a2a':'#e8dccc')+';border-radius:8px;padding:6px 13px;cursor:pointer;color:'+(STATE.undoStack.length?'#e8c9a0':'#8a7568')+';font-size:12px;font-weight:600">'+esc(t('undoBtn'))+(STATE.undoStack.length?' ('+STATE.undoStack.length+')':'')+'</button></div>';

  html+=sg([{v:tot_o,l:t('bottlesOwed')},{v:tot_r,l:t('replaced'),c:'g'},{v:tot_rem,l:t('stillOwed'),c:tot_rem>0?'r':'g'}]);

  if(Object.keys(ob).length) html+=card(t('allUnsettledTotals'),Object.entries(ob).map(function(e){
    var drink=e[0],v=e[1],pct=v.owed>0?Math.round(v.replaced/v.owed*100):100;
    return '<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;margin-bottom:3px">'+
      '<span style="font-size:13px;font-weight:600">'+esc(drink)+'</span>'+
      '<span style="font-size:12px;font-weight:700;color:'+(v.remaining>0?'#a87a00':'#1f8a4f')+'">'+v.replaced+'/'+v.owed+(v.remaining>0?' · '+v.remaining+' '+t('left'):' ✓')+'</span></div>'+
      '<div class="prog"><div class="prog-fill'+(v.remaining===0?' done':'')+'" style="width:'+pct+'%"></div></div></div>';
  }).join(''));

  days.forEach(function(day){
    html+='<div class="card" style="padding:0;overflow:hidden;margin-bottom:12px">'+
      '<div class="dh"><div><h4>'+fmtDate(day.date)+'</h4><p>'+day.tr+'/'+day.to+' replaced</p></div>'+
      '<div style="text-align:right">'+(!day.ms?'<div style="font-size:13px;color:#c4392b;font-weight:700">€'+day.pm.toFixed(2)+' due</div>':'<div style="font-size:12px;color:#b5481f">'+esc(t('settled'))+'</div>')+
      (day.bs?'<div style="font-size:11px;color:#b5481f">🍾 done ✓</div>':'<div style="font-size:11px;color:#a87a00">'+day.trem+' '+t('left')+'</div>')+'</div></div>'+
      '<div style="padding:11px 14px">'+
      day.breakdown.map(function(b){
        var bottles='';
        for(var i=0;i<b.owed;i++) bottles+='<div class="bottle '+(i<b.replaced?'done':'empty')+'">'+emoji(b.drink)+'</div>';
        return '<div style="margin-bottom:11px">'+
          '<div style="display:flex;justify-content:space-between;margin-bottom:4px">'+
          '<span style="font-size:13px;font-weight:600;color:#2e1c14">'+esc(b.drink)+'</span>'+
          '<span style="font-size:11px;font-weight:700;color:'+(b.remaining>0?'#a87a00':'#1f8a4f')+'">'+b.replaced+'/'+b.owed+(b.remaining===0?' ✓':'')+'</span></div>'+
          '<div class="bottles">'+bottles+'</div>'+
          (b.remaining>0?
            '<div class="repl-ctrl">'+
              '<button class="btn-icon" onclick="replBottle(\''+day.date+'\',\''+b.drink+'\',-1)" '+(b.replaced<=0?'disabled':'')+'>−</button>'+
              '<span>'+b.remaining+' '+esc(t('toReplace'))+'</span>'+
              '<button class="btn-icon" style="border-color:#c75a2a;background:#f3e4d3;color:#b5481f" onclick="replBottle(\''+day.date+'\',\''+b.drink+'\',1)">+</button>'+
              '<span style="color:#b5481f;font-size:11px">'+esc(t('markReplaced'))+'</span></div>' :
            '<div style="display:flex;align-items:center;gap:6px"><span style="font-size:12px;color:#b5481f">'+esc(t('allReplaced'))+' ✓</span>'+
            '<button onclick="replBottle(\''+day.date+'\',\''+b.drink+'\',-1)" style="background:none;border:none;cursor:pointer;color:#8a7568;font-size:12px">'+esc(t('undo'))+'</button></div>')+
        '</div>';
      }).join('')+
      (day.breakdown.length?'<div style="display:flex;justify-content:space-between;padding-top:7px;border-top:1px solid #ece0d4">'+
        '<span style="font-size:11px;font-weight:700;color:#8a7568;text-transform:uppercase;letter-spacing:.7px">'+esc(t('dayTotal'))+'</span>'+
        '<span style="font-size:12px;font-weight:700;color:'+(day.trem>0?'#c4392b':'#1f8a4f')+'">'+day.tr+'/'+day.to+(day.trem>0?' · '+day.trem+' '+t('left'):' · '+t('allDone')+' ✓')+'</span></div>':'')+
      '</div></div>';
  });

  if(STATE.replacements.length) html+=card(t('replacementLog'),STATE.replacements.map(function(r){
    var canDel=isMine(r);
    return '<div class="entry"><div class="entry-l"><span class="ej">'+emoji(r.drink)+'</span><div>'+
      '<div class="en">'+r.quantity+'× '+esc(r.drink.replace(/^.+? /,''))+'</div>'+
      '<div class="es">'+esc(t('forDate'))+' '+fmtDate(r.for_date)+(r.replaced_by?' · by '+esc(r.replaced_by):'')+(r.note?' · '+esc(r.note):'')+'</div>'+
      '<div class="es" style="color:#a8978a">'+t('loggedBy')+' '+esc(r.added_by||'unknown')+'</div>'+
      '</div></div>'+delEditBtns('replacements',r.id,'Replacement for '+fmtDate(r.for_date),canDel,r)+'</div>';
  }).join(''));

  el.innerHTML=html;
}

async function replBottle(date,drink,delta){
  var existing=STATE.replacements.find(function(r){return r.for_date===date&&r.drink===drink;});
  STATE.undoStack.push(JSON.parse(JSON.stringify(STATE.replacements)));
  if(STATE.undoStack.length>20)STATE.undoStack.shift();
  if(delta>0){
    if(existing){
      await SB.from('replacements').update({quantity:existing.quantity+1}).eq('id',existing.id);
    } else {
      var insertObj = {for_date:date,drink:drink,quantity:1,replaced_by:CURRENT_NAME,note:'',added_by:CURRENT_NAME};
      if (IS_ADMIN) insertObj.user_id = CURRENT_USER.id;
      if (IS_GUEST) insertObj.guest_token = GUEST_TOKEN;
      var {data}=await SB.from('replacements').insert(insertObj).select().single();
      await audit('MARK_REPLACEMENT','replacements',data&&data.id,{date:date,drink:drink,qty:1});
    }
    notify('1× '+drink+' marked replaced ✓');
  } else {
    if(!existing||existing.quantity<=0)return;
    if(existing.quantity===1){await SB.from('replacements').delete().eq('id',existing.id);}
    else{await SB.from('replacements').update({quantity:existing.quantity-1}).eq('id',existing.id);}
    notify('Replacement removed');
  }
  await loadAll();
}

async function undoReplace(){
  if(!STATE.undoStack.length)return;
  var prev=STATE.undoStack.pop();
  await SB.from('replacements').delete().neq('id','00000000-0000-0000-0000-000000000000');
  if(prev.length){
    var ins=prev.map(function(r){return {for_date:r.for_date,drink:r.drink,quantity:r.quantity,replaced_by:r.replaced_by||'',note:r.note||'',added_by:r.added_by||'',user_id:r.user_id||null,guest_token:r.guest_token||''};});
    await SB.from('replacements').insert(ins);
  }
  await audit('UNDO_REPLACE','replacements',null,{restored:prev.length+' entries'});
  notify('Undo successful ✓');
  await loadAll();
}

// ── GENERIC DELETE ──────────────────────────────────────────
async function delEntry(table,id,label){
  if(!confirm(t('deleteConfirm')+' '+label+'?\n\n'+t('cannotBeUndone')))return;
  var {error}=await SB.from(table).delete().eq('id',id);
  if(error){notify('Error: '+error.message,true);return;}
  var actionMap={'drink_logs':'DELETE_DRINK_LOGS','payments':'DELETE_PAYMENTS','replacements':'DELETE_REPLACEMENTS'};
  await audit(actionMap[table]||'DELETE',table,id,{label:label});
  notify(t('deleted'));
  await loadAll();
}

function delEditBtns(table, id, label, canDel, row){
  var del = canDel ? '<button class="btn-sm" onclick="delEntry(\''+table+'\',\''+id+'\',\''+label+'\')">🗑</button>' : '<span style="font-size:11px;color:#a8978a">🔒</span>';
  var edit = '';
  if (IS_ADMIN) {
    if (table === 'drink_logs') edit = '<button class="btn-edit" onclick="adminEditDrink(\''+id+'\')">✏️ Edit</button>';
    if (table === 'payments') edit = '<button class="btn-edit" onclick="adminEditPayment(\''+id+'\')">✏️ Edit</button>';
    if (table === 'replacements') edit = '<button class="btn-edit" onclick="adminEditReplacement(\''+id+'\')">✏️ Edit</button>';
  }
  return edit+del;
}

async function adminEditDrink(id){
  var entry = STATE.logs.find(function(l){return l.id===id;});
  if(!entry) return;
  var newPerson = prompt('Edit person (current: '+entry.person+'):', entry.person);
  if(newPerson===null) return;
  var newQty   = prompt('Edit quantity (current: '+entry.quantity+'):', entry.quantity);
  if(newQty===null) return;
  var newPrice = prompt('Edit price per drink in € (current: '+parseFloat(entry.unit_price||0).toFixed(2)+'):', parseFloat(entry.unit_price||0).toFixed(2));
  if(newPrice===null) return;
  var newNote  = prompt('Edit note (current: '+(entry.note||'')+'):', entry.note||'');
  if(newNote===null) return;
  var person = newPerson.trim() || entry.person;
  var qty=parseInt(newQty)||1, price=parseFloat(newPrice)||0, total=qty*price;
  await addPersonToTable(person);
  var {error} = await SB.from('drink_logs').update({person:person,quantity:qty,unit_price:price,total_price:total,note:newNote}).eq('id',id);
  if(error){notify('Error: '+error.message,true);return;}
  await audit('ADMIN_EDIT_DRINK','drink_logs',id,{qty:qty,price:price,total:total,note:newNote,person:person,original_person:entry.person});
  notify(t('entryUpdated'));
  await loadAll();
}

async function adminEditPayment(id){
  var entry = STATE.payments.find(function(p){return p.id===id;});
  if(!entry) return;
  var newPayers = prompt('Edit payers, comma-separated (current: '+entry.payers+'):', entry.payers);
  if(newPayers===null) return;
  var newAmount = prompt('Edit amount in € (current: '+parseFloat(entry.amount||0).toFixed(2)+'):', parseFloat(entry.amount||0).toFixed(2));
  if(newAmount===null) return;
  var newDate = prompt('Edit date (YYYY-MM-DD, current: '+entry.date+'):', entry.date);
  if(newDate===null) return;

    payers: newPayers.trim(), amount: parseFloat(newAmount)||0, date: newDate.trim(), note: newNote

async function adminEditReplacement(id){

// ── UI HELPERS ──────────────────────────────────────────────
function card(title,content){return '<div class="card">'+(title?'<div class="card-title">'+title+'</div>':'')+content+'</div>';}
function fld(label,input){return '<div class="fld"><label class="form-label">'+label+'</label>'+input+'</div>';}
function sg(items){return '<div class="sg">'+items.map(function(s){return '<div class="sb"><div class="sv'+(s.c?' '+s.c:'')+'">'+s.v+'</div><div class="sl">'+s.l+'</div></div>';}).join('')+'</div>';}
function stepper(k,v){return '<div class="stepper"><button class="btn-icon" onclick="STATE.'+k+'=Math.max(1,STATE.'+k+'-1);renderTab(STATE.tab)">−</button><input type="number" min="1" value="'+v+'" oninput="STATE.'+k+'=parseInt(this.value)||1;updTotal()" style="width:56px;text-align:center;font-weight:700;font-size:15px"/><button class="btn-icon" onclick="STATE.'+k+'++;renderTab(STATE.tab)">+</button></div>';}
function pOpts(sel){return '<option value="">— select —</option>'+STATE.people.map(function(p){return '<option value="'+esc(p.display_name)+'"'+(p.display_name===sel?' selected':'')+'>'+esc(p.display_name)+'</option>';}).join('');}
function tog(k,v){var i=STATE[k].indexOf(v);if(i===-1)STATE[k].push(v);else STATE[k].splice(i,1);renderTab(STATE.tab);}
function empty(icon,title,sub){return '<div class="empty"><div class="big">'+icon+'</div><strong style="color:#2e1c14">'+title+'</strong><p>'+sub+'</p></div>';}
function notify(msg,err){var el=document.getElementById('notif');var p=document.createElement('div');p.className='np'+(err?' err':'');p.textContent=msg;el.appendChild(p);setTimeout(function(){p.remove();},2600);}
function td(){return new Date().toISOString().split('T')[0];}
function fmtDate(d){if(!d)return '';var dt=new Date(String(d).includes('T')?d:d+'T00:00:00');return dt.toLocaleDateString('en-GB',{weekday:'short',month:'short',day:'numeric'});}
function fmtDateTime(d){if(!d)return '';var dt=new Date(d);return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' '+dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}
function emoji(drink){return (String(drink||'')).split(' ')[0]||'🍹';}
function colorFor(name){name=String(name||'?');var sum=0;for(var i=0;i<name.length;i++)sum+=name.charCodeAt(i);return AVATAR_COLORS[sum%AVATAR_COLORS.length];}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function showModal(html){
  document.getElementById('modal-root').innerHTML =
    '<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal-box">'+html+'</div></div>';
}
function closeModal(){
  document.getElementById('modal-root').innerHTML = '';
}

// ── MY BALANCE (Log tab button) ─────────────────────────────
function showMyBalance(){
  var me = CURRENT_NAME;
  var myLogs = STATE.logs.filter(function(l){ return l.person === me; });

  // Money owed: sum of priced drinks minus payments made by me
  var myCost = myLogs.reduce(function(s,l){
    var unitPrice = parseFloat(l.unit_price)||0;
    return unitPrice > 0 ? s + (parseFloat(l.total_price)||0) : s;
  }, 0);
  var myPaid = STATE.payments.reduce(function(s,p){
    var payers = (p.payers||'').split(',').map(function(x){return x.trim();});
    return payers.indexOf(me) !== -1 ? s + (parseFloat(p.amount)||0) : s;
  }, 0);
  var myPending = myCost - myPaid;

  // Bottles owed: zero-price drinks minus what's been replaced
  var owedByDrink = {}, replacedByDrink = {};
  myLogs.forEach(function(l){
    var unitPrice = parseFloat(l.unit_price)||0;
    if (unitPrice > 0) return;
    owedByDrink[l.drink] = (owedByDrink[l.drink]||0) + (l.quantity||0);
  });
  STATE.replacements.forEach(function(r){
    if (r.replaced_by === me || r.logged_by === me) {
      replacedByDrink[r.drink] = (replacedByDrink[r.drink]||0) + (r.quantity||0);
    }
  });
  var totalOwedBottles = Object.values(owedByDrink).reduce(function(s,v){return s+v;},0);
  var totalReplacedBottles = Object.keys(owedByDrink).reduce(function(s,drink){
    return s + Math.min(replacedByDrink[drink]||0, owedByDrink[drink]);
  }, 0);
  var stillOwedBottles = totalOwedBottles - totalReplacedBottles;

  var moneyColor = myPending > 0.005 ? '#c4392b' : '#1f8a4f';
  var bottleColor = stillOwedBottles > 0 ? '#d4a017' : '#1f8a4f';

  showModal(
    '<h3>'+esc(t('yourBalance'))+'</h3>'+
    '<div class="modal-stat"><span class="modal-stat-label">'+esc(t('youOweMoney'))+'</span><span class="modal-stat-val" style="color:'+moneyColor+'">'+(myPending>0.005?'€'+myPending.toFixed(2):'€0.00 ✓')+'</span></div>'+
    '<div class="modal-stat"><span class="modal-stat-label">'+esc(t('bottlesToReplace'))+'</span><span class="modal-stat-val" style="color:'+bottleColor+'">'+(stillOwedBottles>0?stillOwedBottles+' '+esc(t('left')):esc(t('done'))+' ✓')+'</span></div>'+
    '<div class="modal-stat"><span class="modal-stat-label">'+esc(t('totalSpentPriced'))+'</span><span class="modal-stat-val" style="color:#6b5a4d;font-size:14px">€'+myCost.toFixed(2)+'</span></div>'+
    '<div class="modal-stat"><span class="modal-stat-label">'+esc(t('totalPaidLbl'))+'</span><span class="modal-stat-val" style="color:#6b5a4d;font-size:14px">€'+myPaid.toFixed(2)+'</span></div>'+
    '<div class="modal-stat"><span class="modal-stat-label">'+esc(t('freeDrinksLogged'))+'</span><span class="modal-stat-val" style="color:#6b5a4d;font-size:14px">'+totalOwedBottles+'</span></div>'+
    '<button class="modal-close" onclick="closeModal()">'+esc(t('close'))+'</button>'
  );
}
