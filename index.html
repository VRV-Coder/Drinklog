<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <title>🍺 Beer'O'Clock</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23d4f521'/%3E%3Cpath d='M50 2 C30 20 30 80 50 98' stroke='white' stroke-width='5' fill='none'/%3E%3Cpath d='M50 2 C70 20 70 80 50 98' stroke='white' stroke-width='5' fill='none'/%3E%3C/svg%3E"/>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Segoe UI',system-ui,sans-serif;font-size:16px;background:linear-gradient(160deg,#7a2e1a 0%,#8f3a20 35%,#6e2814 100%);background-attachment:fixed;color:#fdf3ea;min-height:100vh;position:relative}
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.05;
      background-image:
        linear-gradient(rgba(255,255,255,.6) 2px, transparent 2px),
        linear-gradient(90deg, rgba(255,255,255,.6) 2px, transparent 2px);
      background-size:120px 120px;
    }
    #auth-screen,#app{position:relative;z-index:1}
    button{transition:transform .12s ease, box-shadow .12s ease, background .15s ease, color .15s ease, border-color .15s ease}
    button:active{transform:scale(.97)}
    .btn-primary:hover,.btn-green:hover,.btn-auth:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.25)}
    .card{transition:box-shadow .2s ease}
    .chip:hover{transform:translateY(-1px)}
    #auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .auth-card{background:rgba(255,255,255,0.97);border:1px solid rgba(255,255,255,0.4);border-radius:20px;padding:34px 30px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,20,10,.45),0 2px 8px rgba(0,0,0,.15);backdrop-filter:blur(10px)}
    .auth-card h1{font-size:24px;color:#7a2e1a;margin-bottom:4px;font-weight:800;letter-spacing:-.3px}
    .auth-card p{font-size:15px;color:#3a2a1d;margin-bottom:22px;line-height:1.6}
    .auth-tabs{display:flex;gap:0;border-bottom:2px solid #e8ede8;margin-bottom:20px}
    .auth-tab{flex:1;padding:11px;background:none;border:none;cursor:pointer;font-size:15px;font-weight:700;color:#6a4a38;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s}
    .auth-tab.active{color:#7a2e1a;border-bottom-color:#c5e000}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:13px;font-weight:700;color:#4a3a2e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
    .field input{width:100%;background:#f4f7f4;border:1.5px solid #e8dccc;border-radius:10px;padding:12px 14px;color:#1a0e08;font-size:15px;outline:none;transition:border-color .15s,box-shadow .15s}
    .field input:focus{border-color:#d4a017;box-shadow:0 0 0 3px rgba(143,201,58,.15)}
    .btn-auth{width:100%;background:linear-gradient(135deg,#7a2e1a,#a8431d);border:none;border-radius:12px;padding:13px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;box-shadow:0 4px 14px rgba(11,61,36,.35);transition:transform .12s,box-shadow .12s}
    .auth-error{color:#d64545;font-size:14px;margin-top:8px;min-height:16px;line-height:1.5}
    .auth-note{font-size:13px;color:#6a5a4c;margin-top:12px;text-align:center;line-height:1.6}
    #app{display:none}
    .header{border-bottom:1px solid rgba(255,255,255,.08);padding:14px 16px 0;background:linear-gradient(180deg,#6e2814,#7a2e1a);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.25)}
    .header-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .header-row h1{font-size:19px;font-weight:800;color:#fff;letter-spacing:-.3px}
    .user-badge{margin-left:auto;display:flex;align-items:center;gap:8px}
    .user-name{font-size:14px;color:#f0e8a0;font-weight:700}
    .admin-badge{display:inline-block;background:linear-gradient(135deg,#d4a017,#f0c63a);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:800;color:#3d2e00;margin-left:4px;letter-spacing:.5px}
    .btn-logout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:7px;padding:6px 13px;color:#f0e0c0;font-size:13px;cursor:pointer;transition:all .15s}
    .btn-logout:hover{color:#ff8a8a;border-color:#ff8a8a;background:rgba(255,100,100,.1)}
    nav{display:flex;overflow-x:auto;scrollbar-width:none}
    nav::-webkit-scrollbar{display:none}
    nav button{background:none;border:none;cursor:pointer;padding:10px 14px;font-size:13px;font-weight:700;white-space:nowrap;color:#7da888;border-bottom:3px solid transparent;flex-shrink:0;transition:color .15s,border-color .15s}
    nav button.active{color:#d4f521;border-bottom-color:#d4f521}
    .content{max-width:680px;margin:0 auto;padding:14px}
    .card{background:rgba(255,255,255,.97);border:1px solid rgba(255,255,255,.5);border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:0 4px 20px rgba(20,10,0,.2),0 1px 4px rgba(0,0,0,.1);color:#1a0e08}
    .card-title{font-size:13px;font-weight:800;color:#9c4a22;text-transform:uppercase;letter-spacing:1px;margin-bottom:13px}
    .form-label{display:block;font-size:13px;font-weight:700;color:#4a3020;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
    input[type=text],input[type=number],input[type=date],input[type=email],input[type=password],select{width:100%;background:#f4f7f4;border:1.5px solid #e8dccc;border-radius:9px;padding:9px 12px;color:#2e1c14;font-size:14px;outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s}
    input:focus,select:focus{border-color:#d4a017;box-shadow:0 0 0 3px rgba(143,201,58,.15)}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .fld{margin-bottom:10px}
    .btn-primary{width:100%;background:linear-gradient(135deg,#7a2e1a,#b5481f);border:none;border-radius:11px;padding:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 3px 12px rgba(11,61,36,.3);transition:transform .12s,box-shadow .12s}
    .btn-green{width:100%;background:linear-gradient(135deg,#c5e000,#d4f521);border:none;border-radius:11px;padding:12px;color:#1f3a0a;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 3px 12px rgba(197,224,0,.35);transition:transform .12s,box-shadow .12s}
    .btn-sm{background:none;border:none;cursor:pointer;font-size:15px;color:#6a3020;padding:2px;transition:color .15s}
    .btn-icon{width:33px;height:33px;border-radius:9px;border:1.5px solid #e8dccc;background:#f4f7f4;color:#b5481f;font-size:17px;font-weight:700;cursor:pointer;transition:all .15s}
    .btn-edit{background:#f5ede4;border:1px solid #e8dccc;border-radius:7px;padding:3px 9px;color:#a85428;font-size:11px;cursor:pointer;margin-right:4px;font-weight:600;transition:all .15s}
    .btn-edit:hover{border-color:#d4a017;color:#b5481f;background:#faf2e8}
    .chips{display:flex;flex-wrap:wrap;gap:6px}
    .chip{padding:8px 14px;border:1.5px solid #e8dccc;border-radius:20px;cursor:pointer;font-size:14px;background:#f4f7f4;color:#4a3020;user-select:none;transition:all .15s;font-weight:500}
    .chip.cp{background:linear-gradient(135deg,#7a2e1a,#b5481f);border-color:#b5481f;color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(11,61,36,.3)}
    .chip.cg{background:linear-gradient(135deg,#c5e000,#d4f521);border-color:#c5e000;color:#1f3a0a;font-weight:800;box-shadow:0 2px 8px rgba(197,224,0,.3)}
    .chip.cy{background:linear-gradient(135deg,#f0c63a,#f8d878);border-color:#e8b820;color:#4a3500;font-weight:800;box-shadow:0 2px 8px rgba(240,198,58,.3)}
    .sg{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
    .sb{background:rgba(255,255,255,.97);border:1px solid rgba(255,255,255,.5);border-radius:13px;padding:14px 8px;text-align:center;box-shadow:0 3px 12px rgba(0,20,10,.15)}
    .sv{font-size:24px;font-weight:800;color:#b5481f;letter-spacing:-1px}
    .sv.g{color:#c78a2e}.sv.r{color:#d6483a}
    .sl{font-size:12px;font-weight:700;color:#6a5a4c;text-transform:uppercase;letter-spacing:.7px;margin-top:3px}
    .entry{display:flex;align-items:center;justify-content:space-between;background:#faf5f0;border:1px solid #ece0d4;border-radius:10px;padding:9px 12px;margin-bottom:7px;transition:background .15s}
    .entry-l{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
    .ej{font-size:18px;flex-shrink:0}
    .en{font-size:15px;font-weight:700;color:#b5481f}
    .es{font-size:13px;color:#3a2a1d;margin-top:2px}
    .badge{display:inline-block;background:#f3e4d3;border-radius:20px;padding:3px 11px;font-size:13px;color:#7a2e10;font-weight:700}
    .badge.g{background:#f5e8da;color:#b5481f}
    .badge.r{background:#fce8e6;color:#c4392b}
    .avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
    .total-row{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#faf2e8,#f3e4d3);border:1px solid #e8c9a0;border-radius:10px;padding:10px 14px;margin-bottom:11px}
    .total-row span:first-child{font-size:11px;color:#a85428;font-weight:700;text-transform:uppercase;letter-spacing:.7px}
    .total-row span:last-child{font-size:16px;font-weight:800;color:#b5481f}
    .stepper{display:flex;align-items:center;gap:8px}
    .stepper input{width:58px;text-align:center;font-weight:700;font-size:15px}
    .brow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0e6d8}
    .brow:last-child{border-bottom:none}
    .prog{height:6px;background:#f0e6d8;border-radius:4px;overflow:hidden;margin-top:4px}
    .prog-fill{height:6px;border-radius:4px;background:linear-gradient(to right,#7a2e1a,#b5481f);transition:width .4s ease}
    .prog-fill.done{background:linear-gradient(to right,#c5e000,#d4f521)}
    .bottles{display:flex;flex-wrap:wrap;gap:5px;margin:5px 0 7px}
    .bottle{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px}
    .bottle.done{background:#f3e4d3;border:1.5px solid #d4a017}
    .bottle.empty{background:#f4f7f4;border:1.5px solid #e8dccc;opacity:.5}
    .repl-ctrl{display:flex;align-items:center;gap:7px;margin-top:5px}
    .repl-ctrl span{font-size:11px;color:#5a3a28;min-width:100px;text-align:center}
    .dh{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:linear-gradient(135deg,#7a2e1a,#8f3a20);border-bottom:1px solid rgba(255,255,255,.08)}
    .dh h4{font-size:14px;font-weight:800;color:#d4f521}
    .dh p{font-size:11px;color:#e0c4a8;margin-top:1px}
    .audit-entry{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f0e6d8}
    .audit-entry:last-child{border-bottom:none}
    .audit-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
    .audit-body{flex:1}
    .audit-who{font-size:15px;font-weight:700;color:#b5481f}
    .audit-what{font-size:14px;color:#3a2a1d;margin-top:2px}
    .audit-when{font-size:12px;color:#7a6858;margin-top:2px}
    #notif{position:fixed;top:14px;right:14px;z-index:9999;pointer-events:none}
    .np{background:linear-gradient(135deg,#7a2e1a,#b5481f);border:1px solid #c75a2a;color:#d4f521;padding:9px 16px;border-radius:11px;font-size:12px;font-weight:700;margin-bottom:6px;box-shadow:0 6px 24px rgba(0,0,0,.3);animation:si .25s cubic-bezier(.34,1.56,.64,1)}
    .np.err{background:linear-gradient(135deg,#5c1818,#7a2424);border-color:#c44;color:#ffb0b0}
    @keyframes si{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .empty{text-align:center;padding:40px 16px;color:#e0c4a8;font-size:13px}
    .empty .big{font-size:32px;margin-bottom:7px}
    .mine-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#d4f521;margin-right:3px;vertical-align:middle}
    /* CONSOLIDATED DAY SUMMARY (Log tab) */
    .day-summary{background:#faf5f0;border:1px solid #ece0d4;border-radius:11px;padding:11px 13px;margin-bottom:9px}
    .day-summary-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .day-summary-head h5{font-size:14px;font-weight:800;color:#7a2e10;text-transform:uppercase;letter-spacing:.6px}
    .person-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0}
    .person-row-l{display:flex;align-items:center;gap:8px}
    .drink-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
    .drink-tag{font-size:13px;background:#f5ede4;border-radius:10px;padding:3px 10px;color:#7a3010;font-weight:700}
    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(6,30,18,.7);z-index:9998;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);animation:fadeIn .2s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal-box{background:#fff;border:1px solid rgba(255,255,255,.5);border-radius:20px;padding:26px 24px;width:100%;max-width:380px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 70px rgba(0,20,10,.5);color:#2e1c14}
    .modal-box h3{font-size:19px;color:#7a2e1a;margin-bottom:14px;text-align:center;font-weight:800}
    .modal-stat{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #f0e6d8}
    .modal-stat:last-child{border-bottom:none}
    .modal-stat-label{font-size:15px;color:#3a2a1d}
    .modal-stat-val{font-size:17px;font-weight:800}
    .modal-close{width:100%;margin-top:16px;background:#f4f7f4;border:1px solid #e8dccc;border-radius:11px;padding:11px;color:#3a2010;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s}
    .modal-primary{width:100%;background:linear-gradient(135deg,#7a2e1a,#b5481f);border:none;border-radius:11px;padding:13px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(122,46,26,.35)}
    .modal-question{font-size:18px;color:#3a1a0a;text-align:center;margin-bottom:18px;line-height:1.5;font-weight:700}
    .modal-btn-row{display:flex;gap:10px}
    .modal-btn{flex:1;border:none;border-radius:10px;padding:13px 8px;font-size:14px;font-weight:700;cursor:pointer}
    .modal-btn-pay{background:linear-gradient(135deg,#c5e000,#d4f521);color:#1f3a0a;box-shadow:0 4px 14px rgba(197,224,0,.4)}
    .modal-btn-replace{background:linear-gradient(135deg,#7a2e1a,#b5481f);color:#fff;box-shadow:0 4px 14px rgba(11,61,36,.4)}

    /* TEAM PHOTO BANNER */
    .team-banner{width:100%;max-height:200px;object-fit:cover;object-position:center 20%;display:block;border-bottom:3px solid rgba(255,255,255,.12)}
    .team-banner-wrap{position:relative;overflow:hidden}
    .team-banner-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(110,40,20,.7));pointer-events:none}
    .team-banner-label{position:absolute;bottom:12px;left:0;right:0;text-align:center;color:#fff;font-size:16px;font-weight:800;letter-spacing:.8px;text-shadow:0 2px 8px rgba(0,0,0,.7)}
    /* QUICK-TAP BAR */
    .bar-drink-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:4px}
    .bar-drink-btn{background:#faf5f0;border:2px solid #e8dccc;border-radius:14px;padding:10px 5px;text-align:center;cursor:pointer;transition:all .14s;position:relative;user-select:none;-webkit-tap-highlight-color:transparent;overflow:hidden}
    .bar-drink-btn:active{transform:scale(.93);background:#f3e4d3}
    .bar-drink-btn.selected{border-color:#b5481f;background:#fce4d0}
    .bar-drink-btn .bdb-emoji{font-size:26px;display:block;margin-bottom:3px;line-height:1}
    .bar-drink-btn .bdb-name{font-size:10px;font-weight:700;color:#3a2010;display:block;margin-bottom:4px;line-height:1.25;word-break:keep-all}
    .bar-drink-btn .bdb-price{display:flex;align-items:center;justify-content:center;gap:1px;background:#fff;border:1.5px solid #e8dccc;border-radius:8px;padding:3px 5px;margin:0 2px}
    .bar-drink-btn .bdb-price span{font-size:12px;font-weight:800;color:#b5481f}
    .bar-drink-btn .bdb-price input{width:40px;border:none;background:transparent;color:#b5481f;font-weight:800;font-size:13px;text-align:center;outline:none;padding:0}
    .running-tab-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#faf5f0;border-radius:10px;margin-bottom:7px;border:1.5px solid #f0dece}
    .running-tab-row.mine{border-color:#b5481f;background:#fce8da}
    .rtab-name{font-size:15px;font-weight:700;color:#1a0e08}
    .rtab-drinks{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
    .rtab-drink-item{background:#f3e4d3;border-radius:8px;padding:3px 8px;font-size:13px;font-weight:600;color:#7a2e10;display:flex;align-items:center;gap:4px}
    .rtab-drink-item button{background:none;border:none;cursor:pointer;color:#c4392b;font-size:14px;font-weight:700;padding:0 2px;line-height:1}
    .rtab-drink-item button.plus{color:#1f7a47}
    .rtab-total{font-size:16px;font-weight:800;color:#b5481f;white-space:nowrap}
    .rtab-free{font-size:11px;color:#7a5200;font-weight:600}
    .person-bar-select{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
    .pbs-btn{padding:9px 18px;border-radius:24px;border:2px solid #e8dccc;background:#faf5f0;font-size:15px;font-weight:700;color:#3a2010;cursor:pointer;transition:all .14s;display:flex;align-items:center;gap:7px}
    .pbs-btn.active{border-color:#b5481f;background:#fce4d0;color:#7a2e10}
    .pbs-btn .pbs-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
    .btn-advanced-toggle{width:100%;background:#faf5f0;border:2px solid #b5481f;border-radius:12px;padding:13px 16px;color:#7a2e10;font-size:15px;font-weight:800;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.2px}
    .btn-advanced-toggle:hover{background:#fce4d0}
    @media(max-width:480px){.grid2{grid-template-columns:1fr}.sg{grid-template-columns:repeat(2,1fr)}.bar-drink-grid{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <h1>🍺 Beer'O'Clock</h1>
    <p>Enter your name to join, or sign in if you're the admin.</p>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="authTab('guest',this)">I'm a Guest</button>
      <button class="auth-tab" onclick="authTab('admin',this)">Admin Sign In</button>
    </div>
    <div id="auth-form-guest">
      <div class="field"><label>Your Name</label><input id="guest-name" type="text" placeholder="e.g. John" onkeydown="if(event.key==='Enter')guestEnter()"/></div>
      <button class="btn-auth" onclick="guestEnter()">Enter App</button>
      <p class="auth-note">No password needed — just enter your name to start logging drinks.</p>
    </div>
    <div id="auth-form-admin" style="display:none">
      <div class="field"><label>Admin Email</label><input id="li-email" type="email" placeholder="you@email.com"/></div>
      <div class="field"><label>Password</label><input id="li-pass" type="password" placeholder="••••••••"/></div>
      <button class="btn-auth" onclick="signIn()">Sign In</button>
    </div>
    <div id="auth-error" class="auth-error"></div>
  </div>
</div>

<div id="app">
  <div id="notif"></div>
  <div id="modal-root"></div>
  <div class="header">
    <div class="header-row">
      <span style="font-size:22px">🎾🍺</span>
      <h1 id="app-h1">Beer'O'Clock</h1>

}

function setLang(lang){
  LANG = lang;
  localStorage.setItem('app_lang', lang);

  if (document.getElementById('app') && document.getElementById('app').style.display !== 'none') {
    renderTab(STATE.tab);

}

window.addEventListener('load', function(){
  if (typeof supabase === 'undefined') {
    showConfigError('Failed to load Supabase library. Check your internet connection and reload.');
    return;
  }
  if (!SUPA_URL || !SUPA_KEY) { showConfigScreen(); return; }
  initSupabase(SUPA_URL, SUPA_KEY);
});

function showConfigScreen(){
  document.getElementById('auth-screen').innerHTML =
    '<div class="auth-card"><h1>🍺 Beer\'O\'Clock</h1>' +
    '<p>First time setup — enter the shared Supabase connection details.</p>' +
    '<div class="field"><label>Supabase URL</label><input id="cfg-url" type="text" placeholder="https://xxxx.supabase.co"/></div>' +
    '<div class="field"><label>Supabase Anon Key</label><input id="cfg-key" type="text" placeholder="eyJhbGci..."/></div>' +
    '<div id="cfg-error" class="auth-error"></div>' +
    '<button class="btn-auth" onclick="submitConfig()">Connect</button></div>';
  document.getElementById('auth-screen').style.display = 'flex';
}

function showConfigError(msg){
  document.getElementById('auth-screen').innerHTML =
    '<div class="auth-card"><h1>🍺 Beer\'O\'Clock</h1><div class="auth-error" style="margin-top:10px">' + msg + '</div>' +
    '<button class="btn-auth" onclick="location.reload()">Reload Page</button></div>';
  document.getElementById('auth-screen').style.display = 'flex';
}

function submitConfig(){
  var url = document.getElementById('cfg-url').value.trim();
  var key = document.getElementById('cfg-key').value.trim();
  var errEl = document.getElementById('cfg-error');
  if (!url || !key) { errEl.textContent = 'Both fields are required.'; return; }
  if (!url.startsWith('http')) { errEl.textContent = 'URL should start with https://'; return; }
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  SUPA_URL = url; SUPA_KEY = key;
  initSupabase(url, key);
}

function initSupabase(url, key){
  try { SB = supabase.createClient(url, key); }
  catch(e) { showConfigError('Could not connect: ' + e.message + resetBtn()); return; }
  if (!SB || !SB.auth) { showConfigError('Client failed to initialize. Credentials may be invalid.' + resetBtn()); return; }

  restoreAuthScreenHtml();

  // Check if a guest session is already active
  if (GUEST_TOKEN && localStorage.getItem('guest_name')) {
    IS_GUEST = true;
    CURRENT_NAME = localStorage.getItem('guest_name');
    enterApp();
    return;
  }

  // Otherwise watch for admin auth state
  SB.auth.onAuthStateChange(function(event, session){
    if (session && session.user) {
      CURRENT_USER = session.user;
      IS_ADMIN = true;
      IS_GUEST = false;
      onAdminLoggedIn();
    } else if (!IS_GUEST) {
      CURRENT_USER = null;
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }
  });
}

function resetBtn(){
  return '<br/><br/><button class="btn-auth" onclick="localStorage.removeItem(\'sb_url\');localStorage.removeItem(\'sb_key\');location.reload()">Reset Credentials</button>';
}

function guestEnter(){
  var name = document.getElementById('guest-name').value.trim();
  var errEl = document.getElementById('auth-error');
  if (!name) { errEl.style.color='#c4392b'; errEl.textContent = 'Please enter your name.'; return; }

  if (!GUEST_TOKEN) {
    GUEST_TOKEN = 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2,10);
    localStorage.setItem('guest_token', GUEST_TOKEN);
  }
  localStorage.setItem('guest_name', name);
  CURRENT_NAME = name;
  IS_GUEST = true;
  IS_ADMIN = false;
  enterApp();
}

async function signIn(){
  if (!SB || !SB.auth) { document.getElementById('auth-error').textContent = 'Not connected — reload the page.'; return; }
  var email = document.getElementById('li-email').value.trim();
  var pass  = document.getElementById('li-pass').value;
  var errEl = document.getElementById('auth-error');
  errEl.style.color = '#c4392b'; errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Enter both email and password.'; return; }
  try {
    var {error} = await SB.auth.signInWithPassword({email:email, password:pass});
    if (error) {
      var msg = error.message || error.error_description || error.msg || 'Sign in failed (status: '+(error.status||'?')+')';
      errEl.textContent = msg;
    }
  } catch(e) { errEl.textContent = 'Unexpected error: ' + (e.message || e.toString()); }
}

async function onAdminLoggedIn(){
  // Try to read display_name from a profiles table if it exists; fallback to email prefix
  var name = CURRENT_USER.email.split('@')[0];
  try {
    var {data:prof} = await SB.from('profiles').select('*').eq('id', CURRENT_USER.id).single();
    if (prof && prof.display_name) name = prof.display_name;
  } catch(e) {}
  CURRENT_NAME = name;
  enterApp();
}

  var label = document.getElementById('user-label');
  label.innerHTML = '👤 ' + esc(CURRENT_NAME) + (IS_ADMIN ? ' <span class="admin-badge">👑 ADMIN</span>' : '');
  var auditBtn = document.getElementById('nav-audit-btn');

  var historyBtn = document.getElementById('nav-history-btn');

  var peopleBtn = document.getElementById('nav-people-btn');

  document.getElementById('auth-screen').style.display = 'none';

// ── REALTIME + POLLING ───────────────────────────────────────
var _realtimeChannel = null;
var _pollTimer = null;
var _lastRefreshTime = 0;
var _refreshQueued = false;

function startRealtime(){
  stopRealtime(); // clear any previous subscriptions

  // 1. Supabase Realtime — instant push whenever any table changes
  try {
    _realtimeChannel = SB.channel('boc-realtime')
      .on('postgres_changes', {event:'*', schema:'public', table:'drink_logs'},    function(){ queueRefresh('drink_logs'); })
      .on('postgres_changes', {event:'*', schema:'public', table:'payments'},       function(){ queueRefresh('payments'); })
      .on('postgres_changes', {event:'*', schema:'public', table:'replacements'},   function(){ queueRefresh('replacements'); })
      .on('postgres_changes', {event:'*', schema:'public', table:'audit_log'},      function(){ queueRefresh('audit_log'); })
      .on('postgres_changes', {event:'*', schema:'public', table:'people'},         function(){ queueRefresh('people'); })
      .subscribe(function(status){
        var dot = document.getElementById('realtime-dot');
        if (!dot) return;
        if (status === 'SUBSCRIBED') {
          dot.style.background = '#4cd471';
          dot.title = 'Live — receiving real-time updates';
        } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          dot.style.background = '#f8d878';
          dot.title = 'Real-time unavailable — using polling';
        }
      });
    console.log('[BeerOClock] Realtime channel subscribed');
  } catch(e) {
    console.warn('[BeerOClock] Realtime setup failed, using polling only:', e.message);
  }

  // 2. Polling fallback every 30s — catches anything realtime misses
  _pollTimer = setInterval(function(){
    queueRefresh('poll');
  }, 30000);

  // Also refresh when the tab becomes visible again (user switches back)
  document.addEventListener('visibilitychange', onVisibilityChange);
}

function stopRealtime(){
  if (_realtimeChannel) {
    try { SB.removeChannel(_realtimeChannel); } catch(e){}
    _realtimeChannel = null;
  }
  if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
  document.removeEventListener('visibilitychange', onVisibilityChange);
}

function onVisibilityChange(){
  if (document.visibilityState === 'visible') {
    // Refresh if it's been more than 30s since last refresh
    var now = Date.now();
    if (now - _lastRefreshTime > 30000) queueRefresh('visibility');
  }
}

// Debounce: if multiple tables fire at once, only do one loadAll
function queueRefresh(source){
  if (_refreshQueued) return;
  _refreshQueued = true;
  setTimeout(function(){
    _refreshQueued = false;
    _lastRefreshTime = Date.now();
    console.log('[BeerOClock] Refreshing data (trigger:', source+')');
    // Don't refresh if a modal is open (would be jarring mid-interaction)
    var modalRoot = document.getElementById('modal-root');
    if (modalRoot && modalRoot.innerHTML.trim()) return;
    loadAll();
  }, 400); // 400ms debounce
}

// ── DYNAMIC AI-POWERED JOKE SYSTEM ─────────────────────────
// Fetches a fresh joke/fact from Claude once per day per language.
// Cached in localStorage so it only calls the API once daily.
// Falls back to the static pool if the API is unavailable.

var JOKE_CACHE_KEY_EN = 'joke_cache_en';
var JOKE_CACHE_KEY_DE = 'joke_cache_de';

async function fetchDailyJoke(lang){
  var today = new Date().toISOString().split('T')[0];
  var cacheKey = lang === 'de' ? JOKE_CACHE_KEY_DE : JOKE_CACHE_KEY_EN;
  var cached = null;
  try { cached = JSON.parse(localStorage.getItem(cacheKey)); } catch(e){}
  if (cached && cached.date === today && cached.joke) return cached.joke;

  // Build a rich prompt for maximum variety
  var categories = [
    'a very funny tennis joke or pun',
    'a funny joke mixing tennis and alcohol/beer culture',
    'a surprising or funny real tennis world record or stat (include the actual number)',
    'a funny alcohol or beer fact or joke',
    'a witty observation about clay court tennis players and their off-court habits',
    'a funny tennis history anecdote or little-known fact',
    'a joke about tennis scoring (love, deuce, advantage) mixed with drinking culture',
    'a real ATP/WTA record or stat delivered in a funny way'
  ];
  var category = categories[Math.floor(Math.random()*categories.length)];

  var langNote = lang === 'de'
    ? 'Respond ONLY in German (Deutsch). '
    : 'Respond ONLY in English. ';

  var prompt = langNote +
    'You are the witty mascot of a friendly amateur tennis club that plays on clay courts. ' +
    'Generate ONE short, funny, engaging ' + category + '. ' +
    'It should feel fresh, specific, and clever — not generic. ' +
    'If mentioning a real record or stat, include the actual number (e.g. fastest serve 263 km/h by Sam Groth, Nadal 14 French Opens, longest match 11h5m Isner vs Mahut 2010, Djokovic 24 Grand Slams, Federer 8 Wimbledons, Swiatek 37-match clay streak etc). ' +
    'Add 1-2 relevant emojis. ' +
    'Keep it under 60 words. Output ONLY the joke/fact — no title, no label, no quotes, no preamble.';

  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 150,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!res.ok) throw new Error('API ' + res.status);
    var data = await res.json();
    var joke = (data.content && data.content[0] && data.content[0].text || '').trim();
    if (joke) {
      localStorage.setItem(cacheKey, JSON.stringify({ date: today, joke: joke }));
      return joke;
    }
  } catch(e) {
    console.warn('[BeerOClock] Joke API failed:', e.message);
  }
  return null; // signal to fall back to static
}

async function loadAll(){

      SB.from('people').select('*').order('name'),
      SB.from('drink_logs').select('*').order('date',{ascending:false}).order('logged_at',{ascending:false}),
      SB.from('payments').select('*').order('date',{ascending:false}),
      SB.from('replacements').select('*').order('for_date',{ascending:false}),
      SB.from('audit_log').select('*').order('performed_at',{ascending:false}).limit(100),
      SB.from('free_contributions').select('*').order('date',{ascending:false}),
      SB.from('drink_types').select('*').order('sort_order'),
      SB.from('tab_closes').select('*').order('closed_at',{ascending:false})
    ]);
    if(ppl.error) notify('People error: '+ppl.error.message, true);
    if(l.error)   notify('Logs error: '+l.error.message, true);
    if(pay.error) notify('Payments error: '+pay.error.message, true);
    if(rep.error) notify('Replace error: '+rep.error.message, true);
    if(fc.error)  notify('Free drinks error: '+fc.error.message, true);
    if(tc.error)  console.warn('tab_closes error (run SQL first):', tc.error.message);
    if(dt.data && dt.data.length) buildDrinkTypesFromRows(dt.data);

    STATE.logs              = l.data   || [];
    STATE.payments          = pay.data || [];
    STATE.replacements      = rep.data || [];
    STATE.auditLog          = aud.data || [];
    STATE.freeContributions = fc.data  || [];
    STATE.tabCloses         = tc.data  || [];

    // People: only active people show in the group list.
    // Inactive (deleted) people's logs/payments still appear in running tabs so debts can be cleared.
    var peopleRows = (ppl.data || []).filter(function(p){ return p.active !== false; });
    var allPeopleRows = ppl.data || []; // all including inactive, for name lookup
    var names = new Set(peopleRows.map(function(p){ return p.name; }));

    // Safety net: also include anyone found in logs/payments that
    // somehow isn't in the people table yet (e.g. before backfill ran)
    STATE.logs.forEach(function(l){ if(l.person) names.add(l.person); });
    STATE.payments.forEach(function(p){
      (p.payers||'').split(',').forEach(function(n){ if(n.trim()) names.add(n.trim()); });
      (p.non_drinkers||'').split(',').forEach(function(n){ if(n.trim()) names.add(n.trim()); });
    });
    if (CURRENT_NAME) names.add(CURRENT_NAME);

    STATE.people = [...names].sort().map(function(n){
      var match = peopleRows.find(function(p){ return p.name === n; });
      return { display_name: n, created_by: match ? match.created_by : '' };
    });

    renderTab(STATE.tab);
  } catch(e){ notify('Load error: '+e.message, true); }
}

// Render today's bar tab (only today, live running)
function renderRunningTodayTab(){
  var today = td();
  var todayLogs = STATE.logs.filter(function(l){ return l.date === today; });
  if (!todayLogs.length) return '';

  var isDE = LANG === 'de';

  // Group by person
  var byPerson = {};
  todayLogs.forEach(function(l){
    if (!byPerson[l.person]) byPerson[l.person] = { entries:[], total:0, freeCount:0 };
    byPerson[l.person].entries.push(l);
    byPerson[l.person].total += parseFloat(l.total_price)||0;
    if ((parseFloat(l.unit_price)||0) === 0) byPerson[l.person].freeCount += (l.quantity||0);
  });

  var activeRows = [], closedRows = [];
  Object.keys(byPerson).sort().forEach(function(person){
    var pd = byPerson[person];
    var tabClosedToday2 = (STATE.tabCloses||[]).some(function(c){ return c.person===person && c.closed_at===today; });
    if (tabClosedToday2) closedRows.push(person);
    else activeRows.push(person);
  });

  var rows = activeRows.map(function(person){ return buildRunningRow(person, byPerson[person], today, isDE); }).join('');

  var closedSection = '';
  if (closedRows.length){
    var closedId = 'rtab-closed-'+today;
    closedSection =
      '<div style="margin-top:10px">'+

      '</button>'+

function buildRunningRow(person, pd, today, isDE){

    // ── Compute today's settlement state for this person ──
    // Money: how much they owe today vs what they've paid (all-time payments)
    var todayPriced = pd.entries.reduce(function(s,l){
      return s + (parseFloat(l.unit_price)||0 > 0 ? parseFloat(l.total_price)||0 : 0);
    }, 0);
    var totalPaid = STATE.payments.reduce(function(s,p){
      var payers = (p.payers||'').split(',').map(function(x){return x.trim();});
      return payers.indexOf(person) !== -1 ? s + (parseFloat(p.amount)||0) : s;
    }, 0);
    var moneySettled = todayPriced > 0 && totalPaid >= todayPriced - 0.005;

    // Also settled if person closed their tab today (even with €0 priced drinks)
    var tabClosedToday = (STATE.tabCloses||[]).some(function(c){
      return c.person === person && c.closed_at === today;
    });
    if (tabClosedToday) moneySettled = true;

    // Bottles: which free drinks have been replaced — communal pool (anyone's replacement covers everyone)
    var totalFreeCommunalToday = {};
    var totalReplacedCommunalToday = {};
    STATE.logs.filter(function(l){ return l.date === today; }).forEach(function(l){
      if ((parseFloat(l.unit_price)||0) === 0)
        totalFreeCommunalToday[l.drink] = (totalFreeCommunalToday[l.drink]||0) + (l.quantity||0);
    });
    STATE.replacements.forEach(function(r){
      if (r.for_date === today)
        totalReplacedCommunalToday[r.drink] = (totalReplacedCommunalToday[r.drink]||0) + (r.quantity||0);
    });

    // Consolidate drink counts per type + track free vs priced
    var drinkTotals = {};
    pd.entries.forEach(function(l){
      if (!drinkTotals[l.drink]) drinkTotals[l.drink] = {qty:0, freeQty:0, pricedQty:0, entries:[]};
      drinkTotals[l.drink].qty += (l.quantity||0);
      if ((parseFloat(l.unit_price)||0) === 0) drinkTotals[l.drink].freeQty += (l.quantity||0);
      else drinkTotals[l.drink].pricedQty += (l.quantity||0);
      drinkTotals[l.drink].entries.push(l);
    });

    var drinkItems = Object.entries(drinkTotals).map(function(e){
      var d=e[0], info=e[1];
      var canEdit = info.entries.some(function(l){ return isMine(l); }) || IS_ADMIN;

      // Settlement badge for this drink
      var badge = '';
      if (info.pricedQty > 0 && moneySettled){
        badge = '<span style="font-size:10px;background:#d4f5e2;color:#1f8a4f;border-radius:5px;padding:1px 5px;font-weight:700">✅ '+(isDE?'bezahlt':'paid')+'</span>';
      }
      if (info.freeQty > 0){
        var communalFree = totalFreeCommunalToday[d]||0;
        var communalReplaced = totalReplacedCommunalToday[d]||0;
        var myFree = info.freeQty;
        var coverRatio = communalFree > 0 ? Math.min(1, communalReplaced/communalFree) : 0;
        var myCovered = Math.min(myFree, Math.floor(coverRatio*myFree+0.5));
        var uncovered = myFree - myCovered;
        if (myCovered >= myFree){
          badge += '<span style="font-size:10px;background:#d4f5e2;color:#1f8a4f;border-radius:5px;padding:1px 5px;font-weight:700">✅ '+(isDE?'ersetzt':'replaced')+'</span>';

          (STATE.freeContributions||[]).forEach(function(c){ var k=c.drink; contrF[k]=(contrF[k]||0)+(c.crates||0)*CRATE_SIZE+(c.extra_bottles||0); });
          STATE.logs.forEach(function(ll){ if((parseFloat(ll.unit_price)||0)===0) consF[ll.drink]=(consF[ll.drink]||0)+(ll.quantity||0); });
          STATE.replacements.forEach(function(r){ if(r.drink&&consF[r.drink]) consF[r.drink]=Math.max(0,consF[r.drink]-(r.quantity||0)); });
          var fundAvail = Math.max(0,(contrF[d]||0)-(consF[d]||0));
          if (fundAvail >= uncovered){
            var ctribs = (STATE.freeContributions||[]).filter(function(c){return c.drink===d;}).map(function(c){return c.person;});
            var ctribLabel = [...new Set(ctribs)].join(', ');

      // "Add price" button — own entries or admin
      var addPriceBtn = '';
      if ((isMe || IS_ADMIN) && info.freeQty > 0){
        addPriceBtn = '<button class="plus" style="font-size:11px;padding:3px 7px;background:#d4f5e2;border:1.5px solid #1f8a4f;color:#1f8a4f;border-radius:6px;font-weight:800;min-height:26px" '+

        '<span style="display:flex;align-items:center;gap:3px">'+
          (canEdit?'<button class="plus" onclick="quickAddDrink(\''+esc(person)+'\',\''+esc(d)+'\',event)">+</button>':'')+
          emoji(d)+' ×'+info.qty+
          (canEdit?'<button onclick="quickRemoveDrink(\''+esc(person)+'\',\''+esc(d)+'\',event)">−</button>':'')+

        '</span>'+
        (badge?'<span style="display:flex;gap:3px;flex-wrap:wrap">'+badge+'</span>':'')+

    // Settlement summary line

    }

    // Admin badge on other people's rows
    var adminBadge = IS_ADMIN && !isMe
      ? ' <span style="font-size:9px;background:#1a4a8a;color:#fff;border-radius:4px;padding:1px 5px;font-weight:700">ADMIN</span>'

    return '<div class="running-tab-row'+(isMe?' mine':'')+'" onclick="showPersonDayDetail(\''+esc(person)+'\',\''+today+'\')">'+

// Quick add a drink directly from the running tab +/- buttons
async function quickAddDrink(person, drink, event){
  if (event) event.stopPropagation();
  if (!person) return;
  await addPersonToTable(person);
  var price = getDrinkPrice(drink);
  var insertObj = {
    date:td(), person:person, drink:drink, quantity:1,
    unit_price:price, total_price:price,
    note:'', added_by:CURRENT_NAME, logged_by:CURRENT_NAME
  };
  if (IS_ADMIN && CURRENT_USER) insertObj.user_id = CURRENT_USER.id;
  if (IS_GUEST) insertObj.guest_token = GUEST_TOKEN;
  var {data,error} = await SB.from('drink_logs').insert(insertObj).select().single();
  if (error){ notify('Error: '+error.message,true); return; }
  await audit('LOG_DRINK','drink_logs',data.id,{person:person,drink:drink,qty:1,total:price});
  await loadAll();
  if (price === 0) {
    var CRATE_SIZE=20, contribsQ=STATE.freeContributions, contrQ={}, consQ={};
    contribsQ.forEach(function(c){ var k=c.drink; if(!k)return; contrQ[k]=(contrQ[k]||0)+(c.crates||0)*CRATE_SIZE+(c.extra_bottles||0); });
    STATE.logs.forEach(function(l){ if((parseFloat(l.unit_price)||0)===0) consQ[l.drink]=(consQ[l.drink]||0)+(l.quantity||0); });
    STATE.replacements.forEach(function(r){ if(r.drink&&(r.quantity||0)>0&&consQ[r.drink]) consQ[r.drink]=Math.max(0,consQ[r.drink]-(r.quantity||0)); });
    var availQ=Math.max(0,(contrQ[drink]||0)-(consQ[drink]||0));
    if ((contrQ[drink]||0)===0 || availQ<=0){
      notify('🍾 '+(LANG==='de'?'Kein Freibier-Vorrat — im Ersatz-Tab sichtbar':'No free drinks — appears in Replace tab'));
    } else if (availQ<=3){
      notify('⚠️ '+(LANG==='de'?'Nur noch '+availQ+' frei!':'Only '+availQ+' free left!'));
    }
  }
  showDrinkCountPopup(person, drink);
}

async function quickRemoveDrink(person, drink, event){
  event.stopPropagation();
  var today = td();
  var match = STATE.logs
    .filter(function(l){ return l.person===person && l.drink===drink && l.date===today && (isMine(l)||IS_ADMIN); })
    .sort(function(a,b){ return new Date(b.logged_at)-new Date(a.logged_at); })[0];
  if (!match){ notify(LANG==='de'?'Nichts zu entfernen':'Nothing to remove',true); return; }
  // Save snapshot for undo
  var snapshot = JSON.parse(JSON.stringify(match));
  if (match.quantity <= 1){
    var {error} = await SB.from('drink_logs').delete().eq('id',match.id);
    if(error){notify('Error: '+error.message,true);return;}
    await audit('DELETE_DRINK_LOGS','drink_logs',match.id,{person:person,drink:drink});
    notifyWithUndo(
      (LANG==='de'?'Entfernt: ':'Removed: ')+emoji(drink)+' '+esc(drink.replace(/^.+? /,'')),
      async function(){ await SB.from('drink_logs').insert({
        date:snapshot.date, person:snapshot.person, drink:snapshot.drink,
        quantity:snapshot.quantity, unit_price:snapshot.unit_price, total_price:snapshot.total_price,
        note:snapshot.note||'', added_by:snapshot.added_by, logged_by:snapshot.logged_by,
        guest_token:snapshot.guest_token||null, user_id:snapshot.user_id||null
      }); await loadAll(); }
    );
  } else {
    var newQty = match.quantity - 1;
    var price = parseFloat(match.unit_price)||0;
    var {error} = await SB.from('drink_logs').update({quantity:newQty,total_price:price*newQty}).eq('id',match.id);
    if(error){notify('Error: '+error.message,true);return;}
    await audit('EDIT_DRINK_QTY','drink_logs',match.id,{person:person,drink:drink,new_qty:newQty});
    notifyWithUndo(
      emoji(drink)+' ×'+newQty+' (−1)',
      async function(){ await SB.from('drink_logs').update({quantity:match.quantity,total_price:price*match.quantity}).eq('id',match.id); await loadAll(); }
    );
  }
  await loadAll();
}

// Edit money amount for today's running tab — opens modal to split/edit prices for today's drinks
function editRunningAmount(person, date){
  var isDE = LANG === 'de';
  // Get today's priced drink entries for this person
  var myEntries = STATE.logs.filter(function(l){
    return l.person === person && l.date === date && isMine(l) && (parseFloat(l.unit_price)||0) > 0;
  });

  if (!myEntries.length){
    // All drinks are free — offer to add a price to one
    notify(isDE?'Keine bezahlten Getränke heute':'No priced drinks today');
    return;
  }

  // Group by drink, show editable unit price per drink type
  var byDrink = {};
  myEntries.forEach(function(l){
    var key = l.drink;
    if (!byDrink[key]) byDrink[key] = {drink:l.drink, qty:0, unitPrice:parseFloat(l.unit_price)||0, ids:[]};
    byDrink[key].qty += (l.quantity||0);
    byDrink[key].ids.push(l.id);
    byDrink[key].unitPrice = parseFloat(l.unit_price)||0; // use latest

async function saveRunningAmountEdit(person, date){
  var isDE = LANG === 'de';
  var byDrink = window._editRunningEntries;
  if (!byDrink){ closeModal(); return; }

  var errors = [];
  for (var drink of Object.keys(byDrink)){
    var g = byDrink[drink];
    var inputId = 'ep-'+drink.replace(/\s/g,'_');
    var inputEl = document.getElementById(inputId);
    var newUnit = inputEl ? parseFloat(inputEl.value)||0 : g.unitPrice;
    var newTotal = newUnit * g.qty;

    // Update each entry for this drink (by id)
    for (var id of g.ids){
      // Find this entry to get its quantity
      var entry = STATE.logs.find(function(l){return l.id===id;});
      if (!entry) continue;
      var entryTotal = newUnit * (entry.quantity||1);
      var {error} = await SB.from('drink_logs').update({unit_price:newUnit, total_price:entryTotal}).eq('id',id);
      if (error) errors.push(error.message);
    }
    // Also update DRINK_PRICES for this user so future quick-adds use the new price
    setDrinkPrice(drink, newUnit);
  }

  closeModal();
  if (errors.length){ notify('Some updates failed: '+errors[0], true); }
  else { notify(isDE?'Betrag aktualisiert ✓':'Amount updated ✓'); }
  await loadAll();
}

// Consolidate all of today's (and recent days') drinks per person
function renderConsolidatedToday(){
  if (!STATE.logs.length) return '';

  // Build per-person running tab: every drink they've ever logged stays
  // consolidated together until their balance is fully settled —
  // both money (priced drinks vs payments) AND bottles (free drinks vs replacements).
  var personNames = [...new Set(STATE.logs.map(function(l){ return l.person; }))].sort();

  var blocks = personNames.map(function(person){
    var pLogs = STATE.logs.filter(function(l){ return l.person === person; });

    // Money owed: priced drinks minus payments where this person is listed as a payer
    var moneyOwed = pLogs.reduce(function(s,l){
      var unitPrice = parseFloat(l.unit_price)||0;
      return unitPrice > 0 ? s + (parseFloat(l.total_price)||0) : s;
    }, 0);
    var moneyPaid = STATE.payments.reduce(function(s,p){
      var payers = (p.payers||'').split(',').map(function(x){return x.trim();});
      return payers.indexOf(person) !== -1 ? s + (parseFloat(p.amount)||0) : s;
    }, 0);
    var moneyPending = moneyOwed - moneyPaid;
    var moneySettled = moneyPending <= 0.005;

    // Bottles owed: free (€0) drinks per person
    // BUT exclude drinks where the fund contribution fully covers the communal consumption
    // (fund was pre-paid to cover these — no physical replacement needed)
    var CRATE_SIZE_CS = 20;
    var freeFundContribCS = {};
    (STATE.freeContributions||[]).forEach(function(c){
      if (!c.drink) return;
      freeFundContribCS[c.drink] = (freeFundContribCS[c.drink]||0) + (c.crates||0)*CRATE_SIZE_CS + (c.extra_bottles||0);
    });

    // Total FREE consumed by ALL people per drink type (communal pool)
    var totalFreeCommunal = {};
    STATE.logs.forEach(function(l){
      if ((parseFloat(l.unit_price)||0) > 0) return;
      totalFreeCommunal[l.drink] = (totalFreeCommunal[l.drink]||0) + (l.quantity||0);
    });

    // Total communal replacements per drink type
    var totalReplacedCommunal = {};
    STATE.replacements.forEach(function(r){
      totalReplacedCommunal[r.drink] = (totalReplacedCommunal[r.drink]||0) + (r.quantity||0);
    });

    // Only count bottles as "owed" if the communal fund + replacements doesn't cover them
    var bottlesOwedByDrink = {};
    pLogs.forEach(function(l){
      if ((parseFloat(l.unit_price)||0) > 0) return;
      var drink = l.drink;
      var communalFree = totalFreeCommunal[drink]||0;
      var fundContrib  = freeFundContribCS[drink]||0;
      var communalReplaced = totalReplacedCommunal[drink]||0;
      // If fund + replacements cover everything communally, no one owes bottles for this drink
      if (communalFree > 0 && (fundContrib + communalReplaced) >= communalFree) return;
      bottlesOwedByDrink[drink] = (bottlesOwedByDrink[drink]||0) + (l.quantity||0);
    });

    // Remaining: any bottles still owed after communal replacements cover proportional share
    var totalBottlesOwed = Object.values(bottlesOwedByDrink).reduce(function(s,v){return s+v;},0);
    var totalBottlesReplaced = Object.keys(bottlesOwedByDrink).reduce(function(s,drink){
      var communalFree = totalFreeCommunal[drink]||0;
      var communalReplaced = totalReplacedCommunal[drink]||0;
      var myFree = bottlesOwedByDrink[drink]||0;
      if (communalFree <= 0) return s + myFree;
      var coverRatio = Math.min(1, communalReplaced / communalFree);
      return s + Math.min(myFree, Math.floor(coverRatio * myFree + 0.5));
    }, 0);
    var bottlesRemaining = Math.max(0, totalBottlesOwed - totalBottlesReplaced);
    var bottlesSettled = totalBottlesOwed === 0 || bottlesRemaining === 0;

    var isSettled = moneySettled && bottlesSettled;

    // A tab close by this person also counts as settled —
    // they've acknowledged their drinks and are done for this session
    if (!isSettled) {
      var personTabClosed = (STATE.tabCloses||[]).some(function(c){ return c.person === person; });
      if (personTabClosed && moneySettled) isSettled = true;
    }

    var totalQty = pLogs.reduce(function(s,l){ return s+(l.quantity||0); }, 0);
    var totalSpend = pLogs.reduce(function(s,l){ return s+(parseFloat(l.total_price)||0); }, 0);

    // Consolidate ALL drink types this person has ever logged (still unsettled or not)
    var drinkCounts = {};
    pLogs.forEach(function(l){ drinkCounts[l.drink] = (drinkCounts[l.drink]||0) + (l.quantity||0); });
    var tags = Object.entries(drinkCounts).map(function(e){
      return '<span class="drink-tag">'+emoji(e[0])+' ×'+e[1]+'</span>';    }).join('');

    var earliestDate = pLogs.reduce(function(min,l){ return l.date < min ? l.date : min; }, pLogs[0].date);
    var latestDate = pLogs.reduce(function(max,l){ return l.date > max ? l.date : max; }, pLogs[0].date);

    return {
      person: person, isSettled: isSettled, moneyPending: moneyPending, moneySettled: moneySettled,
      bottlesRemaining: bottlesRemaining, bottlesSettled: bottlesSettled,
      totalQty: totalQty, totalSpend: totalSpend, tags: tags,
      earliestDate: earliestDate, latestDate: latestDate
    };
  });

  // Sort: unsettled people first (most owed first), then settled people
  blocks.sort(function(a,b){
    if (a.isSettled !== b.isSettled) return a.isSettled ? 1 : -1;
    return (b.moneyPending + b.bottlesRemaining) - (a.moneyPending + a.bottlesRemaining);
  });

  var unsettled = blocks.filter(function(b){ return !b.isSettled; });
  var settled = blocks.filter(function(b){ return b.isSettled; });

  var rowHtml = function(b){

    if (!b.bottlesSettled) statusBits.push('<span style="font-size:10px;color:#d4a017;font-weight:700">'+b.bottlesRemaining+' '+t('toReplace')+'</span>');

  if (settled.length) {
    var isDE = LANG === 'de';

    // Group settled people into sessions by finding settlement boundaries in the full log
    // A session = a contiguous block of dates where everyone eventually settled
    var allLogDates = [...new Set(STATE.logs.map(function(l){ return l.date; }))].sort();

    // Build session list: walk dates and find where cumulative bill == cumulative paid
    var sessions = [];
    var sessionStart = allLogDates[0] || td();
    var prevSettleDate = null;

    for (var di = 0; di < allLogDates.length; di++) {
      var checkDate = allLogDates[di];
      var cumBill = STATE.logs.reduce(function(s,l){ return l.date <= checkDate ? s+(parseFloat(l.total_price)||0) : s; }, 0);
      var cumPaid = STATE.payments.reduce(function(s,p){ return p.date <= checkDate ? s+(parseFloat(p.amount)||0) : s; }, 0);
      if (cumBill > 0.01 && cumPaid >= cumBill - 0.01) {
        // Found a settlement point
        sessions.push({ from: sessionStart, to: checkDate, settledAt: checkDate });
        sessionStart = allLogDates[di+1] || null;
        prevSettleDate = checkDate;
      }
    }
    // Any remaining unsettled dates form the current open session (handled above)

    // For each session, build a summary per person
    var settledHtml = '';
    sessions.slice().reverse().forEach(function(sess, si) {
      var sessId = 'sess-'+si;
      var sessLogs = STATE.logs.filter(function(l){ return l.date >= sess.from && l.date <= sess.to; });
      var sessPays = STATE.payments.filter(function(p){ return p.date >= sess.from && p.date <= sess.to; });
      var sessReps  = STATE.replacements.filter(function(r){ return r.for_date >= sess.from && r.for_date <= sess.to; });

      var sessTotalBill = sessLogs.reduce(function(s,l){ return s+(parseFloat(l.total_price)||0); }, 0);
      var sessTotalPaid = sessPays.reduce(function(s,p){ return s+(parseFloat(p.amount)||0); }, 0);
      var sessTotalFree = sessLogs.filter(function(l){ return (parseFloat(l.unit_price)||0)===0; }).reduce(function(s,l){ return s+(l.quantity||0); }, 0);
      var sessTotalReplaced = sessReps.reduce(function(s,r){ return s+(r.quantity||0); }, 0);

      var moneyOk = sessTotalPaid >= sessTotalBill - 0.01;
      var bottlesOk = sessTotalFree === 0 || sessTotalReplaced >= sessTotalFree;
      var allOk = moneyOk && bottlesOk;

      var dateLabel = sess.from === sess.to ? fmtDate(sess.from) : fmtDate(sess.from)+' → '+fmtDate(sess.to);
      var statusBadge = allOk
        ? '<span style="background:#d4f5e2;color:#1f8a4f;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700">✅ '+(isDE?'Vollständig beglichen':'Fully settled')+'</span>'
        : '<span style="background:#fef3cd;color:#7a5200;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700">⏳ '+(isDE?'Teilweise offen':'Partially pending')+'</span>';

      var moneyBadge = moneyOk
        ? '<span style="font-size:11px;background:#d4f5e2;color:#1f8a4f;border-radius:5px;padding:1px 6px;font-weight:700">💶 '+(isDE?'Bezahlt':'Paid')+'</span>'
        : '<span style="font-size:11px;background:#fce8e6;color:#c4392b;border-radius:5px;padding:1px 6px;font-weight:700">💶 €'+(sessTotalBill-sessTotalPaid).toFixed(2)+' '+(isDE?'ausstehend':'pending')+'</span>';

      var bottleBadge = sessTotalFree === 0 ? '' : bottlesOk
        ? '<span style="font-size:11px;background:#d4f5e2;color:#1f8a4f;border-radius:5px;padding:1px 6px;font-weight:700">🍾 '+(isDE?'Ersetzt':'Replaced')+'</span>'
        : '<span style="font-size:11px;background:#fef3cd;color:#7a5200;border-radius:5px;padding:1px 6px;font-weight:700">🍾 '+(sessTotalFree-sessTotalReplaced)+' '+(isDE?'offen':'to replace')+'</span>';

      // ── Session header row ──
      settledHtml +=
        '<div style="border:1.5px solid #e8dccc;border-radius:12px;overflow:hidden;margin-bottom:8px">'+
        // Accordion toggle row
        '<div onclick="(function(el){el.style.display=el.style.display===\'none\'?\'\':\'none\';})(document.getElementById(\''+sessId+'\'))" '+
          'style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:#f5ede4;cursor:pointer">'+
          '<div style="font-size:11px;color:#9a7060;min-width:16px">▶</div>'+
          '<div style="flex:1;min-width:0">'+
            '<div style="font-size:13px;font-weight:700;color:#1a0e08">'+dateLabel+'</div>'+
            '<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:5px">'+
              statusBadge+moneyBadge+bottleBadge+
            '</div>'+
          '</div>'+
          '<div style="text-align:right;flex-shrink:0">'+
            '<div style="font-size:15px;font-weight:800;color:#b5481f">€'+sessTotalBill.toFixed(2)+'</div>'+
            '<div style="font-size:10px;color:#7a5200">'+sessLogs.reduce(function(s,l){return s+(l.quantity||0);},0)+' '+(isDE?'Getränke':'drinks')+'</div>'+
          '</div>'+
        '</div>'+

        // ── Expandable detail: per-person breakdown ──
        '<div id="'+sessId+'" style="display:none">'+
          (function(){
            var peopleInSess = [...new Set(sessLogs.map(function(l){return l.person;}))].sort();
            return peopleInSess.map(function(person){
              var pLogs = sessLogs.filter(function(l){return l.person===person;});
              var pSpent = pLogs.reduce(function(s,l){return s+(parseFloat(l.total_price)||0);},0);
              var pPaid  = sessPays.reduce(function(s,p){
                var pp=(p.payers||'').split(',').map(function(x){return x.trim();});
                return pp.indexOf(person)!==-1?s+(parseFloat(p.amount)||0):s;
              },0);
              var pFree  = pLogs.filter(function(l){return (parseFloat(l.unit_price)||0)===0;}).reduce(function(s,l){return s+(l.quantity||0);},0);
              var pOwes  = pSpent - pPaid;
              var pSettled = pOwes <= 0.01;

              // Drink summary
              var drinkSummary = {};
              pLogs.forEach(function(l){ drinkSummary[l.drink]=(drinkSummary[l.drink]||0)+(l.quantity||0); });
              var drinkTags = Object.entries(drinkSummary).map(function(e){
                return '<span style="font-size:11px;background:#f5ede4;border-radius:5px;padding:1px 6px;color:#5a3a28;font-weight:600">'+emoji(e[0])+'×'+e[1]+'</span>';
              }).join('');

              // Date-by-date breakdown
              var byDate2 = {};
              pLogs.forEach(function(l){ (byDate2[l.date]=byDate2[l.date]||[]).push(l); });
              var dateRows = Object.keys(byDate2).sort().map(function(d2){
                var dayDrinks = {};
                byDate2[d2].forEach(function(l){ dayDrinks[l.drink]=(dayDrinks[l.drink]||0)+(l.quantity||0); });
                return '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #f5ede4">'+
                  '<span style="font-size:11px;color:#7a5200;min-width:72px">'+fmtDate(d2)+'</span>'+
                  '<span style="display:flex;flex-wrap:wrap;gap:3px;flex:1">'+
                    Object.entries(dayDrinks).map(function(e){
                      return '<span style="font-size:11px;background:#fce4d0;border-radius:5px;padding:1px 5px;font-weight:600;color:#b5481f">'+emoji(e[0])+'×'+e[1]+'</span>';
                    }).join('')+
                  '</span>'+
                '</div>';
              }).join('');

              return '<div style="padding:10px 14px;border-top:1px solid #e8dccc;background:'+(pSettled?'#f8fff8':'#fff8f8')+'">'+
                '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'+
                  '<div style="width:26px;height:26px;border-radius:50%;background:'+colorFor(person)+';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0">'+person[0].toUpperCase()+'</div>'+
                  '<div style="flex:1">'+
                    '<div style="font-size:13px;font-weight:700;color:#1a0e08">'+esc(person)+'</div>'+
                    '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:3px">'+drinkTags+'</div>'+
                  '</div>'+
                  '<div style="text-align:right;flex-shrink:0">'+
                    (pSpent>0?'<div style="font-size:13px;font-weight:800;color:'+(pSettled?'#1f8a4f':'#c4392b')+'">'+
                      (pSettled?'✅ ':'💸 ')+'€'+pSpent.toFixed(2)+'</div>':'')+
                    (pFree>0?'<div style="font-size:11px;color:#7a5200">🍾 ×'+pFree+'</div>':'')+
                  '</div>'+
                '</div>'+
                // Date-wise detail
                (dateRows?'<div style="margin-left:34px">'+dateRows+'</div>':'')+
                // Payment summary
                (pPaid>0?'<div style="margin-left:34px;margin-top:4px;font-size:11px;color:#1f8a4f">'+
                  '💶 '+(isDE?'Bezahlt':'Paid')+': €'+pPaid.toFixed(2)+(pSettled?' ✓':' · '+(isDE?'Diff':'Diff')+': €'+Math.abs(pOwes).toFixed(2))+
                '</div>':'')+
              '</div>';
            }).join('');
          })()+
        '</div>'+
        '</div>';
    });

    if (!settledHtml) {
      // Fallback: no detected sessions but people show as settled
      settledHtml = settled.map(rowHtml).join('');
    }

    html += card(t('settledUpTitle'), settledHtml);
  }

  return html;
}

// Save updated unit price for a drink in the consolidated running tab
async function saveConsolidatedPrice(person, drink, inputId){
  var inputEl = document.getElementById(inputId);
  if (!inputEl) return;
  var newUnit = parseFloat(inputEl.value) || 0;

  // Update all of this user's entries for this drink that they own
  var entries = STATE.logs.filter(function(l){
    return l.person === person && l.drink === drink && isMine(l) && (parseFloat(l.unit_price)||0) > 0;
  });

  if (!entries.length) { notify(LANG==='de'?'Keine Einträge gefunden':'No entries found', true); return; }

  var errors = [];
  for (var i = 0; i < entries.length; i++) {
    var l = entries[i];
    var newTotal = newUnit * (l.quantity || 1);
    var res = await SB.from('drink_logs').update({unit_price: newUnit, total_price: newTotal}).eq('id', l.id);
    if (res.error) errors.push(res.error.message);
  }

  // Also persist as user's default price for this drink
  setDrinkPrice(drink, newUnit);

  if (errors.length) { notify('Error: '+errors[0], true); return; }

  // Visual feedback on the button
  var btn = inputEl.nextElementSibling;
  if (btn) { var orig = btn.textContent; btn.textContent = '✓'; setTimeout(function(){ btn.textContent = orig; }, 1200); }

  notify((LANG==='de'?'Preis aktualisiert':'Price updated')+' · '+emoji(drink)+' €'+newUnit.toFixed(2)+' ✓');
  await loadAll();
}

// Save unit price for ALL free entries of a drink type (group action on free drinks)
async function saveFreeGroupPrice(person, drink, inputId){
  var inputEl = document.getElementById(inputId);
  if (!inputEl) return;
  var newUnit = parseFloat(inputEl.value) || 0;
  if (newUnit <= 0){ notify(LANG==='de'?'Bitte Preis eingeben':'Please enter a price',true); return; }

  var entries = STATE.logs.filter(function(l){
    return l.person === person && l.drink === drink && isMine(l) && (parseFloat(l.unit_price)||0) === 0;
  });
  if (!entries.length){ notify(LANG==='de'?'Keine kostenlosen Einträge':'No free entries',true); return; }

  var errors = [];
  for (var i=0;i<entries.length;i++){
    var l=entries[i];
    var res=await SB.from('drink_logs').update({unit_price:newUnit,total_price:newUnit*(l.quantity||1)}).eq('id',l.id);
    if(res.error) errors.push(res.error.message);
  }
  setDrinkPrice(drink, newUnit);
  if(errors.length){notify('Error: '+errors[0],true);return;}

  var btn=inputEl.parentElement && inputEl.parentElement.nextElementSibling && inputEl.parentElement.nextElementSibling.firstElementChild;
  if(btn){var o=btn.textContent;btn.textContent='✓';setTimeout(function(){btn.textContent=o;},1200);}

  notify((LANG==='de'?'Preise gesetzt':'Prices set')+' · '+emoji(drink)+' €'+newUnit.toFixed(2)+' ✓');
  await loadAll();
}

async function addPersonToTable(name){
  name = (name||'').trim();
  if (!name) return false;
  try {
    var {data:existing} = await SB.from('people').select('id').ilike('name', name).maybeSingle();
    if (existing) return true; // already in the real table, nothing to do
  } catch(e) { /* fall through and try insert anyway */ }

  var {error} = await SB.from('people').insert({ name: name, created_by: CURRENT_NAME });
  if (error) {
    // Unique constraint violation just means it already exists — not a real error
    if (!String(error.message||'').includes('duplicate')) {
      notify('Could not add person: '+error.message, true);
      return false;
    }
  } else {
    await audit('ADD_PERSON','people',null,{name:name});
  }
  return true;
}

async function addNewPersonFromInput(inputEl){
  var name = inputEl.value.trim();
  if (!name) return;
  inputEl.value = '';
  var ok = await addPersonToTable(name);
  if (ok) {
    STATE.logPerson = name;
    notify(esc(name)+' '+t('personAdded'));
    await loadAll();
  }
}

async function saveLog(){
  if(!STATE.logPerson){notify(t('selectPersonFirst'),true);return;}
  await addPersonToTable(STATE.logPerson); // ensure they're in the people table

  var unit = parseFloat(STATE.logPrice);
  // Fall back to the saved default price for this drink type if no price entered
  if (!unit && unit !== 0) unit = getDrinkPrice(STATE.logDrink);
  unit = unit || 0;
  var total = unit * STATE.logQty;
  var loggedPerson = STATE.logPerson;
  var loggedDrink = STATE.logDrink;
  var insertObj = {
    date:STATE.logDate, person:loggedPerson, drink:loggedDrink,
    quantity:STATE.logQty, unit_price:unit, total_price:total,
    note:STATE.logNote, added_by:CURRENT_NAME, logged_by:CURRENT_NAME
  };
  if (IS_ADMIN) insertObj.user_id = CURRENT_USER.id;
  if (IS_GUEST) insertObj.guest_token = GUEST_TOKEN;

  var {data, error} = await SB.from('drink_logs').insert(insertObj).select().single();
  if(error){notify('Error: '+error.message,true);return;}
  await audit('LOG_DRINK','drink_logs',data.id,{person:loggedPerson,drink:loggedDrink,qty:STATE.logQty,total:total});
  STATE.logQty=1;STATE.logPrice='';STATE.logNote='';

  // ── Free drink fund check — info only, no redirect ──
  if (unit === 0) {
    await loadAll(); // reload so consumed counts are fresh
    var CRATE_SIZE = 20;
    var contributed2 = {};
    (STATE.freeContributions||[]).forEach(function(c){
      var k = c.drink;
      if (!k) return;
      contributed2[k] = (contributed2[k]||0) + (c.crates||0)*CRATE_SIZE + (c.extra_bottles||0);
    });
    var consumed2 = {};
    STATE.logs.forEach(function(l){
      if ((parseFloat(l.unit_price)||0)===0) consumed2[l.drink]=(consumed2[l.drink]||0)+(l.quantity||0);
    });
    STATE.replacements.forEach(function(r){
      if (r.drink && (r.quantity||0) > 0 && consumed2[r.drink])
        consumed2[r.drink]=Math.max(0,consumed2[r.drink]-(r.quantity||0));
    });
    var avail2 = Math.max(0, (contributed2[loggedDrink]||0) - (consumed2[loggedDrink]||0));

    // Also check if there are already pending replacements for this drink
    // (fund covers those first before needing new replacements)
    var pendingReplace = 0;
    STATE.logs.forEach(function(l){
      if ((parseFloat(l.unit_price)||0)===0 && l.drink===loggedDrink)
        pendingReplace += (l.quantity||0);
    });
    STATE.replacements.forEach(function(r){
      if (r.drink===loggedDrink && (r.quantity||0)>0) pendingReplace-=(r.quantity||0);
    });
    pendingReplace = Math.max(0, pendingReplace);
    // How much of the pending replacement does the fund now cover?
    var fundCoversExisting = Math.min(pendingReplace, avail2);
    var netAvail = avail2 - fundCoversExisting; // what's left after covering existing pending

    if ((contributed2[loggedDrink]||0) === 0 && pendingReplace === 0) {
      // No fund at all, no existing pending — goes straight to Replace tab
      notify('🍾 '+(LANG==='de'
        ? 'Kein Freibier-Vorrat — erscheint im Ersatz-Tab'
        : 'No free drinks available — appears in Replace tab'));
    } else if (netAvail <= 0 && (contributed2[loggedDrink]||0) === 0) {
      notify('🍾 '+(LANG==='de'
        ? 'Kein Freibier-Vorrat — erscheint im Ersatz-Tab'
        : 'No free drinks available — appears in Replace tab'));
    } else if (avail2 <= 0) {
      notify('🍾 '+(LANG==='de'
        ? 'Freibier-Vorrat aufgebraucht — erscheint im Ersatz-Tab'
        : 'Free drink fund empty — appears in Replace tab'));
    } else if (avail2 <= 3) {
      notify('⚠️ '+(LANG==='de'
        ? 'Nur noch '+avail2+' '+loggedDrink.replace(/^.+? /,'')+' im Freibier-Vorrat!'
        : 'Only '+avail2+' free '+loggedDrink.replace(/^.+? /,'')+' left in the fund!'));
    } else {
      notify(t('drinkLogged')+' '+loggedPerson+' 🍾 ('+avail2+' '+(LANG==='de'?'noch frei':'free left')+')');
    }
  } else {
    notify(t('drinkLogged')+' '+loggedPerson+' ✓');
  }

  await loadAll();
  showDrinkCountPopup(loggedPerson, loggedDrink);
}

// ── SESSION HELPERS ──────────────────────────────────────────
// A "session" = all logs since the last time EVERYONE's bill was fully settled.
// This prevents yesterday's settled drinks mixing into today's counts/leaderboard.
function getLastSettlementDate(){
  // Walk through dates chronologically and find the most recent date
  // where the cumulative PRICED bill was fully paid.
  // Free (zero-price) drinks are excluded — they don't create a money debt.
  var allDates = [...new Set(STATE.logs.map(function(l){return l.date;}))].sort();
  var lastSettled = null;

  for (var i = 0; i < allDates.length; i++){
    var upToDate = allDates[i];
    // Only count priced (non-free) drinks in the bill
    var bill = STATE.logs.reduce(function(s,l){
      return l.date <= upToDate && (parseFloat(l.unit_price)||0) > 0
        ? s + (parseFloat(l.total_price)||0) : s;
    }, 0);
    // Total paid up to this date
    var paid = STATE.payments.reduce(function(s,p){
      return p.date <= upToDate ? s + (parseFloat(p.amount)||0) : s;
    }, 0);
    // Settled = there is a real bill and it is fully covered
    if (bill > 0.01 && paid >= bill - 0.01){
      lastSettled = upToDate;
    }
  }
  return lastSettled; // null = never settled, use all logs
}

// Returns only logs that belong to the current unsettled session
function getSessionLogs(){
  var lastSettled = getLastSettlementDate();
  if (!lastSettled) return STATE.logs;
  return STATE.logs.filter(function(l){ return l.date > lastSettled; });
}

// ── DRINK COUNT CELEBRATION POPUP ───────────────────────────

  // (prevents showing "0" when settlement date coincides with today)
  var sessionLogs = getSessionLogs();
  var drinkCount = sessionLogs
    .filter(function(l){ return l.person===person && l.drink===drink; })
    .reduce(function(s,l){ return s + (l.quantity||0); }, 0);
  var totalCount = sessionLogs
    .filter(function(l){ return l.person===person; })
    .reduce(function(s,l){ return s + (l.quantity||0); }, 0);

  // If session filter returned 0 (e.g. just settled today), count from all logs today
  if (drinkCount === 0){
    var today = td();
    drinkCount = STATE.logs
      .filter(function(l){ return l.person===person && l.drink===drink && l.date===today; })
      .reduce(function(s,l){ return s+(l.quantity||0); }, 0);
    totalCount = STATE.logs
      .filter(function(l){ return l.person===person && l.date===today; })
      .reduce(function(s,l){ return s+(l.quantity||0); }, 0);
  }

  // Still 0 means nothing logged — skip popup
  if (drinkCount === 0) return;

      '<div style="font-size:34px;font-weight:800;color:#b5481f;margin-bottom:4px">'+drinkCount+' '+icon+'</div>'+
      '<div style="font-size:13px;color:#5a3a28;margin-bottom:18px">'+esc(drinkName)+(drinkCount!==1?'s':'')+' total — '+totalCount+' '+esc(t('totalOverall'))+'</div>'+
      '<button class="modal-btn modal-btn-pay" style="width:100%" onclick="closeModal()">OK 👍</button>'+

async function closeMyTab(person){
  var isDE = LANG==='de';
  var today = td();

  // ── Find session start: last time this person closed their tab ──
  // If they closed at 11pm Friday, only count drinks after that.
  // If never closed, count drinks from the last 36 hours (covers overnight sessions).
  var lastClose = (STATE.tabCloses||[])
    .filter(function(c){ return c.person === person; })
    .sort(function(a,b){ return (b.created_at||b.closed_at) > (a.created_at||a.closed_at) ? 1 : -1; })[0];

  var sessionStartTs = lastClose
    ? (lastClose.created_at || (lastClose.closed_at + 'T23:59:59Z'))
    : new Date(Date.now() - 36*60*60*1000).toISOString(); // 36h window

  // Count free drinks logged AFTER the session start
  var freeLogs = STATE.logs.filter(function(l){
    var logTs = l.logged_at || (l.date + 'T00:00:00Z');
    return l.person === person
      && (parseFloat(l.unit_price)||0) === 0
      && logTs > sessionStartTs;
  });
  var freeCount = freeLogs.reduce(function(s,l){return s+(l.quantity||0);},0);

  // Date range label for the confirmation
  var sessionDates = [...new Set(freeLogs.map(function(l){return l.date;}))].sort();
  var dateLabel = sessionDates.length > 1
    ? fmtDate(sessionDates[0])+' → '+fmtDate(sessionDates[sessionDates.length-1])
    : sessionDates.length === 1 ? fmtDate(sessionDates[0]) : fmtDate(today);

  // Check for any unpaid priced drinks (all-time)
  var pricedTotal = STATE.logs.reduce(function(s,l){
    return l.person===person&&(parseFloat(l.unit_price)||0)>0 ? s+(parseFloat(l.total_price)||0) : s;
  },0);
  var paidTotal = STATE.payments.reduce(function(s,p){
    var pp=(p.payers||'').split(',').map(function(x){return x.trim();});
    return pp.indexOf(person)!==-1?s+(parseFloat(p.amount)||0):s;
  },0);
  var moneyOwed = Math.max(0, pricedTotal - paidTotal);

  if (moneyOwed > 0.01){
    notify('⚠️ '+(isDE?'Bitte zuerst die Rechnung bezahlen: €'+moneyOwed.toFixed(2):'Please pay the outstanding bill first: €'+moneyOwed.toFixed(2)),true);
    return;
  }

  var note = (isDE?'Tab geschlossen':'Tab closed')
    +(freeCount>0?' · '+freeCount+' free beer'+(freeCount!==1?'s':''):'')
    +' · '+dateLabel;

  showModal(
    '<h3 style="margin-bottom:8px">✅ '+(isDE?'Tab schließen?':'Close Tab?')+'</h3>'+
    '<div style="background:#d4f5e2;border-radius:10px;padding:14px;margin-bottom:14px;font-size:14px;color:#1a4a2a">'+
      '<div style="font-weight:800;margin-bottom:6px">'+esc(person)+'</div>'+
      '<div style="font-size:12px;color:#1f6a3f;margin-bottom:6px">📅 '+dateLabel+'</div>'+
      (freeCount>0?'<div>🍾 '+freeCount+' '+(isDE?'kostenlose Biere in dieser Sitzung':'free beer'+(freeCount!==1?'s':'')+' this session')+'</div>':
        '<div style="color:#1f6a3f">'+(isDE?'Keine kostenlosen Biere in dieser Sitzung':'No free beers this session')+'</div>')+
      '<div style="font-size:12px;opacity:.8;margin-top:6px">'+(isDE?'Alle Getränke bleiben im Log gespeichert.':'All drinks stay in the log.')+'</div>'+
    '</div>'+
    '<button onclick="doCloseMyTab(\''+esc(person)+'\',\''+esc(note)+'\','+freeCount+')" '+
      'style="width:100%;background:linear-gradient(135deg,#1f8a4f,#28b866);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:800;padding:14px;cursor:pointer;margin-bottom:8px">'+
      '✅ '+(isDE?'Ja, Tab schließen':'Yes, Close My Tab')+'</button>'+
    '<button class="modal-close" onclick="closeModal()" style="width:100%">'+esc(t('cancel'))+'</button>'
  );
}

// ── EDIT DRINK QUANTITY (inline, from the person/day detail popup) ──
async function editDrinkQty(logId, delta, person, date){
  var entry = STATE.logs.find(function(l){ return l.id === logId; });
  if (!entry) return;
  if (!isMine(entry)) { notify(t('onlyOwnQty'), true); return; }

  var newQty = (entry.quantity||1) + delta;
  if (newQty <= 0) {
    if (!await appConfirm('This will remove the entry entirely. Continue?')) return;
    var {error} = await SB.from('drink_logs').delete().eq('id', logId);
    if (error) { notify('Error: '+error.message, true); return; }
    await audit('DELETE_DRINK_LOGS','drink_logs',logId,{person:person,drink:entry.drink,reason:'qty reduced to 0'});
    notify('Entry removed');
  } else {
    var unitPrice = parseFloat(entry.unit_price)||0;
    var newTotal = unitPrice * newQty;
    var {error} = await SB.from('drink_logs').update({ quantity: newQty, total_price: newTotal }).eq('id', logId);
    if (error) { notify('Error: '+error.message, true); return; }
    await audit('EDIT_DRINK_QTY','drink_logs',logId,{person:person,drink:entry.drink,old_qty:entry.quantity,new_qty:newQty});
    notify('Updated to ×'+newQty+' ✓');
  }

  await loadAll();
  // Re-open the appropriate popup so the user sees the change immediately
  if (date) {
    showPersonDayDetail(person, date);
  } else {
    showPersonRunningTab(person);
  }
}

// STATS TAB
// ══════════════════════════════════════════════════════════════
