// ── MY BALANCE (Log tab button) ─────────────────────────────
function showMyBalance(){
  var me = CURRENT_NAME;
  var myLogs = STATE.logs.filter(function(l){ return l.person === me; });

  // Money owed: sum of priced drinks minus payments made by me
  var myCost = myLogs.reduce(function(s,l){
    var unitPrice = parseFloat(l.unit_price)||0;
    return unitPrice > 0 ? s + (parseFloat(l.total_price)||0) : s;
  }, 0);
  var myPaid = STATE.payments.reduce(function(s,p){
    var payers = (p.payers||'').split(',').map(function(x){return x.trim();});
    return payers.indexOf(me) !== -1 ? s + (parseFloat(p.amount)||0) : s;
  }, 0);
  var myPending = myCost - myPaid;

  // Bottles owed: zero-price drinks minus what's been replaced
  var owedByDrink = {}, replacedByDrink = {};
  myLogs.forEach(function(l){
    var unitPrice = parseFloat(l.unit_price)||0;
    if (unitPrice > 0) return;
    owedByDrink[l.drink] = (owedByDrink[l.drink]||0) + (l.quantity||0);
  });
  STATE.replacements.forEach(function(r){
    if (r.replaced_by === me || r.logged_by === me) {
      replacedByDrink[r.drink] = (replacedByDrink[r.drink]||0) + (r.quantity||0);
    }
  });
  var totalOwedBottles = Object.values(owedByDrink).reduce(function(s,v){return s+v;},0);
  var totalReplacedBottles = Object.keys(owedByDrink).reduce(function(s,drink){
    return s + Math.min(replacedByDrink[drink]||0, owedByDrink[drink]);
  }, 0);
  var stillOwedBottles = totalOwedBottles - totalReplacedBottles;

  var moneyColor = myPending > 0.005 ? '#c4392b' : '#1f8a4f';
  var bottleColor = stillOwedBottles > 0 ? '#d4a017' : '#1f8a4f';

  showModal(
    '<h3>'+esc(t('yourBalance'))+'</h3>'+
    '<div class="modal-stat"><span class="modal-stat-label">'+esc(t('youOweMoney'))+'</span><span class="modal-stat-val" style="color:'+moneyColor+'">'+(myPending>0.005?'€'+myPending.toFixed(2):'€0.00 ✓')+'</span></div>'+
    '<div class="modal-stat"><span class="modal-stat-label">'+esc(t('bottlesToReplace'))+'</span><span class="modal-stat-val" style="color:'+bottleColor+'">'+(stillOwedBottles>0?stillOwedBottles+' '+esc(t('left')):esc(t('done'))+' ✓')+'</span></div>'+
    '<div class="modal-stat"><span class="modal-stat-label">'+esc(t('totalSpentPriced'))+'</span><span class="modal-stat-val" style="color:#3a2010;font-size:14px">€'+myCost.toFixed(2)+'</span></div>'+
    '<div class="modal-stat"><span class="modal-stat-label">'+esc(t('totalPaidLbl'))+'</span><span class="modal-stat-val" style="color:#3a2010;font-size:14px">€'+myPaid.toFixed(2)+'</span></div>'+
    '<div class="modal-stat"><span class="modal-stat-label">'+esc(t('freeDrinksLogged'))+'</span><span class="modal-stat-val" style="color:#3a2010;font-size:14px">'+totalOwedBottles+'</span></div>'+
    '<button class="modal-close" onclick="closeModal()">'+esc(t('close'))+'</button>'
  );
}

// 🎬 INTRO ANIMATION — tennis ball smashes bar window
// ══════════════════════════════════════════════════════════════
function showIntroAnimation(cb){
  var ov = document.getElementById('intro-anim-overlay');
  if (!ov) { if(cb) cb(); return; }
  ov.style.display = 'flex';
  var isDE = LANG === 'de';

  ov.innerHTML = '<div style="text-align:center;width:100%;max-width:480px;padding:20px">' +
    '<canvas id="intro-canvas" width="420" height="280" style="width:100%;border-radius:16px;background:#0a1a0a"></canvas>' +
    '<div id="intro-caption" style="margin-top:14px;font-size:16px;font-weight:700;color:#f8d878;min-height:28px;font-family:sans-serif"></div>' +
    '<div style="margin-top:6px;font-size:12px;color:#4a7a3a;font-family:sans-serif">'+(isDE?'Tippen zum Überspringen':'tap to skip')+'</div>' +
    '</div>';

  var finishIntro = function(){
    cancelAnimationFrame(raf);
    ov.style.display = 'none';
    if (cb) cb();
  };
  ov.onclick = finishIntro;

  var c = document.getElementById('intro-canvas');
  if (!c || !c.getContext) { finishIntro(); return; }
  var ctx = c.getContext('2d');
  var W=420, H=280, t=0, raf;
  var captions = isDE
    ? ['🎾 Schöner Tag auf dem Platz...','💨 Der Ball fliegt übers Netz...','🍺 Geradewegs ins Bar-Fenster!','💥 CRASH! Beer\'O\'Clock!']
    : ['🎾 Perfect match on the clay...','💨 Ball soars over the net...','🍺 Straight into the bar window!','💥 CRASH! It\'s Beer\'O\'Clock!'];
  var capIdx = -1;

  function setCaption(i){
    if (i === capIdx) return; capIdx = i;
    var el = document.getElementById('intro-caption');
    if (el) el.textContent = captions[i] || '';
  }

  // Safe rounded rect (no roundRect API needed)
  function rrect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.arcTo(x+w,y, x+w,y+r, r);
    ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w,y+h, x+w-r,y+h, r);
    ctx.lineTo(x+r, y+h); ctx.arcTo(x,y+h, x,y+h-r, r);
    ctx.lineTo(x, y+r); ctx.arcTo(x,y, x+r,y, r);
    ctx.closePath();
  }

  function drawScene(progress){
    try {
      ctx.clearRect(0,0,W,H);

      // Night sky
      var sky = ctx.createLinearGradient(0,0,0,H*0.65);
      sky.addColorStop(0,'#050d1a'); sky.addColorStop(1,'#1a3a1a');
      ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

      // Stars
      [[30,20],[80,10],[150,30],[220,8],[300,25],[370,15],[60,55],[180,48],[320,50]].forEach(function(s){
        ctx.fillStyle='rgba(255,255,200,0.7)';
        ctx.beginPath(); ctx.arc(s[0],s[1],1,0,Math.PI*2); ctx.fill();
      });

      // Clay ground
      var grd = ctx.createLinearGradient(0,H*0.62,0,H);
      grd.addColorStop(0,'#7a2e1a'); grd.addColorStop(1,'#3a1208');
      ctx.fillStyle=grd; ctx.fillRect(0,H*0.62,W,H);

      // Court lines
      ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(W*0.15,H*0.62); ctx.lineTo(W*0.85,H*0.62); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(W*0.5,H*0.62); ctx.lineTo(W*0.5,H); ctx.stroke();

      // Net
      ctx.strokeStyle='#cccccc'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(W*0.15,H*0.56); ctx.lineTo(W*0.85,H*0.56); ctx.stroke();
      for(var nx=W*0.15; nx<W*0.85; nx+=8){
        ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=0.5;
        ctx.beginPath(); ctx.moveTo(nx,H*0.53); ctx.lineTo(nx,H*0.62); ctx.stroke();
      }

      // ── BAR BUILDING (right side) ──
      var bx0=W*0.67, byt=H*0.12, bw=W*0.32, bh=H*0.52;

      // Wall
      var wallGrd = ctx.createLinearGradient(bx0,0,bx0+bw,0);
      wallGrd.addColorStop(0,'#3a1f0a'); wallGrd.addColorStop(1,'#2a1408');
      ctx.fillStyle=wallGrd; ctx.fillRect(bx0,byt,bw,bh);

      // Roof ridge
      ctx.fillStyle='#1a0a04';
      ctx.beginPath();
      ctx.moveTo(bx0-8,byt); ctx.lineTo(bx0+bw+4,byt);
      ctx.lineTo(bx0+bw,byt-H*0.11); ctx.lineTo(bx0+6,byt-H*0.11);
      ctx.closePath(); ctx.fill();
      // Roof tiles
      ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1;
      for(var ri=0;ri<6;ri++){
        var ry=byt-H*0.11+ri*8;
        ctx.beginPath(); ctx.moveTo(bx0+ri*6,ry); ctx.lineTo(bx0+bw-ri*4,ry); ctx.stroke();
      }

      // Neon sign "BAR"
      var signX=bx0+bw*0.5, signY=byt+10;
      ctx.save();
      ctx.shadowColor='rgba(255,100,20,0.9)'; ctx.shadowBlur=12;
      ctx.fillStyle='#ff6414'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
      ctx.fillText('🍺 B·A·R', signX, signY);
      ctx.restore();
      // Neon underglow
      var neonGlow=ctx.createRadialGradient(signX,signY,2,signX,signY,22);
      neonGlow.addColorStop(0,'rgba(255,100,20,0.25)'); neonGlow.addColorStop(1,'rgba(255,100,20,0)');
      ctx.fillStyle=neonGlow; ctx.fillRect(signX-22,signY-12,44,18);

      // Door (dark wood)
      ctx.fillStyle='#3a1a06';
      ctx.beginPath(); ctx.roundRect ? ctx.roundRect(bx0+bw*0.38,byt+bh*0.58,bw*0.24,bh*0.37,3) : ctx.rect(bx0+bw*0.38,byt+bh*0.58,bw*0.24,bh*0.37);
      ctx.fill();
      ctx.strokeStyle='#6a3a14'; ctx.lineWidth=1.5; ctx.strokeRect(bx0+bw*0.38,byt+bh*0.58,bw*0.24,bh*0.37);
      // Door knob
      ctx.fillStyle='#c8a020'; ctx.beginPath(); ctx.arc(bx0+bw*0.56,byt+bh*0.77,2.5,0,Math.PI*2); ctx.fill();

      // ── LARGE WINDOW — shows bar interior ──
      var wxl=bx0+bw*0.06, wyt=byt+bh*0.12, ww=bw*0.36, wh=bh*0.44;
      var wcx=wxl+ww*0.5, wcy=wyt+wh*0.5;
      var broken = progress > 0.82;
      var shardProg = broken ? Math.min(1,(progress-0.82)/0.18) : 0;

      // Clip to window for interior drawing
      ctx.save();
      ctx.beginPath(); ctx.rect(wxl,wyt,ww,wh); ctx.clip();

      // Interior warm background
      var intGrd=ctx.createLinearGradient(wxl,wyt,wxl,wyt+wh);
      intGrd.addColorStop(0,'#3a1a06'); intGrd.addColorStop(1,'#1a0a02');
      ctx.fillStyle=intGrd; ctx.fillRect(wxl,wyt,ww,wh);

      // Ambient warm light from ceiling
      var ambGlow=ctx.createRadialGradient(wcx,wyt+wh*0.12,4,wcx,wyt+wh*0.25,ww*0.6);
      ambGlow.addColorStop(0,'rgba(255,200,80,0.38)'); ambGlow.addColorStop(1,'rgba(255,100,20,0)');
      ctx.fillStyle=ambGlow; ctx.fillRect(wxl,wyt,ww,wh);

      // Pendant lamp
      ctx.fillStyle='#f8e060';
      ctx.beginPath(); ctx.moveTo(wcx-8,wyt+5); ctx.lineTo(wcx+8,wyt+5); ctx.lineTo(wcx+5,wyt+14); ctx.lineTo(wcx-5,wyt+14); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=0.7; ctx.beginPath(); ctx.moveTo(wcx,wyt); ctx.lineTo(wcx,wyt+5); ctx.stroke();
      var lampGlow=ctx.createRadialGradient(wcx,wyt+14,2,wcx,wyt+18,28);
      lampGlow.addColorStop(0,'rgba(255,230,100,0.55)'); lampGlow.addColorStop(1,'rgba(255,180,60,0)');
      ctx.fillStyle=lampGlow; ctx.fillRect(wxl,wyt,ww,wh);

      // Back wall — wooden shelves with bottles
      ctx.fillStyle='#2a1206'; ctx.fillRect(wxl, wyt+wh*0.08, ww, wh*0.72);
      // Shelf plank
      ctx.fillStyle='#5a2e0a';
      ctx.fillRect(wxl, wyt+wh*0.22, ww, 4);
      ctx.fillRect(wxl, wyt+wh*0.42, ww, 4);

      // Bottles on shelves — top shelf
      var bottleColors=['#1a6a2a','#8a4a10','#c89020','#2a4a8a','#3a8a1a','#6a1a1a'];
      for(var bi=0;bi<6;bi++){
        var bpx=wxl+ww*0.08+bi*ww*0.145, bpyt=wyt+wh*0.09;
        // Bottle body
        ctx.fillStyle=bottleColors[bi];
        ctx.beginPath();
        ctx.roundRect ? ctx.roundRect(bpx-4,bpyt,8,wh*0.12,2) : ctx.rect(bpx-4,bpyt,8,wh*0.12);
        ctx.fill();
        // Bottle neck
        ctx.fillStyle=bottleColors[bi];
        ctx.fillRect(bpx-2,bpyt-wh*0.05,4,wh*0.06);
        // Label
        ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.fillRect(bpx-3,bpyt+2,6,5);
        // Bottle shine
        ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(bpx+2,bpyt+2); ctx.lineTo(bpx+2,bpyt+wh*0.08); ctx.stroke();
      }

      // Beer taps on bar counter
      var counterY=wyt+wh*0.68;
      ctx.fillStyle='#3a1a06'; ctx.fillRect(wxl,counterY,ww,wh*0.32);
      // Counter edge with brass strip
      var brassGrd=ctx.createLinearGradient(0,counterY,0,counterY+5);
      brassGrd.addColorStop(0,'#d4a020'); brassGrd.addColorStop(1,'#8a6010');
      ctx.fillStyle=brassGrd; ctx.fillRect(wxl,counterY,ww,5);

      // Beer taps (3 taps)
      [0.22,0.5,0.78].forEach(function(tx){
        var tapX=wxl+ww*tx, tapY=counterY-18;
        // Tap base
        ctx.fillStyle='#8a8a8a'; ctx.fillRect(tapX-4,counterY-4,8,8);
        // Tap pole
        ctx.strokeStyle='#c0c0c0'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(tapX,counterY); ctx.lineTo(tapX,tapY); ctx.stroke();
        // Tap handle
        ctx.fillStyle='#c0c0c0';
        ctx.beginPath(); ctx.ellipse(tapX+4,tapY,4,8,0.4,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='#909090'; ctx.lineWidth=1; ctx.stroke();
        // Brand label on handle
        ctx.fillStyle='#f8d878'; ctx.font='5px sans-serif'; ctx.textAlign='center';
        ctx.fillText('🍺',tapX+4,tapY+2);
      });

      // Beer glass on counter
      var glx=wxl+ww*0.65, gly=counterY-22;
      ctx.fillStyle='rgba(255,200,80,0.7)';
      ctx.beginPath();
      ctx.moveTo(glx-7,gly); ctx.lineTo(glx-9,gly+20); ctx.lineTo(glx+9,gly+20); ctx.lineTo(glx+7,gly); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1; ctx.stroke();
      // Foam top
      ctx.fillStyle='rgba(255,255,255,0.85)';
      ctx.beginPath(); ctx.ellipse(glx,gly,7,4,0,0,Math.PI*2); ctx.fill();
      // Glass shine
      ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(glx-4,gly+4); ctx.lineTo(glx-5,gly+15); ctx.stroke();

      // Bar stool silhouette
      var stX=wxl+ww*0.18, stY=wyt+wh*0.9;
      ctx.fillStyle='#1a0a02'; ctx.fillRect(stX-10,stY-8,20,4);
      ctx.fillStyle='#2a1206'; ctx.fillRect(stX-2,stY-4,4,12);
      ctx.fillStyle='#1a0a02'; ctx.fillRect(stX-8,stY+8,16,3);

      ctx.restore(); // end interior clip

      // ── WINDOW FRAME ──
      ctx.strokeStyle='#5a2e0a'; ctx.lineWidth=3; ctx.strokeRect(wxl,wyt,ww,wh);
      // Cross frame dividers
      if (!broken) {
        ctx.strokeStyle='#5a2e0a'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(wcx,wyt); ctx.lineTo(wcx,wyt+wh); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(wxl,wyt+wh*0.45); ctx.lineTo(wxl+ww,wyt+wh*0.45); ctx.stroke();

        // Window glass tint overlay
        ctx.fillStyle='rgba(120,200,255,0.12)'; ctx.fillRect(wxl,wyt,ww,wh);
        // Reflection streak
        ctx.fillStyle='rgba(255,255,255,0.08)';
        ctx.beginPath(); ctx.moveTo(wxl+4,wyt+4); ctx.lineTo(wxl+ww*0.3,wyt+4); ctx.lineTo(wxl+ww*0.22,wyt+wh*0.35); ctx.lineTo(wxl+2,wyt+wh*0.35); ctx.closePath(); ctx.fill();
      }

      // ── NIKE-STYLE WINDOW SHATTER ──
      if (broken) {
        var sp = shardProg;
        var impX = wcx - ww*0.05, impY = wyt + wh * 0.42; // ball impact point

        // Phase 1 (0→0.15): White flash ring expanding from impact
        if (sp < 0.15) {
          var flashR = sp / 0.15;
          ctx.save();
          ctx.globalAlpha = 1 - flashR;
          ctx.fillStyle = '#ffffff';
          ctx.beginPath(); ctx.arc(impX, impY, flashR * ww * 0.8, 0, Math.PI*2); ctx.fill();
          ctx.restore();
        }

        // Phase 2 (0.05+): Radial crack lines burst outward from impact — primary
        var numCracks = 14;
        for (var ci=0; ci<numCracks; ci++) {
          var angle = (ci/numCracks)*Math.PI*2 + ci*0.13;
          var crackLen = Math.min(sp * 2.5, 1) * (ww*0.48 + (ci%3)*ww*0.1);
          var ex = impX + Math.cos(angle)*crackLen;
          var ey = impY + Math.sin(angle)*crackLen;
          // Primary crack
          ctx.strokeStyle = 'rgba(220,240,255,'+(0.85-sp*0.3)+')';
          ctx.lineWidth = 1.2 + (ci%3)*0.4;
          ctx.beginPath(); ctx.moveTo(impX, impY); ctx.lineTo(ex, ey); ctx.stroke();
          // Secondary branch crack at ~60% length
          if (sp > 0.1) {
            var branchAngle = angle + (ci%2===0 ? 0.45 : -0.4) + (ci%3)*0.15;
            var brLen = crackLen * 0.45;
            var bx2 = impX+Math.cos(angle)*crackLen*0.55 + Math.cos(branchAngle)*brLen;
            var by2 = impY+Math.sin(angle)*crackLen*0.55 + Math.sin(branchAngle)*brLen;
            ctx.strokeStyle = 'rgba(200,230,255,'+(0.6-sp*0.25)+')';
            ctx.lineWidth = 0.7;
            ctx.beginPath();
            ctx.moveTo(impX+Math.cos(angle)*crackLen*0.55, impY+Math.sin(angle)*crackLen*0.55);
            ctx.lineTo(bx2, by2); ctx.stroke();
          }
        }

        // Phase 3 (0.18+): Irregular polygon shards flying outward with rotation
        if (sp > 0.18) {
          var shardSp = Math.min(1, (sp-0.18)/0.82);
          // Define shard shapes relative to impact — like Voronoi cells
          var shards = [
            {pts:[[-18,-14],[-6,-8],[-12,-2],[-22,4]], vx:-3.5, vy:-2.5, rot:0.15},
            {pts:[[0,-18],[14,-10],[8,-2],[0,-4]], vx:2.5, vy:-4, rot:-0.2},
            {pts:[[16,-8],[22,2],[14,8],[10,-2]], vx:4, vy:-1.5, rot:0.25},
            {pts:[[-4,2],[8,6],[4,18],[-10,12]], vx:-2, vy:3.5, rot:-0.18},
            {pts:[[10,8],[20,12],[18,22],[8,16]], vx:3.5, vy:4, rot:0.3},
            {pts:[[-22,-2],[-14,6],[-20,14],[-28,6]], vx:-4.5, vy:2, rot:-0.22},
            {pts:[[-8,14],[2,18],[-2,28],[-14,22]], vx:-1.5, vy:5, rot:0.12},
            {pts:[[6,-6],[18,-2],[14,8],[4,4]], vx:3, vy:1, rot:-0.28},
            {pts:[[-14,-8],[-4,-12],[0,-4],[-10,0]], vx:-2.5, vy:-3, rot:0.2},
            {pts:[[0,4],[10,2],[12,14],[2,16]], vx:2, vy:3, rot:-0.15},
            {pts:[[-20,6],[-10,10],[-12,20],[-24,14]], vx:-3, vy:3.5, rot:0.28},
            {pts:[[18,-14],[26,-6],[22,4],[12,-4]], vx:5, vy:-3, rot:-0.32}
          ];

          shards.forEach(function(s){
            var dx = s.vx * shardSp * ww * 0.32;
            var dy = s.vy * shardSp * wh * 0.32 + shardSp * shardSp * wh * 0.15; // gravity
            var rot = s.rot * shardSp * Math.PI * 1.8;

            ctx.save();
            ctx.translate(impX + dx, impY + dy);
            ctx.rotate(rot);

            // Shard fill — glass color with interior visible behind
            var alpha = Math.max(0, 0.82 - shardSp * 0.75);
            ctx.fillStyle = 'rgba(160,220,255,'+alpha+')';
            ctx.beginPath();
            ctx.moveTo(s.pts[0][0], s.pts[0][1]);
            for (var pi=1; pi<s.pts.length; pi++) ctx.lineTo(s.pts[pi][0], s.pts[pi][1]);
            ctx.closePath(); ctx.fill();

            // Shard edge highlight (catches light)
            ctx.strokeStyle = 'rgba(255,255,255,'+(alpha*0.9)+')';
            ctx.lineWidth = 1.2;
            ctx.stroke();

            // Inner shine line on each shard
            ctx.strokeStyle = 'rgba(220,240,255,'+(alpha*0.6)+')';
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(s.pts[0][0]+2, s.pts[0][1]+2);
            ctx.lineTo(s.pts[1][0]-2, s.pts[1][1]+2);
            ctx.stroke();

            ctx.restore();
          });

          // Tiny glass particle debris cloud
          for (var dp=0; dp<22; dp++) {
            var da = (dp/22)*Math.PI*2 + dp*0.28;
            var dr = shardSp * (ww*0.22 + dp*ww*0.02) + Math.sin(dp*2.1)*8;
            var dpx = impX + Math.cos(da)*dr;
            var dpy = impY + Math.sin(da)*dr + shardSp*shardSp*wh*0.08;
            var dalpha = Math.max(0, 0.6-shardSp*0.6);
            ctx.fillStyle = 'rgba(200,235,255,'+dalpha+')';
            ctx.beginPath(); ctx.arc(dpx, dpy, 1.2+dp%3*0.5, 0, Math.PI*2); ctx.fill();
          }
        }

        // Phase 4 (0.35+): Impact shockwave ring
        if (sp > 0.35 && sp < 0.65) {
          var wvProg = (sp-0.35)/0.3;
          ctx.save();
          ctx.globalAlpha = (1-wvProg)*0.5;
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 2*(1-wvProg);
          ctx.beginPath(); ctx.arc(impX,impY, wvProg*ww*0.55, 0, Math.PI*2); ctx.stroke();
          ctx.restore();
        }

        // Phase 5 (0.55+): CRASH! text with impact styling + beer emoji
        if (sp > 0.55) {
          var txtSp = Math.min(1,(sp-0.55)/0.45);
          ctx.save();
          ctx.translate(impX, impY - wh*0.15 - txtSp*10);
          ctx.rotate((1-txtSp)*0.3);
          ctx.scale(0.6+txtSp*0.6, 0.6+txtSp*0.6);
          ctx.textAlign='center';
          // Shadow
          ctx.shadowColor='rgba(255,60,0,0.9)'; ctx.shadowBlur=15;
          ctx.fillStyle='#ff3200';
          ctx.font='bold '+(18)+'px sans-serif';
          ctx.fillText('💥 CRASH!', 0, 0);
          ctx.restore();

          if(sp > 0.75 && Math.floor(t/6)%2===0){
            ctx.font='22px sans-serif'; ctx.textAlign='center';
            ctx.fillText('🍺', impX, impY+wh*0.3);
          }
        }
      }

      // ── TENNIS PLAYER — detailed athletic figure (left side) ──
      var playerX = W*0.13, playerY = H*0.62;
      var swingPhase = Math.min(1, progress * 2.2); // 0→1 over first half+

      ctx.save();
      ctx.translate(playerX, playerY);

      // Player shadow
      ctx.fillStyle='rgba(0,0,0,0.22)';
      ctx.beginPath(); ctx.ellipse(0, 3, 13, 4, 0, 0, Math.PI*2); ctx.fill();

      // ── Legs (dynamic stride) ──
      var stride = Math.sin(swingPhase * Math.PI * 2) * 0.35;
      var frontLegAngle = 0.25 + stride;
      var backLegAngle  = -0.18 - stride * 0.5;
      var legLen = 18;

      // Back leg
      var blKx = Math.sin(backLegAngle) * legLen * 0.55;
      var blKy = Math.cos(backLegAngle) * legLen * 0.55;
      var blFx = blKx + Math.sin(backLegAngle - 0.4) * legLen * 0.55;
      var blFy = blKy + Math.cos(backLegAngle - 0.4) * legLen * 0.55;
      ctx.strokeStyle='#c8a070'; ctx.lineWidth=3.5; ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.beginPath(); ctx.moveTo(0, -4); ctx.lineTo(blKx, blKy); ctx.lineTo(blFx, blFy); ctx.stroke();
      // Back shoe
      ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.ellipse(blFx+2, blFy+2, 6, 2.5, backLegAngle-0.2, 0, Math.PI*2); ctx.fill();

      // Front leg
      var flKx = Math.sin(frontLegAngle) * legLen * 0.6;
      var flKy = Math.cos(frontLegAngle) * legLen * 0.6;
      var flFx = flKx + Math.sin(frontLegAngle + 0.2) * legLen * 0.55;
      var flFy = flKy + Math.cos(frontLegAngle + 0.2) * legLen * 0.55;
      ctx.beginPath(); ctx.moveTo(0, -4); ctx.lineTo(flKx, flKy); ctx.lineTo(flFx, flFy); ctx.stroke();
      // Front shoe
      ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.ellipse(flFx+2, flFy+2, 6, 2.5, frontLegAngle+0.1, 0, Math.PI*2); ctx.fill();

      // ── Shorts ──
      ctx.fillStyle='#1a6a8a';
      ctx.beginPath();
      ctx.moveTo(-8, -4); ctx.quadraticCurveTo(0, 2, 8, -4);
      ctx.lineTo(4, 4); ctx.quadraticCurveTo(0, 7, -4, 4);
      ctx.closePath(); ctx.fill();

      // ── Torso / shirt ──
      ctx.fillStyle='#f0f0f0';
      ctx.beginPath();
      ctx.moveTo(-7, -5); ctx.lineTo(-6, -20); ctx.lineTo(6, -20); ctx.lineTo(7, -5);
      ctx.quadraticCurveTo(0, -2, -7, -5);
      ctx.closePath(); ctx.fill();
      // Shirt stripe
      ctx.strokeStyle='#3a8a3a'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(-5,-20); ctx.lineTo(-5,-5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(5,-20); ctx.lineTo(5,-5); ctx.stroke();

      // ── Head ──
      ctx.fillStyle='#f5c090';
      ctx.beginPath(); ctx.arc(0, -26, 7, 0, Math.PI*2); ctx.fill();
      // Tennis cap
      ctx.fillStyle='#3a8a3a';
      ctx.beginPath(); ctx.arc(0, -28, 7.5, Math.PI, Math.PI*2); ctx.fill();
      ctx.fillStyle='#3a8a3a';
      ctx.beginPath(); ctx.moveTo(-7.5,-28); ctx.lineTo(10,-28); ctx.lineTo(9,-25); ctx.lineTo(-7.5,-26); ctx.closePath(); ctx.fill();
      // Face
      ctx.fillStyle='#c08060'; ctx.beginPath(); ctx.arc(2, -25, 1.2, 0, Math.PI*2); ctx.fill(); // eye
      ctx.fillStyle='#8a5030'; ctx.beginPath(); ctx.arc(-2, -25, 1.2, 0, Math.PI*2); ctx.fill(); // eye
      // Sweatband
      ctx.strokeStyle='#ffffff'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(0,-28,7.5,Math.PI*1.1,Math.PI*1.9); ctx.stroke();

      // ── Racket arm — full swing arc ──
      var armAngle = -1.1 + swingPhase * 2.8; // big backswing → full followthrough
      var armLen1 = 16, armLen2 = 14, racketLen = 14;

      // Shoulder → elbow
      var elbX = Math.cos(armAngle - 0.5) * armLen1;
      var elbY = -18 + Math.sin(armAngle - 0.5) * armLen1;
      // Elbow → wrist
      var wristX = elbX + Math.cos(armAngle + 0.1) * armLen2;
      var wristY = elbY + Math.sin(armAngle + 0.1) * armLen2;
      // Racket tip
      var racTipX = wristX + Math.cos(armAngle - 0.15) * racketLen;
      var racTipY = wristY + Math.sin(armAngle - 0.15) * racketLen;

      ctx.strokeStyle='#d4a060'; ctx.lineWidth=3; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(0, -18); ctx.lineTo(elbX, elbY); ctx.lineTo(wristX, wristY); ctx.stroke();

      // Non-racket arm (balance / toss arm)
      var arm2a = armAngle * 0.25 - 2.0;
      var a2x = Math.cos(arm2a) * 14, a2y = -18 + Math.sin(arm2a) * 14;
      ctx.strokeStyle='#d4a060';
      ctx.beginPath(); ctx.moveTo(0, -18); ctx.lineTo(a2x, a2y); ctx.stroke();
      // Wristband non-racket
      ctx.strokeStyle='#ffffff'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.arc(a2x, a2y, 2.5, 0, Math.PI*2); ctx.stroke();

      // Racket handle
      ctx.strokeStyle='#8a6020'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(wristX, wristY); ctx.lineTo(racTipX, racTipY); ctx.stroke();

      // Racket head
      ctx.save();
      ctx.translate(racTipX, racTipY);
      ctx.rotate(armAngle - 0.15);
      // Frame
      ctx.strokeStyle='#d4b060'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.ellipse(0, -8, 6, 10, 0, 0, Math.PI*2); ctx.stroke();
      ctx.strokeStyle='#c09040'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.ellipse(0, -8, 4.5, 8.5, 0, 0, Math.PI*2); ctx.stroke();
      // Strings vertical
      ctx.strokeStyle='rgba(230,230,200,0.7)'; ctx.lineWidth=0.7;
      for(var si=-5;si<=5;si+=2){
        ctx.beginPath(); ctx.moveTo(si,-18); ctx.lineTo(si,2); ctx.stroke();
      }
      // Strings horizontal
      for(var sj=-16;sj<=0;sj+=2.5){
        ctx.beginPath(); ctx.moveTo(-6,sj); ctx.lineTo(6,sj); ctx.stroke();
      }
      // Grip tape
      ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1.5;
      for(var gi=0;gi<4;gi++){
        ctx.beginPath(); ctx.moveTo(-3,2+gi*2); ctx.lineTo(3,2+gi*2); ctx.stroke();
      }
      ctx.restore();

      // Wristband on racket arm
      ctx.strokeStyle='#ffffff'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(wristX, wristY, 2.5, 0, Math.PI*2); ctx.stroke();

      ctx.restore(); // end player transform

      // Ball trajectory — curves toward window impact point (wcx-ww*0.05, wyt+wh*0.42)
      var nt = Math.min(progress, 1);
      var p1x=W*0.14, p1y=H*0.68;
      var p2x=W*0.42, p2y=H*0.48;
      var p3x=W*0.79, p3y=H*0.37;  // aimed at window center
      var bbx, bby;
      if(nt < 0.5){
        var u=nt*2; bbx=p1x+(p2x-p1x)*u; bby=p1y+(p2y-p1y)*u-Math.sin(u*Math.PI)*28;
      } else {
        var u=(nt-0.5)*2; bbx=p2x+(p3x-p2x)*u; bby=p2y+(p3y-p2y)*u-Math.sin((1-u)*Math.PI)*20;
      }

      // Screen shake on impact (frame 98-110)
      var shakeAmt = 0;
      if (t>98 && t<112) shakeAmt = Math.sin(t*1.8)*(112-t)*0.55;
      if (shakeAmt) { ctx.save(); ctx.translate(shakeAmt, shakeAmt*0.6); }

      // Motion trail
      if(nt>0.05 && nt<0.86){
        for(var tr=6;tr>0;tr--){
          var trp=Math.max(0,nt-tr*0.038), tu, tbx, tby;
          if(trp<0.5){tu=trp*2;tbx=p1x+(p2x-p1x)*tu;tby=p1y+(p2y-p1y)*tu-Math.sin(tu*Math.PI)*28;}
          else{tu=(trp-0.5)*2;tbx=p2x+(p3x-p2x)*tu;tby=p2y+(p3y-p2y)*tu-Math.sin((1-tu)*Math.PI)*20;}
          ctx.beginPath(); ctx.arc(tbx,tby,7-tr,0,Math.PI*2);
          ctx.fillStyle='rgba(200,230,80,'+(0.14-tr*0.018)+')'; ctx.fill();
        }
      }

      // Ball (disappears on impact)
      if(nt < 0.84){
        ctx.save(); ctx.translate(bbx,bby); ctx.rotate(nt*Math.PI*7);
        ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2);
        var bg2=ctx.createRadialGradient(-2,-3,1,-2,-3,9);
        bg2.addColorStop(0,'#f0f840'); bg2.addColorStop(0.6,'#c8e020'); bg2.addColorStop(1,'#8aac00');
        ctx.fillStyle=bg2; ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1.2;
        ctx.beginPath(); ctx.arc(0,0,8,0.2,2.5); ctx.stroke();
        ctx.beginPath(); ctx.arc(0,0,8,Math.PI+0.2,Math.PI+2.5); ctx.stroke();
        ctx.restore();
      }

      if (shakeAmt) ctx.restore(); // end screen shake
    } catch(e) { /* safe — never crash the app */ }
  }

  // ── Beer opening sound — synthesised via Web Audio API ──
  var _soundPlayed = false;
  function playBeerOpenSound(){
    try {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      var ac = new AC();

      // 1. GLASS CRACK — short white-noise burst filtered to high frequencies
      var crackerDur = 0.18;
      var crackBuf = ac.createBuffer(1, ac.sampleRate * crackerDur, ac.sampleRate);
      var crackData = crackBuf.getChannelData(0);
      for (var i=0; i<crackData.length; i++){
        crackData[i] = (Math.random()*2-1) * Math.pow(1 - i/crackData.length, 1.5);
      }
      var crackSrc = ac.createBufferSource();
      crackSrc.buffer = crackBuf;
      var crackHp = ac.createBiquadFilter();
      crackHp.type = 'highpass'; crackHp.frequency.value = 3200;
      var crackGain = ac.createGain();
      crackGain.gain.setValueAtTime(1.4, ac.currentTime);
      crackGain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + crackerDur);
      crackSrc.connect(crackHp); crackHp.connect(crackGain); crackGain.connect(ac.destination);
      crackSrc.start(ac.currentTime);

      // 2. PRESSURISED HISS — bandpass noise that ramps up then tails off (pshhhhh)
      var hissDur = 0.95;
      var hissBuf = ac.createBuffer(1, ac.sampleRate * hissDur, ac.sampleRate);
      var hissData = hissBuf.getChannelData(0);
      for (var j=0; j<hissData.length; j++) hissData[j] = Math.random()*2-1;
      var hissSrc = ac.createBufferSource();
      hissSrc.buffer = hissBuf;
      var hissBp = ac.createBiquadFilter();
      hissBp.type = 'bandpass'; hissBp.frequency.value = 2800; hissBp.Q.value = 0.8;
      var hissGain = ac.createGain();
      hissGain.gain.setValueAtTime(0.001, ac.currentTime + 0.05);
      hissGain.gain.linearRampToValueAtTime(0.55, ac.currentTime + 0.18);
      hissGain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + hissDur);
      hissSrc.connect(hissBp); hissBp.connect(hissGain); hissGain.connect(ac.destination);
      hissSrc.start(ac.currentTime + 0.05);

      // 3. GLUG-GLUG — 3 pitched bubbles (short sine tones with pitch wobble)
      [0.55, 0.72, 0.88].forEach(function(delay, idx){
        var freq = 420 - idx * 55; // descending pitch
        var osc = ac.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, ac.currentTime + delay);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.72, ac.currentTime + delay + 0.12);
        var glugGain = ac.createGain();
        glugGain.gain.setValueAtTime(0.001, ac.currentTime + delay);
        glugGain.gain.linearRampToValueAtTime(0.32, ac.currentTime + delay + 0.025);
        glugGain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + 0.13);
        osc.connect(glugGain); glugGain.connect(ac.destination);
        osc.start(ac.currentTime + delay);
        osc.stop(ac.currentTime + delay + 0.15);
      });

      // 4. LOW THUD — the impact thump as the ball hits
      var thudOsc = ac.createOscillator();
      thudOsc.type = 'sine';
      thudOsc.frequency.setValueAtTime(160, ac.currentTime);
      thudOsc.frequency.exponentialRampToValueAtTime(40, ac.currentTime + 0.12);
      var thudGain = ac.createGain();
      thudGain.gain.setValueAtTime(0.9, ac.currentTime);
      thudGain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.14);
      thudOsc.connect(thudGain); thudGain.connect(ac.destination);
      thudOsc.start(ac.currentTime); thudOsc.stop(ac.currentTime + 0.15);

    } catch(e){ /* audio not supported — silent */ }
  }

  function tick(){
    t++;
    var progress = t / 120;
    if(progress>0.28) setCaption(0);
    if(progress>0.48) setCaption(1);
    if(progress>0.76) setCaption(2);
    if(progress>0.86) setCaption(3);
    // Fire beer-opening sound exactly once when window shatters
    if(progress > 0.82 && !_soundPlayed){ _soundPlayed=true; playBeerOpenSound(); }
    drawScene(Math.min(progress,1));
    if(progress < 1.4) raf = requestAnimationFrame(tick);
    else finishIntro();
  }
  raf = requestAnimationFrame(tick);
}

// 🎬 CRATE ANIMATION — load empties → drive → refill → return
// ══════════════════════════════════════════════════════════════
function showCrateAnimation(drinkName, cb){
  var ov = document.getElementById('crate-anim-overlay');
  if (!ov) { if(cb) cb(); return; }
  ov.style.display='flex';
  var isDE = LANG==='de';

  ov.innerHTML =
    '<div style="text-align:center;width:100%;max-width:480px;padding:20px">' +
    '<canvas id="crate-canvas" width="420" height="240" style="width:100%;border-radius:14px;background:#0a1a2a"></canvas>' +
    '<div id="crate-caption" style="margin-top:12px;font-size:15px;font-weight:700;color:#f8d878;min-height:26px;font-family:sans-serif"></div>' +
    '<div style="margin-top:4px;font-size:11px;color:#4a9a6a;font-family:sans-serif">'+(isDE?'Klicken zum Überspringen':'tap to skip')+'</div>' +
    '</div>';

  ov.onclick = function(){ finishCrate(); };

  var c=document.getElementById('crate-canvas');
  var ctx=c.getContext('2d');
  var W=420, H=240, t=0, raf2, phase=0;
  // phases: 0=load empties at club (0-40f), 1=drive away (40-80f), 2=at garage fill (80-120f), 3=drive back (120-160f), 4=place in fridge (160-200f)
  var capts=isDE
    ? ['📦 Leere Kisten werden geladen...','🚗 Fahrt nach Hause...','🏠 Neue Kisten werden beladen...','🚗 Zurück zum Club!','❄️ Eingeräumt — Prost! 🍺']
    : ['📦 Loading empty crates...','🚗 Driving home...','🏠 Loading fresh crates...','🚗 Heading back to the club!','❄️ Stocked! Cheers! 🍺'];

  function setC(i){ var el=document.getElementById('crate-caption'); if(el)el.textContent=capts[i]||''; }

  // Colours
  var CAR_COL='#c0392b', CRATE_EMPTY='rgba(180,140,80,0.7)', CRATE_FULL='rgba(60,160,80,0.9)';

  function drawBg(scene){
    // sky
    var sky=ctx.createLinearGradient(0,0,0,H*0.6);
    if(scene==='night'){ sky.addColorStop(0,'#05091a'); sky.addColorStop(1,'#0a2a0a'); }
    else { sky.addColorStop(0,'#1a2a5a'); sky.addColorStop(1,'#0a1a0a'); }
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
    // Road
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,H*0.62,W,H);
    ctx.fillStyle='#333'; ctx.fillRect(0,H*0.61,W,5);
    // Road markings
    for(var rx=0;rx<W;rx+=50){
      ctx.fillStyle='rgba(255,255,100,0.4)';
      ctx.fillRect((rx+t*2*(scene==='return'?-1:1))%W, H*0.7, 28, 3);
    }
    // Stars
    if(scene==='night') [[30,15],[100,8],[190,22],[280,10],[360,20],[420,5]].forEach(function(s){
      ctx.fillStyle='rgba(255,255,200,0.8)'; ctx.beginPath(); ctx.arc(s[0],s[1],1,0,Math.PI*2); ctx.fill();
    });
  }

  function drawBuilding(x, type){
    // Club or Home
    ctx.fillStyle= type==='club' ? '#3a1208' : '#1a2a3a';
    ctx.fillRect(x, H*0.2, 100, H*0.42);
    ctx.fillStyle= type==='club' ? '#2a0e06' : '#0a1a2a';
    ctx.beginPath(); ctx.moveTo(x-6,H*0.2); ctx.lineTo(x+106,H*0.2); ctx.lineTo(x+95,H*0.06); ctx.lineTo(x+10,H*0.06); ctx.closePath(); ctx.fill();
    // Sign
    ctx.fillStyle='#f8d878'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
    ctx.fillText(type==='club'?'🎾 CLUB':'🏠 HOME', x+50, H*0.14);
    // Door
    ctx.fillStyle='#5a3a1a'; ctx.fillRect(x+38,H*0.5,25,H*0.12);
    // Window
    ctx.fillStyle='rgba(255,200,80,0.3)'; ctx.fillRect(x+15,H*0.3,25,18); ctx.fillRect(x+60,H*0.3,25,18);
    ctx.strokeStyle='#5a3a1a'; ctx.lineWidth=1.5;
    ctx.strokeRect(x+15,H*0.3,25,18); ctx.strokeRect(x+60,H*0.3,25,18);
  }

  function drawFridge(x, full){
    ctx.fillStyle='#4a6a8a'; ctx.fillRect(x,H*0.26,40,H*0.35); ctx.strokeStyle='#7a9aba'; ctx.lineWidth=1.5; ctx.strokeRect(x,H*0.26,40,H*0.35);
    ctx.fillStyle='#c0d8f0'; ctx.fillRect(x+4,H*0.28,32,H*0.14);
    ctx.fillStyle='#a0c0e0'; ctx.fillRect(x+4,H*0.44,32,H*0.14);
    // fridge handle
    ctx.strokeStyle='#9abacf'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x+35,H*0.36); ctx.lineTo(x+35,H*0.5); ctx.stroke();
    ctx.font='12px sans-serif'; ctx.textAlign='center';
    if(full) ctx.fillText('🍺',x+20,H*0.38);
    ctx.fillStyle='rgba(120,200,255,0.1)'; ctx.fillRect(x+4,H*0.28,32,H*0.3);
  }

  function drawCrate(x, y, empty, scale){
    scale=scale||1;
    ctx.save(); ctx.translate(x,y); ctx.scale(scale,scale);
    ctx.fillStyle= empty ? CRATE_EMPTY : CRATE_FULL;
    ctx.fillRect(-11,-8,22,16); ctx.strokeStyle='#7a5200'; ctx.lineWidth=1.5; ctx.strokeRect(-11,-8,22,16);
    // grid lines
    ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(-4,-8); ctx.lineTo(-4,8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(4,-8); ctx.lineTo(4,8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-11,0); ctx.lineTo(11,0); ctx.stroke();
    if(!empty){ ctx.font='7px sans-serif'; ctx.textAlign='center'; ctx.fillText('🍺',-6,-3); ctx.fillText('🍺',2,-3); }
    ctx.restore();
  }

  // Safe rounded rect helper for crate animation
  function rrect2(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();
  }

  function drawCar(cx, bounceY, hasCrates, empty){
    var by=bounceY||0;
    // Car body
    ctx.fillStyle=CAR_COL;
    rrect2(cx-50,H*0.56+by,100,24,5); ctx.fill();
    // Roof
    rrect2(cx-32,H*0.47+by,64,14,6); ctx.fill();
    // Windows
    ctx.fillStyle='rgba(120,200,255,0.5)';
    ctx.fillRect(cx-28,H*0.49+by,22,11); ctx.fillRect(cx+6,H*0.49+by,22,11);
    // Headlights
    ctx.fillStyle='rgba(255,255,180,0.8)'; ctx.beginPath(); ctx.ellipse(cx+50,H*0.64+by,6,4,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,150,80,0.7)'; ctx.beginPath(); ctx.ellipse(cx-50,H*0.64+by,5,4,0,0,Math.PI*2); ctx.fill();
    // Wheels
    [cx-30,cx+30].forEach(function(wx){
      ctx.fillStyle='#1a1a1a'; ctx.beginPath(); ctx.arc(wx,H*0.73+by,11,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#555'; ctx.beginPath(); ctx.arc(wx,H*0.73+by,7,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#aaa'; ctx.beginPath(); ctx.arc(wx,H*0.73+by,3,0,Math.PI*2); ctx.fill();
    });
    // Crates on roof rack
    if(hasCrates){
      for(var ci=0;ci<3;ci++) drawCrate(cx-25+ci*22, H*0.44+by, empty, 0.9);
    }
  }

  // Tennis player stick figure for crate animation — detailed athletic figure
  function drawCratePerson(x, y, action, frame){
    // action: 'carry'=walking with crate, 'lift'=lifting overhead, 'cheer'=victory arms up
    ctx.save();
    ctx.translate(x, y);

    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.beginPath(); ctx.ellipse(0, 3, 12, 3.5, 0, 0, Math.PI*2); ctx.fill();

    // ── Legs ──
    var walk = Math.sin(frame * 0.22) * 0.4;
    ctx.strokeStyle='#c8a070'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.lineJoin='round';

    if(action==='carry'){
      // Dynamic walking stride
      var fLeg = walk * 18, bLeg = -walk * 12;
      // Back leg
      var bKx = Math.sin(-0.15+bLeg*0.04)*14, bKy = Math.cos(-0.15+bLeg*0.04)*14;
      ctx.beginPath(); ctx.moveTo(0,-3); ctx.lineTo(bKx,bKy); ctx.lineTo(bKx+Math.sin(-0.3)*12, bKy+Math.cos(-0.3)*12); ctx.stroke();
      // Front leg
      var fKx = Math.sin(0.2+fLeg*0.04)*14, fKy = Math.cos(0.2+fLeg*0.04)*14;
      ctx.beginPath(); ctx.moveTo(0,-3); ctx.lineTo(fKx,fKy); ctx.lineTo(fKx+Math.sin(0.1)*12, fKy+Math.cos(0.1)*12); ctx.stroke();
      // Shoes
      ctx.fillStyle='#ffffff';
      ctx.beginPath(); ctx.ellipse(bKx+Math.sin(-0.3)*12+2,bKy+Math.cos(-0.3)*12+2,5,2,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(fKx+Math.sin(0.1)*12+2,fKy+Math.cos(0.1)*12+2,5,2,0,0,Math.PI*2); ctx.fill();
    } else {
      // Stable wide stance
      ctx.beginPath(); ctx.moveTo(0,-3); ctx.lineTo(-8,14); ctx.lineTo(-10,26); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-3); ctx.lineTo(8,14); ctx.lineTo(10,26); ctx.stroke();
      ctx.fillStyle='#ffffff';
      ctx.beginPath(); ctx.ellipse(-8,28,6,2.5,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(10,28,6,2.5,0,0,Math.PI*2); ctx.fill();
    }

    // ── Shorts ──
    ctx.fillStyle='#1a6a8a';
    ctx.beginPath();
    ctx.moveTo(-8,-3); ctx.quadraticCurveTo(0,3,8,-3);
    ctx.lineTo(5,5); ctx.quadraticCurveTo(0,8,-5,5);
    ctx.closePath(); ctx.fill();

    // ── Torso / shirt ──
    ctx.fillStyle='#f0f0f0';
    ctx.beginPath();
    ctx.moveTo(-7,-4); ctx.lineTo(-6,-20); ctx.lineTo(6,-20); ctx.lineTo(7,-4);
    ctx.quadraticCurveTo(0,-1,-7,-4);
    ctx.closePath(); ctx.fill();
    // Green stripes
    ctx.strokeStyle='#3a8a3a'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(-5,-20); ctx.lineTo(-5,-4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5,-20); ctx.lineTo(5,-4); ctx.stroke();

    // ── Head ──
    ctx.fillStyle='#f5c090';
    ctx.beginPath(); ctx.arc(0,-26,7,0,Math.PI*2); ctx.fill();
    // Tennis cap
    ctx.fillStyle='#3a8a3a';
    ctx.beginPath(); ctx.arc(0,-28,7.5,Math.PI,Math.PI*2); ctx.fill();
    // Cap brim
    ctx.beginPath(); ctx.moveTo(-7.5,-28); ctx.lineTo(10.5,-28); ctx.lineTo(9.5,-25); ctx.lineTo(-7.5,-26); ctx.closePath(); ctx.fill();
    // Eyes
    ctx.fillStyle='#5a3010';
    ctx.beginPath(); ctx.arc(2.5,-25,1.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-2,-25,1.2,0,Math.PI*2); ctx.fill();
    // Sweatband
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(0,-28,7.5,Math.PI*1.1,Math.PI*1.9); ctx.stroke();

    // ── Arms by action ──
    ctx.strokeStyle='#c8a070'; ctx.lineWidth=3; ctx.lineCap='round';

    if(action==='carry'){
      // Arms out holding crate — wristbands visible
      ctx.beginPath(); ctx.moveTo(0,-17); ctx.lineTo(-14,-9); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-17); ctx.lineTo(14,-9); ctx.stroke();
      // Wristbands
      ctx.strokeStyle='#ffffff'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(-14,-9,2.5,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(14,-9,2.5,0,Math.PI*2); ctx.stroke();
      // Crate in hands
      drawCrate(0,-4, false, 0.9);

    } else if(action==='lift'){
      var lw = Math.sin(frame*0.35)*0.12;
      ctx.strokeStyle='#c8a070'; ctx.lineWidth=3;
      // Bent arms lifting
      ctx.beginPath(); ctx.moveTo(0,-17); ctx.lineTo(-14,-22+lw*3); ctx.lineTo(-12,-32+lw*4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-17); ctx.lineTo(14,-22-lw*3); ctx.lineTo(12,-32-lw*4); ctx.stroke();
      // Wristbands
      ctx.strokeStyle='#ffffff'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(-12,-32+lw*4,2.5,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(12,-32-lw*4,2.5,0,Math.PI*2); ctx.stroke();
      // Crate overhead — tilting with strain
      ctx.save(); ctx.translate(0,-40); ctx.rotate(lw*0.3);
      drawCrate(0,0,false,0.8);
      ctx.restore();
      // Strain expression — sweat drop
      ctx.fillStyle='rgba(100,180,255,0.7)';
      ctx.beginPath(); ctx.arc(9,-23,2,0,Math.PI*2); ctx.fill();

    } else if(action==='cheer'){
      var wave = Math.sin(frame*0.45)*0.4;
      ctx.strokeStyle='#c8a070'; ctx.lineWidth=3;
      // Arms up in V
      ctx.beginPath(); ctx.moveTo(0,-17); ctx.lineTo(-16,-30+wave*3); ctx.lineTo(-14,-40+wave*4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-17); ctx.lineTo(16,-30-wave*3); ctx.lineTo(14,-40-wave*4); ctx.stroke();
      // Wristbands raised
      ctx.strokeStyle='#ffffff'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(-14,-40+wave*4,2.5,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(14,-40-wave*4,2.5,0,Math.PI*2); ctx.stroke();
      // Stars / sparkles
      if(Math.floor(frame*0.15)%2===0){
        ctx.fillStyle='rgba(255,220,50,'+(0.5+wave*0.3)+')';
        ctx.font='10px sans-serif'; ctx.textAlign='center';
        ctx.fillText('⭐',18+wave*2,-44);
        ctx.fillText('✨',-18-wave*2,-44+wave);
      }
    }

    ctx.restore();
  }

  var raf2;

  // ── Crate animation sounds — Web Audio API ──
  var _crateAC = null;
  var _crateEngineNode = null;
  var _crateEngineDone = false;
  var _soundsPlayed = {};

  function getCrateAC(){
    if (_crateAC) return _crateAC;
    var AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    _crateAC = new AC();
    return _crateAC;
  }

  // Bottle clink — short high sine ping with decay
  function playBottleClink(ac, delay, freq, vol){
    freq = freq || 1380;
    vol = vol || 0.22;
    var osc = ac.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ac.currentTime+delay);
    osc.frequency.exponentialRampToValueAtTime(freq*0.82, ac.currentTime+delay+0.18);
    var g = ac.createGain();
    g.gain.setValueAtTime(vol, ac.currentTime+delay);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+delay+0.28);
    // Slight reverb body (second osc detuned)
    var osc2 = ac.createOscillator();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(freq*1.007, ac.currentTime+delay+0.004);
    osc2.frequency.exponentialRampToValueAtTime(freq*0.79, ac.currentTime+delay+0.2);
    var g2 = ac.createGain();
    g2.gain.setValueAtTime(vol*0.35, ac.currentTime+delay+0.004);
    g2.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+delay+0.22);
    osc.connect(g); g.connect(ac.destination);
    osc2.connect(g2); g2.connect(ac.destination);
    osc.start(ac.currentTime+delay); osc.stop(ac.currentTime+delay+0.3);
    osc2.start(ac.currentTime+delay+0.004); osc2.stop(ac.currentTime+delay+0.25);
  }

  // Bottle rattle — rapid noise bursts (glass on glass)
  function playBottleRattle(ac, delay, dur){
    dur = dur || 0.22;
    var buf = ac.createBuffer(1, ac.sampleRate*dur, ac.sampleRate);
    var d = buf.getChannelData(0);
    for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(Math.sin(i/d.length*Math.PI),0.5);
    var src = ac.createBufferSource();
    src.buffer = buf;
    var bp = ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2400; bp.Q.value=3;
    var g = ac.createGain();
    g.gain.setValueAtTime(0.18, ac.currentTime+delay);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+delay+dur);
    src.connect(bp); bp.connect(g); g.connect(ac.destination);
    src.start(ac.currentTime+delay);
  }

  // Engine rumble — low oscillator + noise
  function startEngineRumble(ac){
    // Low rumble oscillator
    var eng = ac.createOscillator();
    eng.type = 'sawtooth';
    eng.frequency.setValueAtTime(48, ac.currentTime);
    eng.frequency.linearRampToValueAtTime(55, ac.currentTime+0.4);
    var engG = ac.createGain(); engG.gain.value = 0.09;
    var lp = ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=180;
    eng.connect(lp); lp.connect(engG); engG.connect(ac.destination);
    eng.start(ac.currentTime);

    // Engine noise layer
    var noiseDur = 2.5;
    var nBuf = ac.createBuffer(1, ac.sampleRate*noiseDur, ac.sampleRate);
    var nd = nBuf.getChannelData(0);
    for(var i=0;i<nd.length;i++) nd[i]=(Math.random()*2-1)*0.6;
    var nSrc = ac.createBufferSource();
    nSrc.buffer = nBuf;
    var nbp = ac.createBiquadFilter(); nbp.type='bandpass'; nbp.frequency.value=95; nbp.Q.value=0.6;
    var nG = ac.createGain(); nG.gain.value=0.07;
    nSrc.connect(nbp); nbp.connect(nG); nG.connect(ac.destination);
    nSrc.start(ac.currentTime);

    // Bottles jiggling on road bumps — random clinks at low vol
    [0.15,0.38,0.62,0.9,1.15,1.4,1.7,2.0,2.25].forEach(function(d){
      playBottleClink(ac, d, 900+Math.random()*400, 0.06+Math.random()*0.05);
    });

    return { eng:eng, nSrc:nSrc };
  }

  function stopEngine(nodes){
    try { nodes.eng.stop(); } catch(e){}
    try { nodes.nSrc.stop(); } catch(e){}
  }

  function playCrateSound(phase){
    try {
      var ac = getCrateAC();
      if (!ac) return;

      if (phase === 0) {
        // Loading empties — 4 clinks in quick succession + a rattle
        playBottleClink(ac, 0.00, 1250, 0.25);
        playBottleRattle(ac, 0.12, 0.18);
        playBottleClink(ac, 0.28, 1450, 0.20);
        playBottleRattle(ac, 0.40, 0.15);
        playBottleClink(ac, 0.55, 1180, 0.22);
        playBottleRattle(ac, 0.68, 0.20);
        playBottleClink(ac, 0.85, 1320, 0.18);

      } else if (phase === 1) {
        // Driving away — engine + jiggling bottles
        _crateEngineNode = startEngineRumble(ac);

        // Exhaust pop on start
        var pop = ac.createOscillator(); pop.type='sine';
        pop.frequency.setValueAtTime(90,ac.currentTime);
        pop.frequency.exponentialRampToValueAtTime(30,ac.currentTime+0.08);
        var popG=ac.createGain(); popG.gain.setValueAtTime(0.5,ac.currentTime);
        popG.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1);
        pop.connect(popG); popG.connect(ac.destination);
        pop.start(ac.currentTime); pop.stop(ac.currentTime+0.12);

      } else if (phase === 2) {
        // Stop engine
        if (_crateEngineNode){ stopEngine(_crateEngineNode); _crateEngineNode=null; }

        // Crates being swapped — rattle + clinks as bottles restocked
        playBottleRattle(ac, 0.05, 0.25);
        playBottleClink(ac, 0.18, 1100, 0.28);
        playBottleRattle(ac, 0.35, 0.22);
        playBottleClink(ac, 0.50, 1350, 0.24);
        playBottleRattle(ac, 0.65, 0.18);
        playBottleClink(ac, 0.80, 1200, 0.22);
        playBottleClink(ac, 0.95, 1500, 0.18);
        playBottleRattle(ac, 1.05, 0.20);

      } else if (phase === 3) {
        // Driving back — engine again
        _crateEngineNode = startEngineRumble(ac);

      } else if (phase === 4) {
        // Arrived — stop engine, final satisfying clink + fridge hum
        if (_crateEngineNode){ stopEngine(_crateEngineNode); _crateEngineNode=null; }

        // Fridge door open hum
        var fridgeOsc = ac.createOscillator();
        fridgeOsc.type='sine'; fridgeOsc.frequency.value=60;
        var fridgeG=ac.createGain();
        fridgeG.gain.setValueAtTime(0.0001,ac.currentTime+0.1);
        fridgeG.gain.linearRampToValueAtTime(0.08,ac.currentTime+0.5);
        fridgeG.gain.linearRampToValueAtTime(0.0001,ac.currentTime+1.4);
        fridgeOsc.connect(fridgeG); fridgeG.connect(ac.destination);
        fridgeOsc.start(ac.currentTime+0.1); fridgeOsc.stop(ac.currentTime+1.5);

        // Celebratory double-clink (cheers!)
        playBottleClink(ac, 0.2, 1600, 0.30);
        playBottleClink(ac, 0.32, 1420, 0.26);
        playBottleClink(ac, 0.55, 1550, 0.20);
      }
    } catch(e){ /* audio not supported — silent */ }
  }

  function tick2(){
    try {
    t++;
    ctx.clearRect(0,0,W,H);
    var bounce = Math.sin(t*0.3)*2;

    // Fire sounds once per phase transition
    if(t===1)   playCrateSound(0);
    if(t===40)  playCrateSound(1);
    if(t===80)  playCrateSound(2);
    if(t===120) playCrateSound(3);
    if(t===160) playCrateSound(4);

    if(t>=1 && t<40){
      setC(0);
      drawBg('night'); drawBuilding(10,'club'); drawBuilding(W-110,'home');
      drawCar(110, 0, t>15, true);
      var numLoad=Math.min(3,Math.floor((t-5)/7));
      for(var cl=0;cl<numLoad;cl++){
        var cx2=110-25+cl*22, flyPct=Math.max(0,Math.min(1,(t-5-cl*7)/6));
        drawCrate(cx2, H*0.6 - flyPct*(H*0.18), true, 0.9-flyPct*0.1);
      }
      // Player loading crates — walks toward car
      var personX = Math.max(35, 90 - t*1.2);
      drawCratePerson(personX, H*0.63, t>8 ? 'carry' : 'lift', t);
    } else if(t>=40 && t<80){
      setC(1);
      var carX = 110 + (t-40)*5;
      drawBg('drive'); drawBuilding(10,'club'); drawBuilding(W-110,'home');
      if(carX < W+70) drawCar(carX, bounce, true, true);
      if(t%6<3 && carX<W+30){
        ctx.fillStyle='rgba(200,200,200,0.3)'; ctx.beginPath(); ctx.arc(carX-58+Math.random()*10,H*0.63+Math.random()*6,5,0,Math.PI*2); ctx.fill();
      }
      // Player waves goodbye from club entrance
      drawCratePerson(55, H*0.63, 'cheer', t);
    } else if(t>=80 && t<120){
      setC(2);
      drawBg('night'); drawBuilding(W-110,'home');
      drawFridge(W-95, true);
      drawCar(W-130, 0, true, (t-80)>20);
      var swapIdx=Math.floor((t-80)/14);
      for(var sc2=0;sc2<3;sc2++){
        var swapPct=sc2<swapIdx?1:(sc2===swapIdx?Math.min(1,(t-80-sc2*14)/12):0);
        drawCrate(W-130-25+sc2*22, H*0.44, swapPct<0.5, 0.9);
      }
      // Player unloading at home
      var pAction = t > 100 ? 'carry' : 'lift';
      drawCratePerson(W-155, H*0.63, pAction, t);
    } else if(t>=120 && t<160){
      setC(3);
      var carX2 = W-130 - (t-120)*5;
      drawBg('drive'); drawBuilding(10,'club'); drawBuilding(W-110,'home');
      if(carX2 > -80) drawCar(carX2, bounce, true, false);
      if(t%6<3 && carX2>-30){
        ctx.fillStyle='rgba(200,200,200,0.3)'; ctx.beginPath(); ctx.arc(carX2+58+Math.random()*10,H*0.63+Math.random()*6,5,0,Math.PI*2); ctx.fill();
      }
      // Player at club entrance waiting
      drawCratePerson(55, H*0.63, 'cheer', t);
    } else if(t>=160 && t<=205){
      setC(4);
      drawBg('night'); drawBuilding(10,'club');
      drawFridge(40, t>185);
      drawCar(110, 0, t<180, false);
      // Player loading fridge
      var finalAction = t>185 ? 'cheer' : 'carry';
      drawCratePerson(85, H*0.63, finalAction, t);
      if(t>185){
        ctx.font='30px sans-serif'; ctx.textAlign='center';
        ctx.fillText('🍺🎉',W/2,H*0.45);
        ctx.fillStyle='#f8d878'; ctx.font='bold 16px sans-serif';
        ctx.fillText(isDE?'Frisch bestückt!':'Fully stocked!',W/2,H*0.6);
      }
    } else if(t>205){
      finishCrate(); return;
    }
    raf2 = requestAnimationFrame(tick2);
    } catch(e) { finishCrate(); } // never crash the app
  }

  function finishCrate(){
    cancelAnimationFrame(raf2);
    // Stop engine sound if still running
    if (_crateEngineNode){ try{ stopEngine(_crateEngineNode); }catch(e){} _crateEngineNode=null; }
    if (_crateAC){ try{ _crateAC.close(); }catch(e){} _crateAC=null; }
    ov.style.display='none';
    if(cb) cb();
  }

  ov.onclick = finishCrate;
  raf2 = requestAnimationFrame(tick2);
}

// Hook crate animation into confirmReplaceWho after notify
function _wrappedNotifyAndAnimate(msg, drink, originalCb){
  notify(msg);
  showCrateAnimation(drink, originalCb);
}

</script>

<div id="crate-anim-overlay" style="display:none;position:fixed;inset:0;z-index:19999;background:rgba(10,20,10,.92);align-items:center;justify-content:center;flex-direction:column"></div>
