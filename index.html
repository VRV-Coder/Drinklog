<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>🍺 Beer'O'Clock</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e8e8f0;min-height:100vh}
    #auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .auth-card{background:#13151f;border:1px solid #2a2d40;border-radius:16px;padding:32px 28px;width:100%;max-width:400px}
    .auth-card h1{font-size:22px;color:#fff;margin-bottom:4px}
    .auth-card p{font-size:13px;color:#5a5c7a;margin-bottom:22px;line-height:1.6}
    .auth-tabs{display:flex;gap:0;border-bottom:1px solid #2a2d40;margin-bottom:20px}
    .auth-tab{flex:1;padding:9px;background:none;border:none;cursor:pointer;font-size:13px;font-weight:600;color:#5a5c7a;border-bottom:2px solid transparent}
    .auth-tab.active{color:#a78bfa;border-bottom-color:#a78bfa}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:11px;font-weight:700;color:#5a5c7a;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
    .field input{width:100%;background:#0f1117;border:1px solid #2a2d40;border-radius:8px;padding:10px 13px;color:#e8e8f0;font-size:14px;outline:none}
    .field input:focus{border-color:#a78bfa}
    .btn-auth{width:100%;background:linear-gradient(135deg,#7c3aed,#a78bfa);border:none;border-radius:10px;padding:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
    .auth-error{color:#f88;font-size:12px;margin-top:8px;min-height:16px;line-height:1.5}
    .auth-note{font-size:11px;color:#5a5c7a;margin-top:12px;text-align:center;line-height:1.5}
    #app{display:none}
    .header{border-bottom:1px solid #1e2030;padding:14px 16px 0;background:#0d0f18;position:sticky;top:0;z-index:100}
    .header-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .header-row h1{font-size:19px;font-weight:700;color:#fff}
    .user-badge{margin-left:auto;display:flex;align-items:center;gap:8px}
    .user-name{font-size:12px;color:#a78bfa;font-weight:600}
    .admin-badge{display:inline-block;background:#b45309;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;color:#fff;margin-left:4px;letter-spacing:.5px}
    .btn-logout{background:#1a1c2a;border:1px solid #2a2d40;border-radius:6px;padding:4px 10px;color:#5a5c7a;font-size:11px;cursor:pointer}
    .btn-logout:hover{color:#f88;border-color:#f88}
    nav{display:flex;overflow-x:auto;scrollbar-width:none}
    nav::-webkit-scrollbar{display:none}
    nav button{background:none;border:none;cursor:pointer;padding:7px 12px;font-size:11px;font-weight:600;white-space:nowrap;color:#5a5c7a;border-bottom:2px solid transparent;flex-shrink:0}
    nav button.active{color:#a78bfa;border-bottom-color:#a78bfa}
    .content{max-width:680px;margin:0 auto;padding:14px}
    .card{background:#13151f;border:1px solid #1e2030;border-radius:14px;padding:16px;margin-bottom:12px}
    .card-title{font-size:11px;font-weight:700;color:#5a5c7a;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
    .form-label{display:block;font-size:11px;font-weight:700;color:#5a5c7a;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
    input[type=text],input[type=number],input[type=date],input[type=email],input[type=password],select{width:100%;background:#0f1117;border:1px solid #2a2d40;border-radius:8px;padding:9px 12px;color:#e8e8f0;font-size:14px;outline:none;font-family:inherit}
    input:focus,select:focus{border-color:#a78bfa}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .fld{margin-bottom:10px}
    .btn-primary{width:100%;background:linear-gradient(135deg,#7c3aed,#a78bfa);border:none;border-radius:10px;padding:11px;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
    .btn-green{width:100%;background:linear-gradient(135deg,#2a7a3a,#4cd471);border:none;border-radius:10px;padding:11px;color:#0f1117;font-size:14px;font-weight:700;cursor:pointer}
    .btn-sm{background:none;border:none;cursor:pointer;font-size:15px;color:#3a3c55;padding:2px}
    .btn-icon{width:32px;height:32px;border-radius:7px;border:1px solid #2a2d40;background:#0f1117;color:#a78bfa;font-size:17px;font-weight:700;cursor:pointer}
    .btn-edit{background:#1a1a2e;border:1px solid #2a2d40;border-radius:6px;padding:3px 8px;color:#9a9cc0;font-size:11px;cursor:pointer;margin-right:4px}
    .btn-edit:hover{border-color:#a78bfa;color:#a78bfa}
    .chips{display:flex;flex-wrap:wrap;gap:6px}
    .chip{padding:5px 11px;border:1px solid #2a2d40;border-radius:20px;cursor:pointer;font-size:12px;background:#1a1c2a;color:#7a7c95;user-select:none;transition:all .12s}
    .chip.cp{background:#2d1f6e;border-color:#a78bfa;color:#c4b0ff;font-weight:600}
    .chip.cg{background:#1a2d1a;border-color:#2a7a3a;color:#7ef88e;font-weight:600}
    .chip.cy{background:#2a2a1a;border-color:#7a6a2a;color:#f8d878;font-weight:600}
    .sg{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
    .sb{background:#13151f;border:1px solid #1e2030;border-radius:11px;padding:13px 8px;text-align:center}
    .sv{font-size:20px;font-weight:800;color:#a78bfa;letter-spacing:-1px}
    .sv.g{color:#7ef88e}.sv.r{color:#f88}
    .sl{font-size:10px;font-weight:700;color:#5a5c7a;text-transform:uppercase;letter-spacing:.7px;margin-top:2px}
    .entry{display:flex;align-items:center;justify-content:space-between;background:#0f1117;border:1px solid #1e2030;border-radius:8px;padding:8px 11px;margin-bottom:6px}
    .entry-l{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
    .ej{font-size:18px;flex-shrink:0}
    .en{font-size:13px;font-weight:600;color:#c4b0ff}
    .es{font-size:11px;color:#5a5c7a;margin-top:1px}
    .badge{display:inline-block;background:#2d1f6e;border-radius:20px;padding:1px 8px;font-size:11px;color:#a78bfa;font-weight:600}
    .badge.g{background:#1a2d1a;color:#7ef88e}
    .badge.r{background:#2d1212;color:#f88}
    .avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
    .total-row{display:flex;justify-content:space-between;align-items:center;background:#0f1117;border:1px solid #1e2030;border-radius:8px;padding:8px 12px;margin-bottom:10px}
    .total-row span:first-child{font-size:11px;color:#5a5c7a;font-weight:700;text-transform:uppercase;letter-spacing:.7px}
    .total-row span:last-child{font-size:15px;font-weight:800;color:#7ef88e}
    .stepper{display:flex;align-items:center;gap:8px}
    .stepper input{width:58px;text-align:center;font-weight:700;font-size:15px}
    .brow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #1e2030}
    .brow:last-child{border-bottom:none}
    .prog{height:5px;background:#1e2030;border-radius:3px;overflow:hidden;margin-top:3px}
    .prog-fill{height:5px;border-radius:3px;background:linear-gradient(to right,#7c3aed,#a78bfa);transition:width .3s}
    .prog-fill.done{background:#2a7a3a}
    .bottles{display:flex;flex-wrap:wrap;gap:5px;margin:5px 0 7px}
    .bottle{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px}
    .bottle.done{background:#1a2d1a;border:1px solid #2a7a3a}
    .bottle.empty{background:#1a1c2a;border:1px solid #2a2d40;opacity:.4}
    .repl-ctrl{display:flex;align-items:center;gap:7px;margin-top:5px}
    .repl-ctrl span{font-size:11px;color:#5a5c7a;min-width:100px;text-align:center}
    .dh{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#0d0f18;border-bottom:1px solid #1e2030}
    .dh h4{font-size:14px;font-weight:700;color:#c4b0ff}
    .dh p{font-size:11px;color:#5a5c7a;margin-top:1px}
    .audit-entry{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #1e2030}
    .audit-entry:last-child{border-bottom:none}
    .audit-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
    .audit-body{flex:1}
    .audit-who{font-size:13px;font-weight:600;color:#c4b0ff}
    .audit-what{font-size:12px;color:#9a9cc0;margin-top:1px}
    .audit-when{font-size:10px;color:#3a3c55;margin-top:2px}
    #notif{position:fixed;top:14px;right:14px;z-index:9999;pointer-events:none}
    .np{background:#1a2d1a;border:1px solid #2a7a3a;color:#7ef88e;padding:8px 14px;border-radius:9px;font-size:12px;font-weight:600;margin-bottom:5px;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:si .2s ease}
    .np.err{background:#2d1212;border-color:#c44;color:#f88}
    @keyframes si{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .empty{text-align:center;padding:36px 16px;color:#3a3c55;font-size:13px}
    .empty .big{font-size:32px;margin-bottom:7px}
    .mine-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#a78bfa;margin-right:3px;vertical-align:middle}
    /* CONSOLIDATED DAY SUMMARY (Log tab) */
    .day-summary{background:#0f1117;border:1px solid #1e2030;border-radius:9px;padding:10px 12px;margin-bottom:8px}
    .day-summary-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .day-summary-head h5{font-size:12px;font-weight:700;color:#7a7c95;text-transform:uppercase;letter-spacing:.6px}
    .person-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0}
    .person-row-l{display:flex;align-items:center;gap:8px}
    .drink-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
    .drink-tag{font-size:10px;background:#1a1c2a;border-radius:10px;padding:1px 7px;color:#9a9cc0}
    @media(max-width:480px){.grid2{grid-template-columns:1fr}.sg{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <h1>🍺 Beer'O'Clock</h1>
    <p>Enter your name to join, or sign in if you're the admin.</p>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="authTab('guest',this)">I'm a Guest</button>
      <button class="auth-tab" onclick="authTab('admin',this)">Admin Sign In</button>
    </div>
    <div id="auth-form-guest">
      <div class="field"><label>Your Name</label><input id="guest-name" type="text" placeholder="e.g. John" onkeydown="if(event.key==='Enter')guestEnter()"/></div>
      <button class="btn-auth" onclick="guestEnter()">Enter App</button>
      <p class="auth-note">No password needed — just enter your name to start logging drinks.</p>
    </div>
    <div id="auth-form-admin" style="display:none">
      <div class="field"><label>Admin Email</label><input id="li-email" type="email" placeholder="you@email.com"/></div>
      <div class="field"><label>Password</label><input id="li-pass" type="password" placeholder="••••••••"/></div>
      <button class="btn-auth" onclick="signIn()">Sign In</button>
    </div>
    <div id="auth-error" class="auth-error"></div>
  </div>
</div>

<div id="app">
  <div id="notif"></div>
  <div class="header">
    <div class="header-row">
      <span style="font-size:22px">🍺</span>
      <h1>Beer'O'Clock</h1>
      <div class="user-badge">
        <span class="user-name" id="user-label"></span>
        <button class="btn-logout" onclick="signOut()">Exit</button>
      </div>
    </div>
    <nav id="main-nav">
      <button class="active" onclick="switchTab('log',this)">📋 Log</button>
      <button onclick="switchTab('stats',this)">📊 Stats</button>
      <button onclick="switchTab('payments',this)">💶 Payments</button>
      <button onclick="switchTab('history',this)">📅 History</button>
      <button onclick="switchTab('replace',this)">🔄 Replace</button>
      <button onclick="switchTab('audit',this)">📜 Audit</button>
      <button onclick="switchTab('people',this)">👥 People</button>
    </nav>
  </div>
  <div class="content">
    <div id="tab-log"></div>
    <div id="tab-stats"    style="display:none"></div>
    <div id="tab-payments" style="display:none"></div>
    <div id="tab-history"  style="display:none"></div>
    <div id="tab-replace"  style="display:none"></div>
    <div id="tab-audit"    style="display:none"></div>
    <div id="tab-people"   style="display:none"></div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
var SUPA_URL = localStorage.getItem('sb_url') || '';
var SUPA_KEY = localStorage.getItem('sb_key') || '';
var SB;

// ── IDENTITY ────────────────────────────────────────────────
// ADMIN: real Supabase Auth login (email+password)
// GUEST: just a name + a random token stored in this browser's localStorage
var IS_ADMIN = false;
var IS_GUEST = false;
var CURRENT_USER = null;     // Supabase auth user object (admin only)
var CURRENT_NAME = '';       // display name for everyone
var GUEST_TOKEN = localStorage.getItem('guest_token') || '';

var DRINK_TYPES = ["🍺 Beer","🍷 Wine","🥃 Spirits","🍹 Cocktail","🧃 Juice","💧 Water","☕ Coffee","🧋 Other"];
var AVATAR_COLORS = ["#7c3aed","#2a7a3a","#b45309","#be123c","#0369a1","#7c2d12","#4338ca","#065f46"];
var STATE = {
  tab:'log', people:[], logs:[], payments:[], replacements:[], auditLog:[],
  logPerson:'', logDrink:'🍺 Beer', logQty:1, logPrice:'', logDate:td(), logNote:'',
  payPayers:[], payNonDrinkers:[], payAmount:'', payDate:td(), payNote:'',
  undoStack:[]
};

// ── INIT ────────────────────────────────────────────────────
window.addEventListener('load', function(){
  if (typeof supabase === 'undefined') {
    showConfigError('Failed to load Supabase library. Check your internet connection and reload.');
    return;
  }
  if (!SUPA_URL || !SUPA_KEY) { showConfigScreen(); return; }
  initSupabase(SUPA_URL, SUPA_KEY);
});

function showConfigScreen(){
  document.getElementById('auth-screen').innerHTML =
    '<div class="auth-card"><h1>🍺 Beer\'O\'Clock</h1>' +
    '<p>First time setup — enter the shared Supabase connection details.</p>' +
    '<div class="field"><label>Supabase URL</label><input id="cfg-url" type="text" placeholder="https://xxxx.supabase.co"/></div>' +
    '<div class="field"><label>Supabase Anon Key</label><input id="cfg-key" type="text" placeholder="eyJhbGci..."/></div>' +
    '<div id="cfg-error" class="auth-error"></div>' +
    '<button class="btn-auth" onclick="submitConfig()">Connect</button></div>';
  document.getElementById('auth-screen').style.display = 'flex';
}

function showConfigError(msg){
  document.getElementById('auth-screen').innerHTML =
    '<div class="auth-card"><h1>🍺 Beer\'O\'Clock</h1><div class="auth-error" style="margin-top:10px">' + msg + '</div>' +
    '<button class="btn-auth" onclick="location.reload()">Reload Page</button></div>';
  document.getElementById('auth-screen').style.display = 'flex';
}

function submitConfig(){
  var url = document.getElementById('cfg-url').value.trim();
  var key = document.getElementById('cfg-key').value.trim();
  var errEl = document.getElementById('cfg-error');
  if (!url || !key) { errEl.textContent = 'Both fields are required.'; return; }
  if (!url.startsWith('http')) { errEl.textContent = 'URL should start with https://'; return; }
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  SUPA_URL = url; SUPA_KEY = key;
  initSupabase(url, key);
}

function initSupabase(url, key){
  try { SB = supabase.createClient(url, key); }
  catch(e) { showConfigError('Could not connect: ' + e.message + resetBtn()); return; }
  if (!SB || !SB.auth) { showConfigError('Client failed to initialize. Credentials may be invalid.' + resetBtn()); return; }

  restoreAuthScreenHtml();

  // Check if a guest session is already active
  if (GUEST_TOKEN && localStorage.getItem('guest_name')) {
    IS_GUEST = true;
    CURRENT_NAME = localStorage.getItem('guest_name');
    enterApp();
    return;
  }

  // Otherwise watch for admin auth state
  SB.auth.onAuthStateChange(function(event, session){
    if (session && session.user) {
      CURRENT_USER = session.user;
      IS_ADMIN = true;
      IS_GUEST = false;
      onAdminLoggedIn();
    } else if (!IS_GUEST) {
      CURRENT_USER = null;
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }
  });
}

function resetBtn(){
  return '<br/><br/><button class="btn-auth" onclick="localStorage.removeItem(\'sb_url\');localStorage.removeItem(\'sb_key\');location.reload()">Reset Credentials</button>';
}

function restoreAuthScreenHtml(){
  document.getElementById('auth-screen').innerHTML =
    '<div class="auth-card"><h1>🍺 Beer\'O\'Clock</h1>' +
    '<p>Enter your name to join, or sign in if you\'re the admin.</p>' +
    '<div class="auth-tabs">' +
      '<button class="auth-tab active" onclick="authTab(\'guest\',this)">I\'m a Guest</button>' +
      '<button class="auth-tab" onclick="authTab(\'admin\',this)">Admin Sign In</button>' +
    '</div>' +
    '<div id="auth-form-guest">' +
      '<div class="field"><label>Your Name</label><input id="guest-name" type="text" placeholder="e.g. John" onkeydown="if(event.key===\'Enter\')guestEnter()"/></div>' +
      '<button class="btn-auth" onclick="guestEnter()">Enter App</button>' +
      '<p class="auth-note">No password needed — just enter your name to start logging drinks.</p>' +
    '</div>' +
    '<div id="auth-form-admin" style="display:none">' +
      '<div class="field"><label>Admin Email</label><input id="li-email" type="email" placeholder="you@email.com"/></div>' +
      '<div class="field"><label>Password</label><input id="li-pass" type="password" placeholder="••••••••"/></div>' +
      '<button class="btn-auth" onclick="signIn()">Sign In</button>' +
    '</div>' +
    '<div id="auth-error" class="auth-error"></div></div>';
}

function authTab(tab, btn){
  document.querySelectorAll('.auth-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('auth-form-guest').style.display = tab==='guest' ? '' : 'none';
  document.getElementById('auth-form-admin').style.display = tab==='admin' ? '' : 'none';
  document.getElementById('auth-error').textContent = '';
}

// ── GUEST ENTRY ─────────────────────────────────────────────
function guestEnter(){
  var name = document.getElementById('guest-name').value.trim();
  var errEl = document.getElementById('auth-error');
  if (!name) { errEl.style.color='#f88'; errEl.textContent = 'Please enter your name.'; return; }

  if (!GUEST_TOKEN) {
    GUEST_TOKEN = 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2,10);
    localStorage.setItem('guest_token', GUEST_TOKEN);
  }
  localStorage.setItem('guest_name', name);
  CURRENT_NAME = name;
  IS_GUEST = true;
  IS_ADMIN = false;
  enterApp();
}

// ── ADMIN SIGN IN ───────────────────────────────────────────
async function signIn(){
  if (!SB || !SB.auth) { document.getElementById('auth-error').textContent = 'Not connected — reload the page.'; return; }
  var email = document.getElementById('li-email').value.trim();
  var pass  = document.getElementById('li-pass').value;
  var errEl = document.getElementById('auth-error');
  errEl.style.color = '#f88'; errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Enter both email and password.'; return; }
  try {
    var {error} = await SB.auth.signInWithPassword({email:email, password:pass});
    if (error) {
      var msg = error.message || error.error_description || error.msg || 'Sign in failed (status: '+(error.status||'?')+')';
      errEl.textContent = msg;
    }
  } catch(e) { errEl.textContent = 'Unexpected error: ' + (e.message || e.toString()); }
}

async function onAdminLoggedIn(){
  // Try to read display_name from a profiles table if it exists; fallback to email prefix
  var name = CURRENT_USER.email.split('@')[0];
  try {
    var {data:prof} = await SB.from('profiles').select('*').eq('id', CURRENT_USER.id).single();
    if (prof && prof.display_name) name = prof.display_name;
  } catch(e) {}
  CURRENT_NAME = name;
  enterApp();
}

function enterApp(){
  var label = document.getElementById('user-label');
  label.innerHTML = '👤 ' + esc(CURRENT_NAME) + (IS_ADMIN ? ' <span class="admin-badge">👑 ADMIN</span>' : '');
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadAll();
}

async function signOut(){
  if (IS_ADMIN && SB && SB.auth) { await SB.auth.signOut(); }
  if (IS_GUEST) {
    localStorage.removeItem('guest_name');
    IS_GUEST = false;
    CURRENT_NAME = '';
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
  notify('Signed out');
}

// ── LOAD DATA ───────────────────────────────────────────────
async function loadAll(){
  try {
    var [l, pay, rep, aud] = await Promise.all([
      SB.from('drink_logs').select('*').order('date',{ascending:false}).order('logged_at',{ascending:false}),
      SB.from('payments').select('*').order('date',{ascending:false}),
      SB.from('replacements').select('*').order('for_date',{ascending:false}),
      SB.from('audit_log').select('*').order('performed_at',{ascending:false}).limit(100)
    ]);
    if(l.error)   notify('Logs error: '+l.error.message, true);
    if(pay.error) notify('Payments error: '+pay.error.message, true);
    if(rep.error) notify('Replace error: '+rep.error.message, true);

    STATE.logs         = l.data   || [];
    STATE.payments     = pay.data || [];
    STATE.replacements = rep.data || [];
    STATE.auditLog      = aud.data || [];

    // Derive people list from everyone who has ever logged a drink or paid
    var names = new Set();
    STATE.logs.forEach(function(l){ if(l.person) names.add(l.person); });
    STATE.payments.forEach(function(p){
      (p.payers||'').split(',').forEach(function(n){ if(n.trim()) names.add(n.trim()); });
      (p.non_drinkers||'').split(',').forEach(function(n){ if(n.trim()) names.add(n.trim()); });
    });
    if (CURRENT_NAME) names.add(CURRENT_NAME);
    STATE.people = [...names].sort().map(function(n,i){ return {display_name:n, idx:i}; });

    renderTab(STATE.tab);
  } catch(e){ notify('Load error: '+e.message, true); }
}

// ── AUDIT HELPER ────────────────────────────────────────────
async function audit(action, table, id, details){
  try {
    await SB.from('audit_log').insert({
      action: action, performed_by: CURRENT_NAME,
      user_id: IS_ADMIN ? CURRENT_USER.id : null,
      target_table: table, target_id: id || null, details: details || null
    });
  } catch(e) {}
}

// ── OWNERSHIP CHECK ─────────────────────────────────────────
function isMine(row){
  if (IS_ADMIN) return true;
  if (IS_GUEST) return row.guest_token === GUEST_TOKEN;
  return false;
}

// ── TABS ────────────────────────────────────────────────────
function switchTab(tab, btn){
  document.querySelectorAll('nav button').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  ['log','stats','payments','history','replace','audit','people'].forEach(function(t){
    document.getElementById('tab-'+t).style.display = t===tab?'':'none';
  });
  STATE.tab = tab;
  renderTab(tab);
}
function renderTab(t){
  try {
    if(t==='log')      renderLog();
    if(t==='stats')    renderStats();
    if(t==='payments') renderPayments();
    if(t==='history')  renderHistory();
    if(t==='replace')  renderReplace();
    if(t==='audit')    renderAudit();
    if(t==='people')   renderPeople();
  } catch(e) {
    console.error('Render error on tab', t, e);
    notify('Display error: ' + e.message, true);
  }
}

// Consolidate all of today's (and recent days') drinks per person
function renderConsolidatedToday(){
  if (!STATE.logs.length) return '';

  // Group by date, then by person
  var byDate = {};
  STATE.logs.forEach(function(l){
    if (!byDate[l.date]) byDate[l.date] = {};
    if (!byDate[l.date][l.person]) byDate[l.date][l.person] = { rows: [], totalQty: 0, totalPrice: 0 };
    byDate[l.date][l.person].rows.push(l);
    byDate[l.date][l.person].totalQty += (l.quantity||0);
    byDate[l.date][l.person].totalPrice += (parseFloat(l.total_price)||0);
  });

  var dates = Object.keys(byDate).sort().reverse().slice(0,5); // last 5 days with activity

  var html = card('Recent Days — Consolidated',
    dates.map(function(d){
      var people = byDate[d];
      var dayTotal = Object.values(people).reduce(function(s,p){return s+p.totalQty;},0);
      var dayCost  = Object.values(people).reduce(function(s,p){return s+p.totalPrice;},0);
      return '<div class="day-summary">'+
        '<div class="day-summary-head"><h5>'+fmtDate(d)+'</h5>'+
        '<span style="font-size:11px;color:#5a5c7a">'+dayTotal+' drinks · €'+dayCost.toFixed(2)+'</span></div>'+
        Object.keys(people).sort().map(function(person){
          var pdata = people[person];
          // Consolidate drink types for this person/day
          var drinkCounts = {};
          pdata.rows.forEach(function(r){ drinkCounts[r.drink] = (drinkCounts[r.drink]||0) + r.quantity; });
          var tags = Object.entries(drinkCounts).map(function(e){
            return '<span class="drink-tag">'+emoji(e[0])+' ×'+e[1]+'</span>';
          }).join('');
          return '<div class="person-row">'+
            '<div class="person-row-l">'+
              '<div class="avatar" style="background:'+colorFor(person)+';width:22px;height:22px;font-size:10px">'+(person[0]||'?').toUpperCase()+'</div>'+
              '<div><div style="font-size:12px;font-weight:600;color:#c4b0ff">'+esc(person)+
                ' <span class="badge">'+pdata.totalQty+' drink'+(pdata.totalQty!==1?'s':'')+'</span>'+
                (pdata.totalPrice>0?' <span style="font-size:11px;color:#7ef88e;font-weight:600">€'+pdata.totalPrice.toFixed(2)+'</span>':'')+
                '</div><div class="drink-tags">'+tags+'</div></div>'+
            '</div>'+
          '</div>';
        }).join('')+
      '</div>';
    }).join(''));
  return html;
}

// REPLACE TAB
// ══════════════════════════════════════════════════════════════
function renderReplace(){
  var el=document.getElementById('tab-replace');
  var cbd={},pbd={};
  STATE.logs.forEach(function(l){cbd[l.date]=(cbd[l.date]||0)+(parseFloat(l.total_price)||0);});
  STATE.payments.forEach(function(p){pbd[p.date]=(pbd[p.date]||0)+(parseFloat(p.amount)||0);});
  var cdd={},rdd={};
  STATE.logs.forEach(function(l){
    if(!cdd[l.date])cdd[l.date]={};
    cdd[l.date][l.drink]=(cdd[l.date][l.drink]||0)+(l.quantity||0);
  });
  STATE.replacements.forEach(function(r){
    if(!rdd[r.for_date])rdd[r.for_date]={};
    rdd[r.for_date][r.drink]=(rdd[r.for_date][r.drink]||0)+(r.quantity||0);
  });
  var days=Object.keys(cdd).sort().reverse().map(function(d){
    var consumed=cdd[d]||{},replaced=rdd[d]||{};
    var breakdown=Object.keys(consumed).map(function(drink){
      var owed=consumed[drink]||0,done=Math.min(replaced[drink]||0,owed);
      return {drink:drink,owed:owed,replaced:done,remaining:Math.max(0,owed-done)};
    });
    var to=breakdown.reduce(function(s,b){return s+b.owed;},0);
    var tr=breakdown.reduce(function(s,b){return s+b.replaced;},0);
    var trem=breakdown.reduce(function(s,b){return s+b.remaining;},0);
    var pm=(cbd[d]||0)-(pbd[d]||0);
    return {date:d,breakdown:breakdown,to:to,tr:tr,trem:trem,pm:pm,ms:pm<=0.005,bs:trem===0};
  }).filter(function(d){return !d.bs||!d.ms;});

  var ob={};
  days.forEach(function(d){d.breakdown.forEach(function(b){
    if(!ob[b.drink])ob[b.drink]={owed:0,replaced:0,remaining:0};
    ob[b.drink].owed+=b.owed;ob[b.drink].replaced+=b.replaced;ob[b.drink].remaining+=b.remaining;
  });});
  var tot_o=Object.values(ob).reduce(function(s,v){return s+v.owed;},0);
  var tot_r=Object.values(ob).reduce(function(s,v){return s+v.replaced;},0);
  var tot_rem=Object.values(ob).reduce(function(s,v){return s+v.remaining;},0);

  if(!days.length){el.innerHTML=empty('✅','All settled!','No unsettled days to replace.');return;}

  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
    '<span style="font-size:12px;color:#5a5c7a">'+(STATE.undoStack.length?STATE.undoStack.length+' action(s) in history':'No changes yet')+'</span>'+
    '<button onclick="undoReplace()" '+(STATE.undoStack.length?'':'disabled')+' style="background:'+(STATE.undoStack.length?'#1e1a2e':'#13151f')+';border:1px solid '+(STATE.undoStack.length?'#a78bfa':'#2a2d40')+';border-radius:8px;padding:6px 13px;cursor:pointer;color:'+(STATE.undoStack.length?'#c4b0ff':'#3a3c55')+';font-size:12px;font-weight:600">↩ Undo'+(STATE.undoStack.length?' ('+STATE.undoStack.length+')':'')+'</button></div>';

  html+=sg([{v:tot_o,l:'Bottles Owed'},{v:tot_r,l:'Replaced',c:'g'},{v:tot_rem,l:'Still Owed',c:tot_rem>0?'r':'g'}]);

  if(Object.keys(ob).length) html+=card('All Unsettled — Totals',Object.entries(ob).map(function(e){
    var drink=e[0],v=e[1],pct=v.owed>0?Math.round(v.replaced/v.owed*100):100;
    return '<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;margin-bottom:3px">'+
      '<span style="font-size:13px;font-weight:600">'+esc(drink)+'</span>'+
      '<span style="font-size:12px;font-weight:700;color:'+(v.remaining>0?'#f8d878':'#7ef88e')+'">'+v.replaced+'/'+v.owed+(v.remaining>0?' · '+v.remaining+' left':' ✓')+'</span></div>'+
      '<div class="prog"><div class="prog-fill'+(v.remaining===0?' done':'')+'" style="width:'+pct+'%"></div></div></div>';
  }).join(''));

  days.forEach(function(day){
    html+='<div class="card" style="padding:0;overflow:hidden;margin-bottom:12px">'+
      '<div class="dh"><div><h4>'+fmtDate(day.date)+'</h4><p>'+day.tr+'/'+day.to+' replaced</p></div>'+
      '<div style="text-align:right">'+(!day.ms?'<div style="font-size:13px;color:#f88;font-weight:700">€'+day.pm.toFixed(2)+' due</div>':'<div style="font-size:12px;color:#7ef88e">💶 settled</div>')+
      (day.bs?'<div style="font-size:11px;color:#7ef88e">🍾 done ✓</div>':'<div style="font-size:11px;color:#f8d878">'+day.trem+' left</div>')+'</div></div>'+
      '<div style="padding:11px 14px">'+
      day.breakdown.map(function(b){
        var bottles='';
        for(var i=0;i<b.owed;i++) bottles+='<div class="bottle '+(i<b.replaced?'done':'empty')+'">'+emoji(b.drink)+'</div>';
        return '<div style="margin-bottom:11px">'+
          '<div style="display:flex;justify-content:space-between;margin-bottom:4px">'+
          '<span style="font-size:13px;font-weight:600;color:#e8e8f0">'+esc(b.drink)+'</span>'+
          '<span style="font-size:11px;font-weight:700;color:'+(b.remaining>0?'#f8d878':'#7ef88e')+'">'+b.replaced+'/'+b.owed+(b.remaining===0?' ✓':'')+'</span></div>'+
          '<div class="bottles">'+bottles+'</div>'+
          (b.remaining>0?
            '<div class="repl-ctrl">'+
              '<button class="btn-icon" onclick="replBottle(\''+day.date+'\',\''+b.drink+'\',-1)" '+(b.replaced<=0?'disabled':'')+'>−</button>'+
              '<span>'+b.remaining+' to replace</span>'+
              '<button class="btn-icon" style="border-color:#2a7a3a;background:#1a2d1a;color:#7ef88e" onclick="replBottle(\''+day.date+'\',\''+b.drink+'\',1)">+</button>'+
              '<span style="color:#7ef88e;font-size:11px">Mark replaced</span></div>' :
            '<div style="display:flex;align-items:center;gap:6px"><span style="font-size:12px;color:#7ef88e">All replaced ✓</span>'+
            '<button onclick="replBottle(\''+day.date+'\',\''+b.drink+'\',-1)" style="background:none;border:none;cursor:pointer;color:#5a5c7a;font-size:12px">undo</button></div>')+
        '</div>';
      }).join('')+
      (day.breakdown.length?'<div style="display:flex;justify-content:space-between;padding-top:7px;border-top:1px solid #1e2030">'+
        '<span style="font-size:11px;font-weight:700;color:#5a5c7a;text-transform:uppercase;letter-spacing:.7px">Day Total</span>'+
        '<span style="font-size:12px;font-weight:700;color:'+(day.trem>0?'#f88':'#7ef88e')+'">'+day.tr+'/'+day.to+(day.trem>0?' · '+day.trem+' left':' · all done ✓')+'</span></div>':'')+
      '</div></div>';
  });

  if(STATE.replacements.length) html+=card('Replacement Log',STATE.replacements.map(function(r){
    var canDel=isMine(r);
    return '<div class="entry"><div class="entry-l"><span class="ej">'+emoji(r.drink)+'</span><div>'+
      '<div class="en">'+r.quantity+'× '+esc(r.drink.replace(/^.+? /,''))+'</div>'+
      '<div class="es">For '+fmtDate(r.for_date)+(r.replaced_by?' · by '+esc(r.replaced_by):'')+(r.note?' · '+esc(r.note):'')+'</div>'+
      '<div class="es" style="color:#3a3c55">Logged by '+esc(r.added_by||'unknown')+'</div>'+
      '</div></div>'+(canDel?'<button class="btn-sm" onclick="delEntry(\'replacements\',\''+r.id+'\',\'Replacement for '+fmtDate(r.for_date)+'\')">🗑</button>':'<span style="font-size:11px;color:#3a3c55">🔒</span>')+'</div>';
  }).join(''));

  el.innerHTML=html;
}

async function replBottle(date,drink,delta){
  var existing=STATE.replacements.find(function(r){return r.for_date===date&&r.drink===drink;});
  STATE.undoStack.push(JSON.parse(JSON.stringify(STATE.replacements)));
  if(STATE.undoStack.length>20)STATE.undoStack.shift();
  if(delta>0){
    if(existing){
      await SB.from('replacements').update({quantity:existing.quantity+1}).eq('id',existing.id);
    } else {
      var insertObj = {for_date:date,drink:drink,quantity:1,replaced_by:CURRENT_NAME,note:'',added_by:CURRENT_NAME};
      if (IS_ADMIN) insertObj.user_id = CURRENT_USER.id;
      if (IS_GUEST) insertObj.guest_token = GUEST_TOKEN;
      var {data}=await SB.from('replacements').insert(insertObj).select().single();
      await audit('MARK_REPLACEMENT','replacements',data&&data.id,{date:date,drink:drink,qty:1});
    }
    notify('1× '+drink+' marked replaced ✓');
  } else {
    if(!existing||existing.quantity<=0)return;
    if(existing.quantity===1){await SB.from('replacements').delete().eq('id',existing.id);}
    else{await SB.from('replacements').update({quantity:existing.quantity-1}).eq('id',existing.id);}
    notify('Replacement removed');
  }
  await loadAll();
}

async function undoReplace(){
  if(!STATE.undoStack.length)return;
  var prev=STATE.undoStack.pop();
  await SB.from('replacements').delete().neq('id','00000000-0000-0000-0000-000000000000');
  if(prev.length){
    var ins=prev.map(function(r){return {for_date:r.for_date,drink:r.drink,quantity:r.quantity,replaced_by:r.replaced_by||'',note:r.note||'',added_by:r.added_by||'',user_id:r.user_id||null,guest_token:r.guest_token||''};});
    await SB.from('replacements').insert(ins);
  }
  await audit('UNDO_REPLACE','replacements',null,{restored:prev.length+' entries'});
  notify('Undo successful ✓');
  await loadAll();
}

// ══════════════════════════════════════════════════════════════
// AUDIT TAB
// ══════════════════════════════════════════════════════════════
function renderAudit(){
  var el=document.getElementById('tab-audit');
  if(!STATE.auditLog.length){el.innerHTML=empty('📜','No activity yet','Actions will appear here as they happen.');return;}
  var actionColors={
    'LOG_DRINK':'#a78bfa','DELETE_DRINK_LOGS':'#f88',
    'RECORD_PAYMENT':'#7ef88e','DELETE_PAYMENTS':'#f88',
    'MARK_REPLACEMENT':'#f8d878','DELETE_REPLACEMENTS':'#f88',
    'UNDO_REPLACE':'#5a5c7a','ADMIN_EDIT_DRINK':'#f8d878','DELETE_PERSON':'#f88'
  };
  var actionLabels={
    'LOG_DRINK':'logged a drink','DELETE_DRINK_LOGS':'deleted a drink entry',
    'RECORD_PAYMENT':'recorded a payment','DELETE_PAYMENTS':'deleted a payment',
    'MARK_REPLACEMENT':'marked a replacement','DELETE_REPLACEMENTS':'deleted a replacement',
    'UNDO_REPLACE':'undid replacement changes','ADMIN_EDIT_DRINK':'edited an entry (admin)','DELETE_PERSON':'removed a person'
  };
  var html=card('Activity Log — last 100 actions',
    STATE.auditLog.map(function(a){
      var col=actionColors[a.action]||'#5a5c7a';
      var label=actionLabels[a.action]||a.action.toLowerCase().replace(/_/g,' ');
      var isMe=a.performed_by===CURRENT_NAME;
      var det='';
      if(a.details){
        if(a.details.person) det+=' · '+esc(a.details.person);
        if(a.details.drink)  det+=' · '+esc(a.details.drink);
        if(a.details.qty)    det+=' ×'+a.details.qty;
        if(a.details.total)  det+=' · €'+parseFloat(a.details.total).toFixed(2);
        if(a.details.payers) det+=' · '+esc(a.details.payers);
        if(a.details.amount) det+=' · €'+parseFloat(a.details.amount).toFixed(2);
      }
      return '<div class="audit-entry">'+
        '<div class="audit-dot" style="background:'+col+'"></div>'+
        '<div class="audit-body">'+
          '<div class="audit-who">'+esc(a.performed_by)+(isMe?' <span style="font-size:10px;color:#a78bfa">(you)</span>':'')+'</div>'+
          '<div class="audit-what">'+label+det+'</div>'+
          '<div class="audit-when">'+fmtDateTime(a.performed_at)+'</div>'+
        '</div></div>';
    }).join(''));
  el.innerHTML=html;
}

// PEOPLE TAB

function renderPeople(){
  var el=document.getElementById('tab-people');
  var html=card('Group Members',
    '<p style="font-size:12px;color:#5a5c7a;margin-bottom:12px;line-height:1.6">People appear here automatically once they log a drink or a payment.</p>'+
    (STATE.people.length?STATE.people.map(function(p){
      var pl = STATE.logs.filter(function(l){return l.person===p.display_name;});
      var total = pl.reduce(function(s,l){return s+(l.quantity||0);},0);
      var spend = pl.reduce(function(s,l){return s+(parseFloat(l.total_price)||0);},0);
      var isMe=p.display_name===CURRENT_NAME;
      return '<div class="entry"><div class="entry-l">'+
        '<div class="avatar" style="background:'+colorFor(p.display_name)+'">'+(p.display_name[0]||'?').toUpperCase()+'</div>'+
        '<div><div class="en">'+esc(p.display_name)+(isMe?' <span style="font-size:10px;color:#a78bfa">(you)</span>':'')+'</div>'+
        '<div class="es">'+total+' drink'+(total!==1?'s':'')+' · €'+spend.toFixed(2)+'</div>'+
        '</div></div></div>';
    }).join(''):'<div style="color:#3a3c55;font-size:13px">No members yet.</div>'));
  el.innerHTML=html;
}

// ── GENERIC DELETE ──────────────────────────────────────────
async function delEntry(table,id,label){
  if(!confirm('Delete: '+label+'?\n\nThis cannot be undone.'))return;
  var {error}=await SB.from(table).delete().eq('id',id);
  if(error){notify('Error: '+error.message,true);return;}
  var actionMap={'drink_logs':'DELETE_DRINK_LOGS','payments':'DELETE_PAYMENTS','replacements':'DELETE_REPLACEMENTS'};
  await audit(actionMap[table]||'DELETE',table,id,{label:label});
  notify('Deleted ✓');
  await loadAll();
}

function delEditBtns(table, id, label, canDel, row){
  var del = canDel ? '<button class="btn-sm" onclick="delEntry(\''+table+'\',\''+id+'\',\''+label+'\')">🗑</button>' : '<span style="font-size:11px;color:#3a3c55">🔒</span>';
  var edit = (IS_ADMIN && table==='drink_logs') ? '<button class="btn-edit" onclick="adminEditDrink(\''+id+'\')">✏️ Edit</button>' : '';
  return edit+del;
}

async function adminEditDrink(id){
  var entry = STATE.logs.find(function(l){return l.id===id;});
  if(!entry) return;
  var newQty   = prompt('Edit quantity (current: '+entry.quantity+'):', entry.quantity);
  if(newQty===null) return;
  var newPrice = prompt('Edit price per drink in € (current: '+parseFloat(entry.unit_price||0).toFixed(2)+'):', parseFloat(entry.unit_price||0).toFixed(2));
  if(newPrice===null) return;
  var newNote  = prompt('Edit note (current: '+(entry.note||'')+'):', entry.note||'');
  if(newNote===null) return;
  var qty=parseInt(newQty)||1, price=parseFloat(newPrice)||0, total=qty*price;
  var {error} = await SB.from('drink_logs').update({quantity:qty,unit_price:price,total_price:total,note:newNote}).eq('id',id);
  if(error){notify('Error: '+error.message,true);return;}
  await audit('ADMIN_EDIT_DRINK','drink_logs',id,{qty:qty,price:price,total:total,note:newNote,original_person:entry.person});
  notify('Entry updated ✓');
  await loadAll();
}

// ── UI HELPERS ──────────────────────────────────────────────
function card(title,content){return '<div class="card">'+(title?'<div class="card-title">'+title+'</div>':'')+content+'</div>';}
function fld(label,input){return '<div class="fld"><label class="form-label">'+label+'</label>'+input+'</div>';}
function sg(items){return '<div class="sg">'+items.map(function(s){return '<div class="sb"><div class="sv'+(s.c?' '+s.c:'')+'">'+s.v+'</div><div class="sl">'+s.l+'</div></div>';}).join('')+'</div>';}
function stepper(k,v){return '<div class="stepper"><button class="btn-icon" onclick="STATE.'+k+'=Math.max(1,STATE.'+k+'-1);renderTab(STATE.tab)">−</button><input type="number" min="1" value="'+v+'" oninput="STATE.'+k+'=parseInt(this.value)||1;updTotal()" style="width:56px;text-align:center;font-weight:700;font-size:15px"/><button class="btn-icon" onclick="STATE.'+k+'++;renderTab(STATE.tab)">+</button></div>';}
function pOpts(sel){return '<option value="">— select —</option>'+STATE.people.map(function(p){return '<option value="'+esc(p.display_name)+'"'+(p.display_name===sel?' selected':'')+'>'+esc(p.display_name)+'</option>';}).join('');}
function tog(k,v){var i=STATE[k].indexOf(v);if(i===-1)STATE[k].push(v);else STATE[k].splice(i,1);renderTab(STATE.tab);}
function empty(icon,t,s){return '<div class="empty"><div class="big">'+icon+'</div><strong style="color:#e8e8f0">'+t+'</strong><p>'+s+'</p></div>';}
function notify(msg,err){var el=document.getElementById('notif');var p=document.createElement('div');p.className='np'+(err?' err':'');p.textContent=msg;el.appendChild(p);setTimeout(function(){p.remove();},2600);}
function td(){return new Date().toISOString().split('T')[0];}
function fmtDate(d){if(!d)return '';var dt=new Date(String(d).includes('T')?d:d+'T00:00:00');return dt.toLocaleDateString('en-GB',{weekday:'short',month:'short',day:'numeric'});}
function fmtDateTime(d){if(!d)return '';var dt=new Date(d);return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' '+dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}
function emoji(drink){return (String(drink||'')).split(' ')[0]||'🍹';}
function colorFor(name){name=String(name||'?');var sum=0;for(var i=0;i<name.length;i++)sum+=name.charCodeAt(i);return AVATAR_COLORS[sum%AVATAR_COLORS.length];}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
</script>
